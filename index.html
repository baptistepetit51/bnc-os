function parseMeetingDate(m){
  const raw=m.date||m.meeting_date||"";
  if(!raw||raw.toLowerCase().includes("every"))return null;
  if(/^\d{4}-\d{2}-\d{2}/.test(raw)){
    const p=raw.slice(0,10).split("-");
    const t=(m.time||"00:00").split(":");
    return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]),parseInt(t[0])||0,parseInt(t[1])||0);
  }
  const MO={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11,Fev:1,Avr:3,Mai:4,Aou:7};
  const match=raw.match(/(\w+)\s+(\d+)/);
  if(match){
    const mo=MO[match[1]];
    if(mo!==undefined){
      const t2=(m.time||"00:00").split(":");
      return new Date(new Date().getFullYear(),mo,parseInt(match[2]),parseInt(t2[0])||0,parseInt(t2[1])||0);
    }
  }
  return null;
}

function MeetingCalendar({allMeetings,ws,T,onSelect}){
  const now=new Date();
  const [cy,setCy]=useState(now.getFullYear());
  const [cm,setCm]=useState(now.getMonth());
  const [hovered,setHovered]=useState(null);
  const MNAMES=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const DNAMES=["LUN","MAR","MER","JEU","VEN","SAM","DIM"];
  const daysInMonth=new Date(cy,cm+1,0).getDate();
  const firstDow=(new Date(cy,cm,1).getDay()+6)%7;
  const todayD=now.getDate(), isThisMonth=cy===now.getFullYear()&&cm===now.getMonth();

  function dayMtgs(day){
    return allMeetings.filter(m=>{
      const d=parseMeetingDate(m);
      if(!d)return false;
      return d.getFullYear()===cy&&d.getMonth()===cm&&d.getDate()===day;
    }).sort((a,b)=>(a.time||"00:00").localeCompare(b.time||"00:00"));
  }

  function prevMonth(){let m=cm-1,y=cy;if(m<0){m=11;y--;}setCm(m);setCy(y);}
  function nextMonth(){let m=cm+1,y=cy;if(m>11){m=0;y++;}setCm(m);setCy(y);}

  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);

  const totalMtgsThisMonth=allMeetings.filter(m=>{const d=parseMeetingDate(m);return d&&d.getFullYear()===cy&&d.getMonth()===cm;}).length;

  return(
    <div>
      {/* Header nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:T.text}}>{MNAMES[cm]} {cy}</div>

                display:"flex",alignItems:"center",justifyContent:"flex-end",marginBottom:4,
              }}>

                  width:24,height:24,borderRadius:"50%",
                  background:isToday?ws.color:"transparent",
                  display:"flex",alignItems:"center",justifyContent:"center",

                </div>
              </div>
              {/* Meeting pills */}

function Meetings({ws,meetings,gcalEvents,setModal,T,t}){

      return (m.gcal_id&&m.gcal_id===g.gcal_id)||(m.title&&g.title&&m.title.toLowerCase()===g.title.toLowerCase());

    return !isPersonal&&!exists;

  const allMeetings=[...meetings,...filteredGcal];
  const [selected,setSelected]=useState(null);

  const meeting=selected?(allMeetings.find(m=>String(m.id)===String(selected)||String(m.gcal_id)===String(selected))):null;

  if(meeting){

      <div>

        </button>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Card T={T}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                <div style={{width:46,height:46,borderRadius:10,background:c+"1a",border:`2px solid ${c}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>
                  {meeting.from_gcal?"📅":"⊕"}
                </div>
                <div>
                  <div style={{fontSize:17,fontWeight:800}}>{meeting.title}</div>
                  <div style={{fontSize:12,color:T.muted}}>📅 {meeting.date} {localTime&&<span style={{color:c,fontWeight:600}}>· {localTime}</span>}</div>
                </div>
                <Badge label={meeting.status} color={c} style={{marginLeft:"auto"}}/>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                {(meeting.attendees||[]).map(a=>(
                  <div key={a} style={{display:"flex",alignItems:"center",gap:5,background:T.s2,borderRadius:20,padding:"3px 10px"}}>
                    <Avatar name={a} size={18} color={ws.color}/>
                    <span style={{fontSize:11,fontWeight:500}}>{a.length>20?a.split("@")[0]:a}</span>
                  </div>
                ))}
              </div>
              {meeting.notes&&<div style={{fontSize:12,color:T.muted,lineHeight:1.6,marginBottom:10}}>{meeting.notes}</div>}
              {meeting.meet_link&&(
                <a href={meeting.meet_link} target="_blank" rel="noreferrer"
                  style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:4,background:"#1a73e8",color:"#fff",borderRadius:7,padding:"8px 16px",fontSize:12,fontWeight:700,textDecoration:"none"}}>
                  📹 Rejoindre
                </a>
              )}
              {!meeting.from_gcal&&<button onClick={()=>setModal({type:"edit_meetings",payload:meeting})} style={{marginTop:10,background:T.s2,border:`1px solid ${T.border}`,borderRadius:6,padding:"6px 14px",fontSize:11,color:T.muted,cursor:"pointer"}}>✏ Modifier</button>}
            </Card>
            <Card T={T}><AgendaBoard meeting={meeting} ws={ws} T={T}/></Card>
          </div>
          <Card T={T}>
            <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:12}}>✅ ACTION ITEMS</div>
            {(meeting.actions||[]).length===0&&<div style={{fontSize:12,color:T.dim,fontStyle:"italic"}}>Aucun action item</div>}
            {(meeting.actions||[]).map((a,i)=>(
              <div key={i} style={{display:"flex",gap:10,padding:"10px",background:T.s2,borderRadius:8,marginBottom:8}}>
                <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${a.done?"#00C896":"#FF9F0A"}`,background:a.done?"#00C896":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {a.done&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:500,textDecoration:a.done?"line-through":"none",color:a.done?T.muted:T.text}}>{a.title}</div>
                  {a.owner&&<div style={{fontSize:10,color:T.muted}}>→ {a.owner}</div>}
                </div>
              </div>
            ))}
            {!meeting.from_gcal&&<button onClick={()=>setModal({type:"add_action",payload:meeting})} style={{marginTop:8,background:"transparent",border:`1.5px dashed ${T.border}`,borderRadius:7,padding:"7px",fontSize:12,color:T.dim,width:"100%",cursor:"pointer"}}>+ Action item</button>}
          </Card>
        </div>
      </div>
    );
  }

  function groupByWeek(mtgs){
    const now=new Date();now.setHours(0,0,0,0);
    const groups={};
    const sorted=[...mtgs].sort((a,b)=>{
      const da=parseMeetingDate(a)||new Date(9999,0,1);
      const db=parseMeetingDate(b)||new Date(9999,0,1);
      return da-db;
    });
    sorted.forEach(m=>{
      const d=parseMeetingDate(m);
      if(!d){
        if(!groups["Récurrents"])groups["Récurrents"]=[];
        groups["Récurrents"].push(m);return;
      }
      const diff=Math.floor((d-now)/(1000*60*60*24));
      const dow=now.getDay()||7;
      const endThisWeek=7-dow;
      const endNextWeek=endThisWeek+7;
      let label;
      if(diff<0)label="Passés";
      else if(diff===0)label="Aujourd'hui";
      else if(diff===1)label="Demain";
      else if(diff<=endThisWeek)label="Cette semaine";
      else if(diff<=endNextWeek)label="Semaine prochaine";
      else{label=d.toLocaleDateString("fr-FR",{month:"long",year:"numeric"});label=label.charAt(0).toUpperCase()+label.slice(1);}
      if(!groups[label])groups[label]=[];
      groups[label].push(m);
    });
    return groups;
  }

  const ViewToggle=()=>(
    <div style={{display:"flex",background:T.s2,borderRadius:8,padding:2,gap:2,width:"fit-content"}}>
      {[["list","☰ Liste"],["calendar","📅 Calendrier"]].map(([v,label])=>(
        <button key={v} onClick={()=>setView(v)} style={{
          background:view===v?T.surface:"transparent",
          border:view===v?`1px solid ${T.border}`:"1px solid transparent",
          borderRadius:6,padding:"5px 14px",fontSize:12,fontWeight:view===v?700:500,
          color:view===v?T.text:T.muted,cursor:"pointer",transition:"all 0.15s",
        }}>{label}</button>
      ))}
    </div>
  );

  if(view==="calendar"){
    return(
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <ViewToggle/>
        <Card T={T}>
          <MeetingCalendar
            allMeetings={allMeetings}
            ws={ws} T={T}
            onSelect={(id)=>{setSelected(id);setView("list");}}
          />
        </Card>
      </div>
    );
  }

  const grouped=groupByWeek(allMeetings.filter(m=>m.status!=="Done"));
  const ORDER=["Aujourd'hui","Demain","Cette semaine","Semaine prochaine","Récurrents"];
  const allKeys=Object.keys(grouped).sort((a,b)=>{
    const ia=ORDER.indexOf(a),ib=ORDER.indexOf(b);
    if(ia!==-1&&ib!==-1)return ia-ib;
    if(ia!==-1)return -1;if(ib!==-1)return 1;
    if(a==="Passés")return 1;if(b==="Passés")return -1;
    return a.localeCompare(b,"fr");
  });
  const doneGroup=allMeetings.filter(m=>m.status==="Done");

  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <ViewToggle/>
      {allKeys.map(label=>{
        const grp=grouped[label];
        const headerColor=label==="Aujourd'hui"?"#FF3B30":label==="Demain"?"#FF9F0A":label==="Passés"||label==="Récurrents"?T.muted:T.muted;
        return(
          <div key={label}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:700,color:headerColor,letterSpacing:1}}>{label.toUpperCase()}</div>
              <div style={{flex:1,height:1,background:T.border}}/>
              <div style={{fontSize:10,color:T.muted}}>{grp.length}</div>
            </div>
            {grp.map(m=>{
              const pd=parseMeetingDate(m);
              const dayLabel=pd?pd.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}):(m.date||"");
              const timeLabel=pd?pd.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",hour12:false}):(m.time||"");
              const c=m.from_gcal?"#1a73e8":m.status==="Récurrent"?ws.color:"#FF9F0A";
              return(
                <div key={m.id||m.gcal_id} onClick={()=>setSelected(m.id||m.gcal_id)}
                  style={{display:"flex",gap:0,marginBottom:8,cursor:"pointer",borderRadius:12,overflow:"hidden",border:`1px solid ${T.border}`,background:T.surface,transition:"all 0.15s",boxShadow:"0 2px 6px rgba(0,0,0,0.06)"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=c;e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow=`0 6px 20px rgba(0,0,0,0.1)`;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 6px rgba(0,0,0,0.06)";}}>
                  <div style={{width:4,background:c,flexShrink:0}}/>
                  <div style={{width:68,background:c+"10",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"10px 6px",flexShrink:0,borderRight:`1px solid ${c}20`}}>
                    {timeLabel?<div style={{fontSize:14,fontWeight:800,color:c,lineHeight:1}}>{timeLabel}</div>:<div style={{fontSize:18}}>⊕</div>}
                    <div style={{fontSize:8,color:T.muted,marginTop:3,textAlign:"center",lineHeight:1.3}}>{dayLabel}</div>
                  </div>
                  <div style={{flex:1,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                        <span style={{fontSize:14,fontWeight:700}}>{m.title}</span>
                        {m.status==="Récurrent"&&<Badge label="Récurrent" color={ws.color}/>}
                        {m.from_gcal&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:8,background:"#1a73e822",color:"#1a73e8",fontWeight:700}}>Google Cal</span>}
                      </div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {(m.attendees||[]).slice(0,4).map(a=>(
                          <div key={a} style={{display:"flex",alignItems:"center",gap:3}}>
                            <Avatar name={a} size={16} color={ws.color}/>
                            <span style={{fontSize:10,color:T.muted}}>{a.length>20?a.split("@")[0]:a}</span>
                          </div>
                        ))}
                        {(m.attendees||[]).length>4&&<span style={{fontSize:10,color:T.dim}}>+{m.attendees.length-4}</span>}
                      </div>
                    </div>
                    {m.meet_link&&(
                      <a href={m.meet_link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
                        style={{background:"#1a73e8",color:"#fff",borderRadius:7,padding:"6px 12px",fontSize:10,fontWeight:700,textDecoration:"none",flexShrink:0}}>
                        📹
                      </a>
                    )}
                    <span style={{fontSize:11,color:T.muted,flexShrink:0}}>→</span>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
      {doneGroup.length>0&&(
        <details>
          <summary style={{fontSize:10,fontWeight:700,color:T.dim,letterSpacing:1,cursor:"pointer",padding:"6px 0"}}>TERMINÉS — {doneGroup.length}</summary>
          <div style={{marginTop:8,opacity:0.5}}>
            {doneGroup.map(m=>(
              <div key={m.id} style={{padding:"8px 14px",background:T.s2,borderRadius:8,marginBottom:6,fontSize:12,color:T.muted}}>{m.title}</div>
            ))}
          </div>
        </details>
      )}
    </div>
  );
}


// ─── MEDIA PRO ────────────────────────────────────────────────────────────
function Media({ws,influencers,allInfluencers,setModal,T,t,mediaBudget,addMediaBudget,updateInfluencer,deleteInfluencer,addInfluencer}){
  const now = new Date();
  const currentMonth = now.toISOString().slice(0,7); // "2026-04"

  // ── Parse visit string → "YYYY-MM" ──────────────────────────────────────
  // visit field is free text: "Apr 20", "May 3", "Jun 12", "Every Monday", etc.
  const MONTH_MAP = {jan:"01",feb:"01",fév:"01",mar:"03",apr:"04",avr:"04",may:"05",mai:"05",jun:"06",jul:"07",aug:"08",aoû:"08",sep:"09",oct:"10",nov:"11",dec:"12",déc:"12"};
  function parseVisitMonth(visit){
    if(!visit) return null;
    const low = visit.toLowerCase().trim();
    for(const [key,num] of Object.entries(MONTH_MAP)){
      if(low.startsWith(key)){
        // Guess year: if month number < current month → next year, else current year
        const mNum = parseInt(num);
        const curM = now.getMonth()+1;
        const yr = mNum < curM ? now.getFullYear()+1 : now.getFullYear();
        return `${yr}-${num}`;
      }
    }
    return null;
  }

  // ── Build month tabs: current + next 4 months + any months with influencers ──
  function addMonths(date, n){
    const d = new Date(date.getFullYear(), date.getMonth()+n, 1);
    return d.toISOString().slice(0,7);
  }
  const futureMths = [0,1,2,3,4].map(n=>addMonths(now,n)); // Apr, May, Jun, Jul, Aug
  const inflMths = [...new Set(allInfluencers.map(i=>parseVisitMonth(i.visit)).filter(Boolean))];
  const allMths = [...new Set([...futureMths, ...inflMths])].sort();

  const MONTH_LABELS = {
    "01":"Janvier","02":"Février","03":"Mars","04":"Avril","05":"Mai","06":"Juin",
    "07":"Juillet","08":"Août","09":"Septembre","10":"Octobre","11":"Novembre","12":"Décembre"
  };
  function mthLabel(ym){ // "2026-04" → "Avr 2026"
    const [y,m] = ym.split("-");
    const short = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"][parseInt(m)-1];
    return parseInt(y)===now.getFullYear() ? short : `${short} ${y}`;
  }

  const [selMonth, setSelMonth] = useState(currentMonth);

  // ── Influencers for selected month ──
  const monthInfluencers = allInfluencers.filter(i=>{
    const m = parseVisitMonth(i.visit);
    return m === selMonth;
  });
  // Influencers with no visit date → show in current month tab only
  const noDateInfls = selMonth===currentMonth ? allInfluencers.filter(i=>!parseVisitMonth(i.visit)) : [];
  const visibleInfluencers = [...monthInfluencers, ...noDateInfls];

  // ── Budget for selected month ──
  const budgetEntry = mediaBudget.find(b=>b.month===selMonth&&b.location==="Global");
  const monthlyBudget = budgetEntry?+budgetEntry.budget:0;
  const monthSpent = monthInfluencers.filter(i=>i.cost&&i.status!=="Annulé").reduce((s,i)=>s+(+i.cost||0),0);
  const remaining = monthlyBudget - monthSpent;

  // ── Global stats (all months) ──
  const spendByLoc = ["Vancouver","Toronto","Seattle","Miami"].map(loc=>({
    loc,
    spent: allInfluencers.filter(i=>i.location===loc&&i.cost&&i.status!=="Annulé").reduce((s,i)=>s+(+i.cost||0),0),
    count: allInfluencers.filter(i=>i.location===loc).length,
  }));
  const maxSpend = Math.max(...spendByLoc.map(x=>x.spent),1);

  // ── Status counts for selected month ──
  const statusCounts = Object.keys(INFL_STATUS).reduce((acc,s)=>{
    acc[s]=visibleInfluencers.filter(i=>i.status===s).length;
    return acc;
  },{});

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>

      {/* ── MONTH TABS ── */}
      <div style={{display:"flex",gap:0,borderBottom:`1px solid ${T.border}`,overflowX:"auto"}}>
        {allMths.map(ym=>{
          const isActive = ym===selMonth;
          const isCurrent = ym===currentMonth;
          const cnt = allInfluencers.filter(i=>parseVisitMonth(i.visit)===ym).length + (ym===currentMonth?allInfluencers.filter(i=>!parseVisitMonth(i.visit)).length:0);
          return(
            <button key={ym} onClick={()=>setSelMonth(ym)} style={{
              padding:"10px 18px",border:"none",
              background:"transparent",cursor:"pointer",
              borderBottom:isActive?`2px solid ${ws.color}`:"2px solid transparent",
              color:isActive?ws.color:T.muted,
              fontWeight:isActive?700:400,
              fontSize:13,whiteSpace:"nowrap",
              transition:"all 0.15s",
              position:"relative",
            }}>
              {isCurrent&&!isActive&&<div style={{position:"absolute",top:8,right:10,width:6,height:6,borderRadius:"50%",background:ws.color}}/>}
              {mthLabel(ym)}
              {cnt>0&&<span style={{
                marginLeft:6,fontSize:10,fontWeight:700,
                background:isActive?ws.color:T.s3,
                color:isActive?"#fff":T.muted,
                borderRadius:20,padding:"1px 7px",
              }}>{cnt}</span>}
            </button>
          );
        })}
      </div>

      {/* ── BUDGET HEADER (per selected month) ── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 2fr",gap:12}}>
        <Card T={T}>
          <div style={{fontSize:10,color:T.muted,letterSpacing:1,marginBottom:8}}>BUDGET {mthLabel(selMonth).toUpperCase()}</div>
          <div style={{fontSize:24,fontWeight:800,color:ws.color}}>{monthlyBudget.toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</div>
          <button onClick={()=>setModal({type:"set_budget",prefillMonth:selMonth})} style={{marginTop:8,background:"transparent",border:`1px solid ${T.border}`,borderRadius:6,padding:"3px 10px",fontSize:10,color:T.muted,cursor:"pointer"}}>Modifier</button>
        </Card>
        <Card T={T}>
          <div style={{fontSize:10,color:T.muted,letterSpacing:1,marginBottom:8}}>DÉPENSÉ</div>
          <div style={{fontSize:24,fontWeight:800,color:"#FF9F0A"}}>{monthSpent.toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</div>
          <div style={{fontSize:10,color:T.muted,marginTop:4}}>{monthInfluencers.filter(i=>i.cost&&i.status!=="Annulé").length} influenceur{monthInfluencers.length>1?"s":""}</div>
        </Card>
        <Card T={T} style={{borderLeft:`3px solid ${remaining>=0?"#00C896":"#FF3B30"}`}}>
          <div style={{fontSize:10,color:T.muted,letterSpacing:1,marginBottom:8}}>RESTANT</div>
          <div style={{fontSize:24,fontWeight:800,color:remaining>=0?"#00C896":"#FF3B30"}}>{remaining.toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</div>
          <div style={{fontSize:10,color:T.muted,marginTop:4}}>{monthlyBudget>0?Math.round((monthSpent/monthlyBudget)*100):0}% utilisé</div>
        </Card>
        <Card T={T}>
          <div style={{fontSize:10,color:T.muted,letterSpacing:1,marginBottom:10}}>PAR LOCATION (tous mois)</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:8,height:52}}>
            {spendByLoc.map(d=>(
              <div key={d.loc} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{fontSize:9,fontWeight:700,color:ws.color}}>{d.spent>0?d.spent.toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0}):""}</div>
                <div style={{width:"100%",height:Math.max(4,(d.spent/maxSpend)*36),background:ws.color,borderRadius:3,opacity:d.spent>0?1:0.2}}/>
                <span style={{fontSize:9,color:T.muted}}>{d.loc.slice(0,3)}</span>
              </div>
            ))}
          </div>
        </Card>
      </div>

      {/* Budget bar */}
      {monthlyBudget>0&&(
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:11,color:T.muted}}>Utilisation du budget — {mthLabel(selMonth)}</span>
            <span style={{fontSize:11,fontWeight:600,color:remaining>=0?"#00C896":"#FF3B30"}}>{Math.round((monthSpent/monthlyBudget)*100)}%</span>
          </div>
          <div style={{height:6,background:T.s3,borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:Math.min(100,(monthSpent/monthlyBudget)*100)+"%",background:remaining>=0?ws.color:"#FF3B30",borderRadius:4,transition:"width 0.5s"}}/>
          </div>
        </div>
      )}

      {/* Status pills */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:11,color:T.muted,marginRight:4}}>{mthLabel(selMonth)} :</span>
        {Object.entries(INFL_STATUS).map(([s,c])=>(
          statusCounts[s]>0&&(
            <div key={s} style={{display:"flex",alignItems:"center",gap:6,background:c+"15",border:`1px solid ${c}33`,borderRadius:20,padding:"4px 12px"}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:c}}/>
              <span style={{fontSize:11,fontWeight:600,color:c}}>{s}</span>
              <span style={{fontSize:11,color:c,opacity:0.7}}>{statusCounts[s]}</span>
            </div>
          )
        ))}
        {visibleInfluencers.length===0&&<span style={{fontSize:11,color:T.dim}}>Aucun influenceur ce mois</span>}
      </div>

      {/* ── INLINE EDITABLE TABLE ── */}
      <InlineInfluencerTable
        influencers={visibleInfluencers}
        ws={ws} T={T}
        parseVisitMonth={parseVisitMonth}
        updateInfluencer={updateInfluencer}
        deleteInfluencer={deleteInfluencer}
        addInfluencer={addInfluencer}
        selMonth={selMonth}
        mthLabel={mthLabel}
        setModal={setModal}
      />
    </div>
  );
}

// ─── INLINE INFLUENCER TABLE (édition Monday-style) ──────────────────────
function InlineInfluencerTable({influencers,ws,T,parseVisitMonth,updateInfluencer,deleteInfluencer,addInfluencer,selMonth,mthLabel,setModal}){
  const [editId, setEditId] = useState(null);
  const [editField, setEditField] = useState(null);
  const [editVal, setEditVal] = useState("");
  const [showCal, setShowCal] = useState(null); // id of row showing calendar
  const [addingNew, setAddingNew] = useState(false);
  const [pending, setPending] = useState([]); // optimistic rows not yet in props
  const [newRow, setNewRow] = useState({name:"",platform:"Instagram",location:"Vancouver",followers:"",cost:"",status:"À contacter",visit:"",content:""});

  const PLATFORMS = ["Instagram","TikTok","YouTube","Twitter","LinkedIn"];

  // Clear pending when real data arrives from parent
  React.useEffect(()=>{
    if(influencers.length > 0){
      setPending(p=>p.filter(r=>!influencers.some(i=>i.name===r.name&&i.name)));
    }
  },[influencers]);
  const LOCATIONS_INFL = ["Vancouver","Toronto","Seattle","Miami","Global"];
  const STATUSES = Object.keys(INFL_STATUS);
  const PLAT_COLOR = {"Instagram":"#E1306C","TikTok":"#ff2d55","YouTube":"#FF0000","Twitter":"#1DA1F2","LinkedIn":"#0A66C2"};

  function startEdit(inf, field){
    setEditId(inf.id);
    setEditField(field);
    setEditVal(inf[field]||"");
    setShowCal(null);
  }

  function commitEdit(inf){
    if(!editField) return;
    // Update immediately in local display via optimistic approach
    // Replace pending if it's a pending row
    if(inf._pending){
      setPending(p=>p.map(r=>r.id===inf.id?{...r,[editField]:editVal}:r));
    } else {
      updateInfluencer(inf.id, {...inf, [editField]: editVal});
    }
    setEditId(null); setEditField(null); setEditVal("");
  }

  function commitVisit(inf, dateStr){
    const d = new Date(dateStr+"T12:00:00");
    const label = d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    if(inf._pending){
      setPending(p=>p.map(r=>r.id===inf.id?{...r,visit:label}:r));
    } else {
      updateInfluencer(inf.id, {...inf, visit: label});
    }
    setShowCal(null); setEditId(null);
  }

  function handleKey(e, inf){
    if(e.key==="Enter"){ e.preventDefault(); commitEdit(inf); }
    if(e.key==="Escape"){ setEditId(null); setEditField(null); }
  }

  function saveNewRow(){
    if(!newRow.name.trim()) return;
    // Optimistic: show immediately with a temp id
    const tempItem = {...newRow, id:"temp_"+Date.now(), _pending:true};
    setPending(p=>[...p, tempItem]);
    addInfluencer(newRow).then(()=>{
      // After real save, clear pending (real data will arrive via props)
      setPending([]);
    }).catch(()=>{
      // Keep pending if save failed
    });
    setNewRow({name:"",platform:"Instagram",location:"Vancouver",followers:"",cost:"",status:"À contacter",visit:"",content:""});
    setAddingNew(false);
  }

  // ── Cell renderer ──
  function Cell({inf, field, children, width, center}){
    const isActive = editId===inf.id && editField===field;
    return(
      <div
        onClick={()=>{ if(field==="visit"){ setShowCal(showCal===inf.id?null:inf.id); setEditId(inf.id); setEditField("visit"); } else startEdit(inf,field); }}
        style={{
          width, minWidth:width,
          display:"flex", alignItems:"center",
          justifyContent:center?"center":"flex-start",
          cursor:"text",
          padding:"0 6px",
          borderRight:`1px solid ${T.border}`,
          height:"100%",
          position:"relative",
        }}>
        {isActive && field!=="visit" ? (
          field==="platform" ? (
            <select autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>commitEdit(inf)} onKeyDown={e=>handleKey(e,inf)}
              style={{background:T.s2,border:"none",color:T.text,fontSize:12,width:"100%",outline:"none",fontFamily:"inherit",padding:"2px 0"}}>
              {PLATFORMS.map(p=><option key={p}>{p}</option>)}
            </select>
          ) : field==="location" ? (
            <select autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>commitEdit(inf)} onKeyDown={e=>handleKey(e,inf)}
              style={{background:T.s2,border:"none",color:T.text,fontSize:12,width:"100%",outline:"none",fontFamily:"inherit",padding:"2px 0"}}>
              {LOCATIONS_INFL.map(l=><option key={l}>{l}</option>)}
            </select>
          ) : field==="status" ? (
            <select autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>commitEdit(inf)} onKeyDown={e=>handleKey(e,inf)}
              style={{background:T.s2,border:"none",color:T.text,fontSize:12,width:"100%",outline:"none",fontFamily:"inherit",padding:"2px 0"}}>
              {STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
          ) : (
            <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)}
              onBlur={()=>commitEdit(inf)} onKeyDown={e=>handleKey(e,inf)}
              type={field==="cost"?"number":"text"}
              style={{background:"transparent",border:"none",color:T.text,fontSize:12,width:"100%",outline:"none",fontFamily:"inherit",padding:"2px 0"}}
            />
          )
        ) : children}
      </div>
    );
  }

  const COL_W = {name:180, platform:110, location:100, followers:80, cost:80, status:110, visit:100, content:120, del:40};
  const totalW = Object.values(COL_W).reduce((a,b)=>a+b,0);

  // Parse visit string to ISO date for calendar
  function visitToISO(visit){
    if(!visit) return "";
    const m = parseVisitMonth(visit);
    if(!m) return "";
    // try to extract day from visit string "May 3" → day=3
    const match = visit.match(/\d+/);
    const day = match ? String(match[0]).padStart(2,"0") : "01";
    return `${m}-${day}`;
  }

  return(
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
      {/* Header */}
      <div style={{display:"flex",background:T.s2,borderBottom:`1px solid ${T.border}`,padding:"0 0 0 0"}}>
        {[["name","Influenceur",COL_W.name],["platform","Plateforme",COL_W.platform],["location","Location",COL_W.location],["followers","Followers",COL_W.followers],["cost","Coût",COL_W.cost],["status","Statut",COL_W.status],["visit","Visite",COL_W.visit],["content","Contenu",COL_W.content],["del","",COL_W.del]].map(([k,label,w])=>(
          <div key={k} style={{width:w,minWidth:w,padding:"9px 8px",fontSize:9,fontWeight:700,color:T.muted,letterSpacing:0.8,borderRight:`1px solid ${T.border}`,flexShrink:0}}>{label.toUpperCase()}</div>
        ))}
      </div>

      {/* Empty state */}
      {(()=>{
        // Merge real influencers with pending optimistic rows (avoid duplicates)
        const pendingIds = new Set(influencers.map(i=>i.name));
        const pendingFiltered = pending.filter(p=>!pendingIds.has(p.name));
        const allRows = [...influencers, ...pendingFiltered];
        return null; // handled below
      })()}
      {influencers.length===0&&pending.length===0&&!addingNew&&(
        <div style={{padding:"36px",textAlign:"center",color:T.dim,fontSize:13}}>
          <div style={{fontSize:28,marginBottom:8}}>📅</div>
          Aucun influenceur prévu en {mthLabel(selMonth)}
        </div>
      )}

      {/* Rows - real + pending optimistic */}
      {[...influencers, ...pending.filter(p=>!influencers.some(i=>i.name===p.name))].map((inf)=>(
        <div key={inf.id} style={{position:"relative"}}>
          <div style={{display:"flex",borderBottom:`1px solid ${T.border}`,height:44,alignItems:"center",transition:"background 0.1s"}}
            onMouseEnter={e=>e.currentTarget.style.background=T.s2}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>

            {/* Name */}
            <Cell inf={inf} field="name" width={COL_W.name}>
              <div style={{fontSize:12.5,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingLeft:2}}>{inf.name||<span style={{color:T.dim}}>—</span>}</div>
            </Cell>

            {/* Platform */}
            <Cell inf={inf} field="platform" width={COL_W.platform} center>
              <Badge label={inf.platform||"—"} color={PLAT_COLOR[inf.platform]||"#888"} small/>
            </Cell>

            {/* Location */}
            <Cell inf={inf} field="location" width={COL_W.location} center>
              <span style={{fontSize:11,color:T.muted}}>{inf.location||"—"}</span>
            </Cell>

            {/* Followers */}
            <Cell inf={inf} field="followers" width={COL_W.followers} center>
              <span style={{fontSize:12,fontWeight:600}}>{inf.followers||<span style={{color:T.dim}}>—</span>}</span>
            </Cell>

            {/* Cost */}
            <Cell inf={inf} field="cost" width={COL_W.cost} center>
              <span style={{fontSize:12,fontWeight:700,color:inf.cost?ws.color:T.dim}}>{inf.cost?(+inf.cost).toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0}):"—"}</span>
            </Cell>

            {/* Status */}
            <Cell inf={inf} field="status" width={COL_W.status} center>
              <Badge label={inf.status||"—"} color={INFL_STATUS[inf.status]||"#6b6b6b"} small/>
            </Cell>

            {/* Visit — calendar popup */}
            <Cell inf={inf} field="visit" width={COL_W.visit} center>
              <span style={{fontSize:11,color:inf.visit?T.text:T.dim,display:"flex",alignItems:"center",gap:4}}>
                {inf.visit||"📅 Ajouter"}
              </span>
            </Cell>

            {/* Content */}
            <Cell inf={inf} field="content" width={COL_W.content}>
              <span style={{fontSize:11,color:T.dim,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inf.content||"—"}</span>
            </Cell>

            {/* Delete */}
            <div style={{width:COL_W.del,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <button onClick={e=>{e.stopPropagation();if(window.confirm("Supprimer "+inf.name+" ?"))deleteInfluencer(inf.id);}}
                style={{background:"transparent",border:"none",color:T.dim,cursor:"pointer",fontSize:13,padding:4,borderRadius:4,transition:"all 0.1s"}}
                onMouseEnter={e=>{e.currentTarget.style.color="#FF3B30";e.currentTarget.style.background="#FF3B3015";}}
                onMouseLeave={e=>{e.currentTarget.style.color=T.dim;e.currentTarget.style.background="transparent";}}>
                ✕
              </button>
            </div>
          </div>

          {/* Calendar dropdown for visit field */}
          {showCal===inf.id&&(
            <div onClick={e=>e.stopPropagation()} style={{
              position:"absolute",left:COL_W.name+COL_W.platform+COL_W.location+COL_W.followers+COL_W.cost+COL_W.status,
              top:"100%",zIndex:200,
              width:260,
              boxShadow:"0 12px 32px rgba(0,0,0,0.3)",
              borderRadius:12,overflow:"hidden",
              border:`1px solid ${T.border}`,
            }}>
              <DatePicker value={visitToISO(inf.visit)} onChange={v=>{if(v)commitVisit(inf,v);else{updateInfluencer(inf.id,{...inf,visit:""});setShowCal(null);}}} color={ws.color} T={T}/>
            </div>
          )}
        </div>
      ))}

      {/* ── ADD NEW ROW ── */}
      {addingNew&&(
        <div style={{display:"flex",borderBottom:`1px solid ${T.border}`,height:44,alignItems:"center",background:ws.color+"08"}}>
          <div style={{width:COL_W.name,minWidth:COL_W.name,padding:"0 8px",borderRight:`1px solid ${T.border}`}}>
            <input autoFocus value={newRow.name} onChange={e=>setNewRow(r=>({...r,name:e.target.value}))}
              onKeyDown={e=>{if(e.key==="Enter")saveNewRow();if(e.key==="Escape")setAddingNew(false);}}
              placeholder="@handle ou nom..." style={{background:"transparent",border:"none",fontSize:12,fontWeight:600,color:T.text,width:"100%",outline:"none",fontFamily:"inherit"}}/>
          </div>
          <div style={{width:COL_W.platform,minWidth:COL_W.platform,padding:"0 6px",borderRight:`1px solid ${T.border}`}}>
            <select value={newRow.platform} onChange={e=>setNewRow(r=>({...r,platform:e.target.value}))}
              style={{background:"transparent",border:"none",fontSize:12,color:T.text,width:"100%",outline:"none",fontFamily:"inherit"}}>
              {PLATFORMS.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div style={{width:COL_W.location,minWidth:COL_W.location,padding:"0 6px",borderRight:`1px solid ${T.border}`}}>
            <select value={newRow.location} onChange={e=>setNewRow(r=>({...r,location:e.target.value}))}
              style={{background:"transparent",border:"none",fontSize:12,color:T.text,width:"100%",outline:"none",fontFamily:"inherit"}}>
              {LOCATIONS_INFL.map(l=><option key={l}>{l}</option>)}
            </select>
          </div>
          <div style={{width:COL_W.followers,minWidth:COL_W.followers,padding:"0 6px",borderRight:`1px solid ${T.border}`}}>
            <input value={newRow.followers} onChange={e=>setNewRow(r=>({...r,followers:e.target.value}))}
              placeholder="45K" style={{background:"transparent",border:"none",fontSize:12,color:T.text,width:"100%",outline:"none",fontFamily:"inherit"}}/>
          </div>
          <div style={{width:COL_W.cost,minWidth:COL_W.cost,padding:"0 6px",borderRight:`1px solid ${T.border}`}}>
            <input type="number" value={newRow.cost} onChange={e=>setNewRow(r=>({...r,cost:e.target.value}))}
              placeholder="500" style={{background:"transparent",border:"none",fontSize:12,color:T.text,width:"100%",outline:"none",fontFamily:"inherit"}}/>
          </div>
          <div style={{width:COL_W.status,minWidth:COL_W.status,padding:"0 6px",borderRight:`1px solid ${T.border}`}}>
            <select value={newRow.status} onChange={e=>setNewRow(r=>({...r,status:e.target.value}))}
              style={{background:"transparent",border:"none",fontSize:12,color:T.text,width:"100%",outline:"none",fontFamily:"inherit"}}>
              {STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div style={{width:COL_W.visit,minWidth:COL_W.visit,padding:"0 6px",borderRight:`1px solid ${T.border}`}}>
            <input value={newRow.visit} onChange={e=>setNewRow(r=>({...r,visit:e.target.value}))}
              placeholder="May 3" style={{background:"transparent",border:"none",fontSize:12,color:T.text,width:"100%",outline:"none",fontFamily:"inherit"}}/>
          </div>
          <div style={{width:COL_W.content,minWidth:COL_W.content,padding:"0 6px",borderRight:`1px solid ${T.border}`}}>
            <input value={newRow.content} onChange={e=>setNewRow(r=>({...r,content:e.target.value}))}
              placeholder="Reel + Story" style={{background:"transparent",border:"none",fontSize:12,color:T.text,width:"100%",outline:"none",fontFamily:"inherit"}}/>
          </div>
          <div style={{display:"flex",gap:4,padding:"0 6px"}}>
            <button onClick={saveNewRow} style={{background:ws.color,border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:700,padding:"4px 10px",cursor:"pointer"}}>✓</button>
            <button onClick={()=>setAddingNew(false)} style={{background:"transparent",border:"none",color:T.dim,fontSize:13,cursor:"pointer"}}>✕</button>
          </div>
        </div>
      )}

      {/* Add row button */}
      <button onClick={()=>{setAddingNew(true);setShowCal(null);setEditId(null);}}
        style={{width:"100%",padding:"10px 16px",background:"transparent",border:"none",color:T.muted,fontSize:12,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:6,transition:"background 0.1s"}}
        onMouseEnter={e=>e.currentTarget.style.background=T.s2}
        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <span style={{fontSize:16,opacity:0.5}}>+</span>
        Ajouter un influenceur
      </button>
    </div>
  );
}



// ─── CALENDAR ─────────────────────────────────────────────────────────────
function CalModule({ws,calEvents,T,t,setModal}){
  const [calView,setCV]=useState("timeline");
  const [month,setMonth]=useState(NM);
  const [selCats,setSC]=useState([...CAL_CATS]);
  const [selLoc,setSL]=useState("Global");
  const LOC_COLOR={"Global":"#6b6b6b","Vancouver":"#0A84FF","Toronto":"#BF5AF2","Seattle":"#00C896","Miami":"#FF6B00"};
  const LOC_FLAG={"Global":"🌐","Vancouver":"🇨🇦","Toronto":"🇨🇦","Seattle":"🇺🇸","Miami":"🇺🇸"};

  const events=calEvents.filter(e=>{
    const catOk=selCats.includes(e.category);
    const locOk=selLoc==="Global"||e.location==="Global"||e.location===selLoc;
    return catOk&&locOk;
  });
  const tlMonths=Array.from({length:6},(_,i)=>((NM-1+i)%12)+1);
  const dIM=DIM[month-1],off=mOff(month,NY);
  const cells=[...Array(off).fill(null),...Array.from({length:dIM},(_,i)=>i+1)];
  const mEvs=events.filter(e=>{const s=toInt(e.month,e.day),en=e.end_month?toInt(e.end_month,e.end_day):s;return en>=toInt(month,1)&&s<=toInt(month,dIM);}).sort((a,b)=>toInt(a.month,a.day)-toInt(b.month,b.day));

  return(
    <div>
      {/* Controls */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        {["timeline","month"].map(v=>(
          <button key={v} onClick={()=>setCV(v)} style={{background:calView===v?ws.color:T.s2,color:calView===v?"#fff":T.muted,border:`1px solid ${calView===v?ws.color:T.border}`,borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:calView===v?600:400,cursor:"pointer"}}>
            {v==="timeline"?"📋 Timeline":"📅 Grille"}
          </button>
        ))}
        <div style={{width:1,height:20,background:T.border,margin:"0 4px"}}/>
        {/* Location filter */}
        {["Global",...LOCATIONS.slice(1)].map(l=>(
          <button key={l} onClick={()=>setSL(l)} style={{background:selLoc===l?LOC_COLOR[l]+"22":T.s2,color:selLoc===l?LOC_COLOR[l]:T.muted,border:`1px solid ${selLoc===l?LOC_COLOR[l]:T.border}`,borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:selLoc===l?700:400,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>

// ─── PRODUCTS PIPELINE ────────────────────────────────────────────────────
const PHASES = ["Idée","Test","Pré-lancement","Lancement","Actif","Archivé"];
const PHASE_COLOR = {
  "Idée":"#6b6b6b","Test":"#0A84FF","Pré-lancement":"#FF9F0A",
  "Lancement":"#FF6B00","Actif":"#00C896","Archivé":"#444"
};

function Products2({ws,products,setModal,updateProduct,T,t}){
  const [selected,setSelected]=useState(null);
  const [newUpdate,setNewUpdate]=useState("");
  const product=selected?products.find(p=>p.id===selected):null;

  function advancePhase(prod,ph){
    updateProduct(prod.id,{phase:ph});
    // Also add automatic update log
    const ts=new Date().toLocaleString("fr-CA",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
    const upd=[...(prod.updates||[]),{text:"Phase changée → "+ph,author:"Tito",phase:ph,timestamp:ts,auto:true}];
    updateProduct(prod.id,{phase:ph,updates:upd});
  }

  if(product){
    const updates=product.updates||[];
    const currentPhaseIdx=PHASES.indexOf(product.phase);
    return(
      <div>
        <button onClick={()=>setSelected(null)} style={{display:"flex",alignItems:"center",gap:6,background:"transparent",border:"none",color:T.muted,fontSize:13,cursor:"pointer",marginBottom:18,padding:0}}>

        </button>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>

            <Card T={T}>
              <div style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:16}}>
                <div style={{width:52,height:52,borderRadius:12,background:PHASE_COLOR[product.phase]+"22",border:`2px solid ${PHASE_COLOR[product.phase]}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>🚀</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>{product.title}</div>
                  <Badge label={product.phase} color={PHASE_COLOR[product.phase]||"#777"}/>
                </div>
              </div>
              {product.description&&<div style={{fontSize:13,color:T.muted,lineHeight:1.6,marginBottom:12}}>{product.description}</div>}
              <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:12}}>
                {product.locations&&product.locations.length>0?(
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {product.locations.map(loc=>(
                      <span key={loc} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:ws.color+"22",color:ws.color,fontWeight:600}}>📍 {loc}</span>
                    ))}
                  </div>
                ):product.location&&<div style={{fontSize:11,color:T.muted}}>📍 {product.location}</div>}
                {product.price&&<div style={{fontSize:11,color:ws.color,fontWeight:700}}>💰 {product.price}$</div>}
                {product.target&&<div style={{fontSize:11,color:T.muted}}>🎯 {product.target}</div>}
              </div>
              <button onClick={()=>setModal({type:"edit_products",payload:product})} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:6,padding:"6px 14px",fontSize:11,color:T.muted,cursor:"pointer"}}>✏ Modifier</button>
            </Card>

            {/* Pipeline interactif */}
            <Card T={T}>
              <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:14}}>PIPELINE DE LANCEMENT</div>
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                {PHASES.map((ph,i)=>{
                  const isCurrent=product.phase===ph;
                  const isPast=currentPhaseIdx>i;
                  const isFuture=!isCurrent&&!isPast;
                  const c=PHASE_COLOR[ph];
                  return(
                    <div key={ph}
                      onClick={()=>advancePhase(product,ph)}
                      style={{
                        display:"flex",alignItems:"center",gap:10,padding:"11px 14px",
                        borderRadius:10,cursor:"pointer",
                        background:isCurrent?c+"18":isPast?T.s2:"transparent",
                        border:`1.5px solid ${isCurrent?c:isPast?"#00C89644":"transparent"}`,
                        transition:"all 0.15s",
                      }}
                      onMouseEnter={e=>{e.currentTarget.style.background=isCurrent?c+"25":"#00C89615";e.currentTarget.style.borderColor=isCurrent?c:"#00C89666";}}
                      onMouseLeave={e=>{e.currentTarget.style.background=isCurrent?c+"18":isPast?T.s2:"transparent";e.currentTarget.style.borderColor=isCurrent?c:isPast?"#00C89644":"transparent";}}
                    >
                      {/* Step indicator */}
                      <div style={{
                        width:28,height:28,borderRadius:"50%",flexShrink:0,
                        background:isPast?"#00C896":isCurrent?c:"transparent",
                        border:`2px solid ${isPast?"#00C896":isCurrent?c:T.border}`,
                        display:"flex",alignItems:"center",justifyContent:"center",
                        transition:"all 0.2s",

                        {isPast&&<span style={{color:"#fff",fontSize:12,fontWeight:900}}>✓</span>}

                      {isCurrent&&(
                        <span style={{fontSize:9,fontWeight:700,color:c,background:c+"22",padding:"2px 8px",borderRadius:8}}>EN COURS</span>
                      )}
                      {isPast&&(
                        <span style={{fontSize:9,color:"#00C896",fontWeight:600}}>Terminé</span>
                      )}
                      {isFuture&&(
                        <span style={{fontSize:9,color:T.dim}}>Cliquer pour avancer</span>
                      )}
                    </div>
                  );

              </div>
              {/* Quick advance button */}
              {currentPhaseIdx < PHASES.length-1 && (
                <button onClick={()=>advancePhase(product,PHASES[currentPhaseIdx+1])}
                  style={{marginTop:12,width:"100%",background:ws.color,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>

          {/* Updates feed */}

            <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:14}}>📡 UPDATES EN LIVE</div>
            <div style={{flex:1,overflowY:"auto",maxHeight:320,marginBottom:14}}>
              {updates.length===0&&<div style={{fontSize:12,color:T.dim,fontStyle:"italic",textAlign:"center",padding:"20px 0"}}>Aucun update pour l’instant.</div>}
              {updates.slice().reverse().map((u,i)=>(
                <div key={i} style={{marginBottom:12,paddingBottom:12,borderBottom:i<updates.length-1?`1px solid ${T.border}`:"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <Avatar name={u.author} size={20} color={ws.color}/>
                    <span style={{fontSize:11,fontWeight:600}}>{u.author}</span>
                    <Badge label={u.phase} color={PHASE_COLOR[u.phase]||"#777"} small/>
                    {u.auto&&<span style={{fontSize:9,color:T.dim,background:T.s3,padding:"1px 5px",borderRadius:4}}>auto</span>}
                    <span style={{fontSize:9,color:T.dim,marginLeft:"auto"}}>{u.timestamp}</span>
                  </div>
                  <div style={{fontSize:13,color:u.auto?T.muted:T.text,lineHeight:1.5,paddingLeft:28,fontStyle:u.auto?"italic":"normal"}}>{u.text}</div>
                </div>
              ))}
            </div>
            <div style={{borderTop:`1px solid ${T.border}`,paddingTop:12}}>
              <textarea value={newUpdate} onChange={e=>setNewUpdate(e.target.value)}
                placeholder="Ajouter un update..."
                style={{width:"100%",minHeight:70,background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"8px 10px",fontSize:13,color:T.text,resize:"none",marginBottom:8,fontFamily:"DM Sans,sans-serif"}}/>
              <button onClick={()=>{
                if(!newUpdate.trim())return;
                const ts=new Date().toLocaleString("fr-CA",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
                const upd=[...(product.updates||[]),{text:newUpdate,author:"Tito",phase:product.phase,timestamp:ts}];
                updateProduct(product.id,{updates:upd});
                setNewUpdate("");
              }} style={{background:ws.color,color:"#fff",border:"none",borderRadius:7,padding:"8px 16px",fontSize:12,fontWeight:600,cursor:"pointer",width:"100%"}}>
                Publier update
              </button>
            </div>
          </Card>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {PHASES.filter(ph=>products.some(p=>p.phase===ph)).map(ph=>{
        const phProds=products.filter(p=>p.phase===ph);
        const c=PHASE_COLOR[ph];
        return(
          <div key={ph}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:c,boxShadow:`0 0 6px ${c}88`}}/>

              <span style={{fontSize:11,color:T.dim,background:T.s2,padding:"1px 8px",borderRadius:10}}>{phProds.length}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {phProds.map(p=>{
                const locs=p.locations||(p.location?[p.location]:[]);
                const lastUpdate=(p.updates||[]).filter(u=>!u.auto).slice(-1)[0];
                const currentIdx=PHASES.indexOf(p.phase);
                return(
                  <Card key={p.id} T={T} accent={c} style={{cursor:"pointer"}} onClick={()=>setSelected(p.id)}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <span style={{fontSize:20}}>🚀</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:700}}>{p.title}</div>
                        <div style={{display:"flex",gap:3,flexWrap:"wrap",marginTop:2}}>

                        </div>
                      </div>
                    </div>
                    {/* Mini pipeline */}
                    <div style={{display:"flex",gap:2,marginBottom:8}}>
                      {PHASES.slice(0,-1).map((s,i)=>(

                          flex:1,height:3,borderRadius:2,

                          transition:"all 0.2s",

                    </div>
                    {lastUpdate&&<div style={{fontSize:11,color:T.muted,lineHeight:1.4}}>{lastUpdate.text.slice(0,60)}{lastUpdate.text.length>60?"...":""}</div>}
                    {/* Quick advance button */}
                    {currentIdx<PHASES.length-1&&(
                      <button onClick={e=>{e.stopPropagation();advancePhase(p,PHASES[currentIdx+1]);}}

      })}
      {products.length===0&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:T.dim}}>

          <div style={{fontSize:13}}>Ajoute ton premier produit pour suivre son pipeline</div>
