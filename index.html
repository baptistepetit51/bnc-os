const EXP_CATS = ["Équipement","Ingrédients","Marketing","RH","Loyer/Opérations","Tech","Autre"];

function getMonths(){
  const months=[];
  const now=new Date();
  for(let i=0;i<6;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const key=d.toISOString().slice(0,7);
    const label=d.toLocaleDateString("fr-CA",{month:"long",year:"numeric"});
    months.push({key,label,isCurrent:i===0});
  }
  return months;
}

function Expenses({ws,expenses,setModal,sendUrgentAlert,T,mediaBudget,influencers,updateExpense}){
  const [locFilt,  setLocFilt]  = useState("Global");
  const [selMonth, setSelMonth] = useState(new Date().toISOString().slice(0,7));
  const months = getMonths();

  const filtered = expenses.filter(e => {
    const matchLoc = locFilt==="Global" || e.location===locFilt;
    const matchMonth = !e.due_date || e.due_date.slice(0,7)===selMonth;
    return matchLoc && matchMonth;
  });

  // ALL filtered expenses count toward budget (À payer + Payé)
  const grandTotal    = filtered.reduce((s,e)=>s+(+e.amount||0),0);
  const totalPaid     = filtered.filter(e=>e.payment_status==="Payé").reduce((s,e)=>s+(+e.amount||0),0);
  const totalUnpaid   = filtered.filter(e=>e.payment_status!=="Payé").reduce((s,e)=>s+(+e.amount||0),0);
  const totalByUrgency = (u) => filtered.filter(e=>e.urgency===u).reduce((s,e)=>s+(+e.amount||0),0);

  // Media budget & influencer spend this month
  const mediaBudgetEntry = (mediaBudget||[]).find(b=>b.month===selMonth&&b.location==="Global");
  const mediaBudgetAmt   = mediaBudgetEntry ? +mediaBudgetEntry.budget : 0;
  const inflSpend        = (influencers||[]).filter(i=>i.cost&&i.status!=="Annulé").reduce((s,i)=>s+(+i.cost||0),0);
  const totalConsolidé   = grandTotal + inflSpend;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>

      {/* Month selector */}
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
        {months.map(m=>(
          <button key={m.key} onClick={()=>setSelMonth(m.key)} style={{
            background:selMonth===m.key?ws.color:T.s2,
            color:selMonth===m.key?"#fff":T.muted,
            border:`1px solid ${selMonth===m.key?ws.color:T.border}`,
            borderRadius:20,padding:"5px 14px",fontSize:11,
            fontWeight:selMonth===m.key?700:400,
            whiteSpace:"nowrap",flexShrink:0,cursor:"pointer",
            boxShadow:m.isCurrent&&selMonth!==m.key?`0 0 0 2px ${ws.color}44`:"none",
          }}>
            {m.isCurrent?"📍 ":""}{m.label}
          </button>
        ))}
      </div>

      {/* Location filter */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:9,color:T.muted,letterSpacing:2}}>LOCATION</span>
        {LOCATIONS.map(l=>(
          <button key={l} onClick={()=>setLocFilt(l)} style={{background:locFilt===l?ws.color:T.s2,color:locFilt===l?"#fff":T.muted,border:`1px solid ${locFilt===l?ws.color:T.border}`,borderRadius:20,padding:"3px 11px",fontSize:10,fontWeight:locFilt===l?600:400,cursor:"pointer"}}>{l}</button>
        ))}
      </div>

      {/* Consolidated totals */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"14px 16px",borderLeft:`3px solid ${ws.color}`}}>
          <div style={{fontSize:9,color:T.muted,letterSpacing:1,marginBottom:6}}>DÉPENSES OPS</div>
          <div style={{fontSize:22,fontWeight:800,color:ws.color}}>{grandTotal.toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</div>
          <div style={{fontSize:10,color:T.muted,marginTop:4}}>{filtered.length} entrée{filtered.length!==1?"s":""}</div>
        </div>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"14px 16px",borderLeft:"3px solid #BF5AF2"}}>
          <div style={{fontSize:9,color:T.muted,letterSpacing:1,marginBottom:6}}>BUDGET INFLUENCEURS</div>
          <div style={{fontSize:22,fontWeight:800,color:"#BF5AF2"}}>{mediaBudgetAmt.toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</div>
          <div style={{fontSize:10,color:T.muted,marginTop:4}}>Alloué ce mois</div>
        </div>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"14px 16px",borderLeft:"3px solid #FF9F0A"}}>
          <div style={{fontSize:9,color:T.muted,letterSpacing:1,marginBottom:6}}>DÉPENSÉ INFLUENCEURS</div>
          <div style={{fontSize:22,fontWeight:800,color:inflSpend>mediaBudgetAmt&&mediaBudgetAmt>0?"#FF3B30":"#FF9F0A"}}>{inflSpend.toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</div>
          <div style={{fontSize:10,color:T.muted,marginTop:4}}>{mediaBudgetAmt>0?(mediaBudgetAmt-inflSpend).toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})+" restant":"—"}</div>
        </div>
        <div style={{background:ws.color+"15",border:`1px solid ${ws.color}`,borderRadius:10,padding:"14px 16px"}}>
          <div style={{fontSize:9,color:ws.color,letterSpacing:1,marginBottom:6,fontWeight:700}}>TOTAL CONSOLIDÉ</div>
          <div style={{fontSize:22,fontWeight:800,color:ws.color}}>{totalConsolidé.toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</div>
          <div style={{fontSize:10,color:T.muted,marginTop:4}}>Ops + Influenceurs</div>
        </div>
      </div>

      {/* Media budget bar */}
      {mediaBudgetAmt>0&&(
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:"12px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:11,color:T.muted}}>Budget influenceurs utilisé</span>
            <span style={{fontSize:11,fontWeight:700,color:inflSpend>mediaBudgetAmt?"#FF3B30":"#00C896"}}>{Math.round((inflSpend/mediaBudgetAmt)*100)}%</span>
          </div>
          <div style={{height:8,background:T.s3,borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:Math.min(100,(inflSpend/mediaBudgetAmt)*100)+"%",background:inflSpend>mediaBudgetAmt?"#FF3B30":ws.color,borderRadius:4,transition:"width 0.4s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
            <span style={{fontSize:10,color:T.dim}}>Dépensé: {inflSpend.toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</span>
            <span style={{fontSize:10,color:T.dim}}>Budget: {mediaBudgetAmt.toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</span>
          </div>
        </div>
      )}

      {/* Urgency KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {Object.entries(URGENCY).map(([u,uc])=>(
          <div key={u} style={{background:uc.bg,border:`1px solid ${uc.color}33`,borderRadius:8,padding:"12px 14px",borderLeft:`3px solid ${uc.color}`}}>
            <div style={{fontSize:16,marginBottom:4}}>{uc.icon}</div>
            <div style={{fontSize:10,fontWeight:700,color:uc.color,marginBottom:4,letterSpacing:0.5}}>{u.toUpperCase()}</div>
            <div style={{fontSize:20,fontWeight:800,color:uc.color}}>{totalByUrgency(u).toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</div>
            <div style={{fontSize:9,color:T.muted,marginTop:2}}>{filtered.filter(e=>e.urgency===u).length} dépense{filtered.filter(e=>e.urgency===u).length!==1?"s":""}</div>
          </div>
        ))}
      </div>

      {/* Expenses list */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 110px 80px",padding:"10px 16px",background:T.s2,borderBottom:`1px solid ${T.border}`}}>
          {["Dépense","Catégorie","Location","Montant","Urgence","Échéance",""].map((h,i)=>(
            <div key={i} style={{fontSize:9,fontWeight:700,color:T.muted,letterSpacing:0.5}}>{h.toUpperCase()}</div>
          ))}
        </div>
        {filtered.length===0&&(
          <div style={{padding:"40px",textAlign:"center",color:T.dim}}>
            <div style={{fontSize:28,marginBottom:8}}>💸</div>
            <div style={{fontSize:13}}>Aucune dépense pour {months.find(m=>m.key===selMonth)?.label}</div>
          </div>
        )}
        {filtered.sort((a,b)=>{const order=["Critique","Haute","Moyenne","Basse"];return order.indexOf(a.urgency)-order.indexOf(b.urgency);}).map((exp,i)=>{
          const uc=URGENCY[exp.urgency]||URGENCY["Moyenne"];
          return(
            <div key={exp.id}
              style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 110px 80px",padding:"12px 16px",alignItems:"center",borderBottom:i<filtered.length-1?`1px solid ${T.border}`:"none",borderLeft:`3px solid ${uc.color}`,cursor:"pointer",transition:"background 0.1s"}}
              onMouseEnter={e=>e.currentTarget.style.background=T.s2}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{exp.title}</div>
                {exp.notes&&<div style={{fontSize:10,color:T.muted,marginTop:2}}>{exp.notes}</div>}
              </div>
              <Badge label={exp.category||"Autre"} color={ws.color} small/>
              <span style={{fontSize:11,color:T.muted}}>{exp.location}</span>
              <span style={{fontSize:14,fontWeight:800,color:uc.color}}>{(+exp.amount||0).toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</span>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:13}}>{uc.icon}</span>
                <span style={{fontSize:10,fontWeight:600,color:uc.color}}>{exp.urgency}</span>
              </div>
              <span style={{fontSize:11,color:T.muted}}>{exp.due_date?new Date(exp.due_date+"T12:00:00").toLocaleDateString("fr-CA",{month:"short",day:"numeric",year:"numeric"}):"—"}</span>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                {/* Payment toggle */}
                {(()=>{
                  const ps = PAY_STATUS[exp.payment_status]||PAY_STATUS["À payer"];
                  return(
                    <button onClick={e=>{
                      e.stopPropagation();
                      const next = exp.payment_status==="Payé"?"À payer":"Payé";
                      // If marking as paid, also add to expenses automatically
                      updateExpense(exp.id,{...exp,payment_status:next});
                    }} style={{
                      background:ps.bg,border:`1px solid ${ps.color}44`,
                      borderRadius:7,padding:"4px 10px",
                      fontSize:10,fontWeight:700,color:ps.color,
                      cursor:"pointer",transition:"all 0.15s",
                      display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap",
                    }}>
                      <span>{ps.icon}</span>{ps.label}
                    </button>
                  );
                })()}
                <button onClick={()=>setModal({type:"edit_expenses",payload:exp})} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:5,padding:"4px 8px",fontSize:10,color:T.muted,cursor:"pointer"}}>✏</button>
                {(exp.urgency==="Critique"||exp.urgency==="Haute")&&(
                  <button onClick={()=>sendUrgentAlert(exp)} style={{background:"#FF3B3022",border:"1px solid #FF3B3044",borderRadius:5,padding:"4px 8px",fontSize:11,color:"#FF3B30",cursor:"pointer"}}>🚨</button>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── CLIENTS ──────────────────────────────────────────────────────────────
const CLIENT_STATUS = {
  "Prospect":   "#6b6b6b",
  "Contacté":   "#FF9F0A",
  "Call booké": "#0A84FF",
  "Propositon": "#BF5AF2",
  "Signé":      "#00C896",
  "Perdu":      "#FF3B30",
};

function Clients({ws,clients,setModal,T}){
  const [sel,setSel]=useState(null);
  const client=sel?clients.find(c=>c.id===sel):null;

  if(client){
    return(
      <div>
        <button onClick={()=>setSel(null)} style={{display:"flex",alignItems:"center",gap:6,background:"transparent",border:"none",color:T.muted,fontSize:13,cursor:"pointer",marginBottom:18,padding:0}}>
          ← Retour aux clients
        </button>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:T.surface,border:`1px solid ${ws.color}44`,borderRadius:10,padding:"20px",borderLeft:`4px solid ${ws.color}`}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
                <div style={{width:48,height:48,borderRadius:"50%",background:ws.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:700,color:ws.color}}>{client.name?.[0]?.toUpperCase()}</div>
                <div>
                  <div style={{fontSize:18,fontWeight:800}}>{client.name}</div>
                  <div style={{fontSize:12,color:T.muted}}>{client.business||""}</div>
                </div>
                <div style={{marginLeft:"auto"}}>
                  <span style={{background:CLIENT_STATUS[client.status]+"22",color:CLIENT_STATUS[client.status],border:`1px solid ${CLIENT_STATUS[client.status]}44`,borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:700}}>{client.status}</span>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                {client.email&&<div><div style={{fontSize:9,color:T.dim,marginBottom:2}}>EMAIL</div><div style={{fontSize:12,color:T.text}}>{client.email}</div></div>}
                {client.phone&&<div><div style={{fontSize:9,color:T.dim,marginBottom:2}}>TÉLÉPHONE</div><div style={{fontSize:12,color:T.text}}>{client.phone}</div></div>}
                {client.platform&&<div><div style={{fontSize:9,color:T.dim,marginBottom:2}}>PLATEFORME</div><div style={{fontSize:12,color:T.text}}>{client.platform}</div></div>}
                {client.tier&&<div><div style={{fontSize:9,color:T.dim,marginBottom:2}}>TIER</div><div style={{fontSize:12,fontWeight:700,color:ws.color}}>{client.tier}</div></div>}
                {client.revenue&&<div><div style={{fontSize:9,color:T.dim,marginBottom:2}}>VALEUR</div><div style={{fontSize:13,fontWeight:800,color:"#00C896"}}>{client.revenue}$</div></div>}
                {client.source&&<div><div style={{fontSize:9,color:T.dim,marginBottom:2}}>SOURCE</div><div style={{fontSize:12,color:T.muted}}>{client.source}</div></div>}
              </div>
              {client.notes&&<div style={{fontSize:12,color:T.muted,lineHeight:1.6,background:T.s2,borderRadius:7,padding:"10px 12px"}}>{client.notes}</div>}
              <button onClick={()=>setModal({type:"edit_clients",payload:client})} style={{marginTop:12,background:T.s2,border:`1px solid ${T.border}`,borderRadius:6,padding:"6px 14px",fontSize:11,color:T.muted,cursor:"pointer"}}>✏ Modifier</button>
            </div>

            {/* Change status */}
            <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"16px"}}>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:12}}>PIPELINE</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {Object.entries(CLIENT_STATUS).map(([st,c])=>{
                  const isCurr=client.status===st;
                  const idx=Object.keys(CLIENT_STATUS).indexOf(st);
                  const currIdx=Object.keys(CLIENT_STATUS).indexOf(client.status);
                  const isPast=idx<currIdx;
                  return(
                    <div key={st} onClick={()=>{lsUpd("clients",client.id,{status:st});setSel(client.id);}} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:7,cursor:"pointer",background:isCurr?c+"18":"transparent",border:`1px solid ${isCurr?c:"transparent"}`,transition:"all 0.1s"}}
                      onMouseEnter={e=>e.currentTarget.style.background=c+"12"} onMouseLeave={e=>e.currentTarget.style.background=isCurr?c+"18":"transparent"}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:isCurr?c:isPast?"#00C896":"transparent",border:`2px solid ${isCurr?c:isPast?"#00C896":T.border}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {isPast&&<span style={{color:"#fff",fontSize:9,fontWeight:700}}>✓</span>}
                        {isCurr&&<div style={{width:6,height:6,borderRadius:"50%",background:"#fff"}}/>}
                      </div>
                      <span style={{fontSize:12,fontWeight:isCurr?700:400,color:isCurr?c:T.muted}}>{st}</span>
                      {isCurr&&<span style={{marginLeft:"auto",fontSize:9,color:c,fontWeight:700}}>ACTUEL</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Interactions log */}
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"16px",display:"flex",flexDirection:"column"}}>
            <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:12}}>📋 HISTORIQUE INTERACTIONS</div>
            <div style={{flex:1,overflowY:"auto",maxHeight:320,marginBottom:12}}>
              {(client.interactions||[]).length===0&&<div style={{fontSize:12,color:T.dim,fontStyle:"italic",textAlign:"center",padding:"20px 0"}}>Aucune interaction enregistrée</div>}
              {(client.interactions||[]).slice().reverse().map((inter,i)=>(
                <div key={i} style={{marginBottom:10,paddingBottom:10,borderBottom:i<(client.interactions||[]).length-1?`1px solid ${T.border}`:"none"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                    <span style={{fontSize:10,fontWeight:700,color:ws.color}}>{inter.type||"Note"}</span>
                    <span style={{fontSize:9,color:T.dim,marginLeft:"auto"}}>{inter.ts}</span>
                  </div>
                  <div style={{fontSize:12,color:T.text,lineHeight:1.4}}>{inter.text}</div>
                </div>
              ))}
            </div>
            <div style={{borderTop:`1px solid ${T.border}`,paddingTop:12}}>
              <select id={"itype_"+client.id} style={{width:"100%",background:T.s2,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,padding:"6px 10px",fontSize:12,marginBottom:8}}>
                {["Appel","Email","DM","Meeting","Note","Proposition envoyée","Contrat signé"].map(t=><option key={t}>{t}</option>)}
              </select>
              <textarea id={"inote_"+client.id} placeholder="Détails de l'interaction..." style={{width:"100%",minHeight:60,background:T.s2,border:`1px solid ${T.border}`,borderRadius:6,padding:"8px 10px",fontSize:12,color:T.text,resize:"none",marginBottom:8}}/>
              <button onClick={()=>{
                const sel_el=document.getElementById("itype_"+client.id);
                const note_el=document.getElementById("inote_"+client.id);
                if(!note_el.value.trim())return;
                const ts=new Date().toLocaleString("fr-CA",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
                const inter=[...(client.interactions||[]),{type:sel_el.value,text:note_el.value,ts}];
                lsUpd("clients",client.id,{interactions:inter});
                note_el.value="";
                setSel(client.id);
              }} style={{background:ws.color,color:"#fff",border:"none",borderRadius:6,padding:"8px",fontSize:12,fontWeight:600,cursor:"pointer",width:"100%"}}>
                + Ajouter interaction
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // Status counts
  const statusCounts=Object.keys(CLIENT_STATUS).map(s=>({s,count:clients.filter(c=>c.status===s).length,color:CLIENT_STATUS[s]}));
  const totalRevenue=clients.filter(c=>c.status==="Signé"&&c.revenue).reduce((sum,c)=>sum+(+c.revenue||0),0);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10}}>
        {statusCounts.map(({s,count,color})=>(
          <div key={s} style={{background:T.surface,border:`1px solid ${color}33`,borderRadius:8,padding:"10px 12px",borderTop:`3px solid ${color}`}}>
            <div style={{fontSize:18,fontWeight:800,color}}>{count}</div>
            <div style={{fontSize:9,color:T.muted,marginTop:3,fontWeight:600}}>{s.toUpperCase()}</div>
          </div>
        ))}
      </div>

      {totalRevenue>0&&<div style={{background:"#00C89615",border:"1px solid #00C89633",borderRadius:8,padding:"10px 16px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:16}}>💰</span>
        <span style={{fontSize:13,color:"#00C896",fontWeight:700}}>Revenue signé: {totalRevenue.toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</span>
      </div>}

      {/* Client list */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"1.5fr 1fr 1fr 1fr 1fr 80px",padding:"10px 16px",background:T.s2,borderBottom:`1px solid ${T.border}`}}>
          {["Nom / Business","Contact","Plateforme","Tier","Statut",""].map((h,i)=><div key={i} style={{fontSize:9,fontWeight:700,color:T.muted,letterSpacing:0.5}}>{h.toUpperCase()}</div>)}
        </div>
        {clients.length===0&&(
          <div style={{padding:"50px",textAlign:"center",color:T.dim}}>
            <div style={{fontSize:32,marginBottom:10}}>👤</div>
            <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>Aucun client</div>
            <div style={{fontSize:12}}>Ajoute ton premier prospect pour commencer le suivi</div>
          </div>
        )}
        {clients.map((c,i)=>{
          const sc=CLIENT_STATUS[c.status]||"#777";
          return(
            <div key={c.id} onClick={()=>setSel(c.id)}
              style={{display:"grid",gridTemplateColumns:"1.5fr 1fr 1fr 1fr 1fr 80px",padding:"13px 16px",alignItems:"center",borderBottom:i<clients.length-1?`1px solid ${T.border}`:"none",cursor:"pointer",transition:"background 0.1s"}}
              onMouseEnter={e=>e.currentTarget.style.background=T.s2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{c.name}</div>
                {c.business&&<div style={{fontSize:10,color:T.muted}}>{c.business}</div>}
              </div>
              <div style={{fontSize:11,color:T.muted}}>{c.email||c.phone||"—"}</div>
              <div style={{fontSize:11,color:T.muted}}>{c.platform||"—"}</div>
              <div style={{fontSize:11,fontWeight:600,color:ws.color}}>{c.tier||"—"}</div>
              <span style={{background:sc+"22",color:sc,border:`1px solid ${sc}44`,borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:700}}>{c.status}</span>
              <span style={{fontSize:11,color:T.dim}}>→</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── GLOBAL CALENDAR ───────────────────────────────────────────────────────
function GlobalCal({ws,tasks,calEvents,meetings,T,t,setModal}){
  const [curMonth,setCurMonth]=useState(NM);
  const today=new Date(); today.setHours(0,0,0,0);

  // All events merged
  const taskEvents=tasks.filter(tk=>tk.due_date).map(tk=>{
    const d=new Date(tk.due_date+"T00:00:00");
    return{id:"t"+tk.id,month:d.getMonth()+1,day:d.getDate(),title:tk.title,color:TASK_PRI[tk.priority]||"#6b6b6b",type:"task",orig:tk};
  });
  const mtgEvents=meetings.filter(m=>m.meeting_date).map(m=>{
    const d=new Date(m.meeting_date+"T00:00:00");
    return{id:"m"+m.id,month:d.getMonth()+1,day:d.getDate(),title:m.title,color:"#FF9F0A",type:"meeting",orig:m};
  });
  const allEvents=[...calEvents.map(e=>({...e,type:"cal",color:e.color||ws.color})),...taskEvents,...mtgEvents];

  const dIM=DIM[curMonth-1];
  const off=mOff(curMonth,NY);
  const cells=[...Array(off).fill(null),...Array.from({length:dIM},(_,i)=>i+1)];
  while(cells.length%7!==0) cells.push(null);

  // Events for selected month
  const monthEvs=allEvents.filter(e=>e.month===curMonth).sort((a,b)=>a.day-b.day);

  const typeLabel={task:"Tâche",meeting:"Meeting",cal:"Event",undefined:"Event"};
  const typeIcon={task:"☑",meeting:"⊕",cal:"⊞"};

  return(
    <div>
      {/* Month nav */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={()=>setCurMonth(m=>m===1?12:m-1)} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"6px 13px",color:T.muted,fontSize:13,cursor:"pointer"}}>◀</button>
        <span style={{fontFamily:"monospace",fontSize:20,fontWeight:800,color:ws.color,flex:1,textAlign:"center"}}>{t.months[curMonth-1].toUpperCase()} {NY}</span>
        <button onClick={()=>setCurMonth(m=>m===12?1:m+1)} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"6px 13px",color:T.muted,fontSize:13,cursor:"pointer"}}>▶</button>
      </div>

      {/* Legend */}
      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        {[["☑ Tâche High","#FF3B30"],["☑ Tâche Medium","#FF9F0A"],["☑ Tâche Low","#6b6b6b"],["⊕ Meeting","#FF9F0A"],["⊞ Event",""+ws.color]].map(([l,c])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:c}}/>
            <span style={{fontSize:10,color:T.muted}}>{l}</span>
          </div>
        ))}
      </div>

      {/* Grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
        {t.days_short.map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:T.dim,padding:"4px 0",fontWeight:700}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:20}}>
        {cells.map((day,idx)=>{
          if(!day)return<div key={"b"+idx} style={{background:T.bg,minHeight:80,borderRadius:4}}/>;
          const isT=curMonth===NM&&day===ND;
          const dEvs=allEvents.filter(e=>e.month===curMonth&&e.day===day);
          return(
            <div key={"d"+day} style={{background:isT?ws.color+"18":T.surface,border:`1px solid ${isT?ws.color:T.border}`,borderRadius:6,minHeight:80,padding:"4px 2px",overflow:"hidden"}}>
              <div style={{fontSize:10,color:isT?ws.color:T.dim,fontWeight:isT?800:400,padding:"0 4px",marginBottom:2}}>{day}</div>
              {dEvs.slice(0,3).map((ev,i)=>(
                <div key={i} style={{background:ev.color,color:"#fff",fontSize:8,padding:"1px 4px",borderRadius:3,marginBottom:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",fontWeight:600,cursor:"pointer"}}
                  title={ev.title}>{typeIcon[ev.type]} {ev.title}</div>
              ))}
              {dEvs.length>3&&<div style={{fontSize:8,color:T.muted,padding:"0 4px"}}>+{dEvs.length-3}</div>}
            </div>
          );
        })}
      </div>

      {/* Month events list */}
      {monthEvs.length>0&&(
        <div>
          <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:12}}>EVENTS DU MOIS — {monthEvs.length}</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {monthEvs.map(ev=>(
              <div key={ev.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:T.surface,border:`1px solid ${T.border}`,borderLeft:`3px solid ${ev.color}`,borderRadius:8}}>
                <div style={{width:36,height:36,borderRadius:8,background:ev.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{typeIcon[ev.type]}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600}}>{ev.title}</div>
                  <div style={{fontSize:10,color:T.muted}}>{typeLabel[ev.type]} · {t.months[curMonth-1]} {ev.day}</div>
                </div>
                <span style={{fontSize:10,color:ev.color,fontWeight:700,background:ev.color+"18",padding:"2px 8px",borderRadius:10}}>{typeLabel[ev.type]}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      {monthEvs.length===0&&(
        <div style={{textAlign:"center",padding:"40px",color:T.dim}}>
          <div style={{fontSize:28,marginBottom:8}}>📅</div>
          <div style={{fontSize:13}}>Aucun event en {t.months[curMonth-1]}</div>
        </div>
      )}
    </div>
  );
}

// ─── DAILY BRIEF ──────────────────────────────────────────────────────────
const WS_META = {
  bnc:  {name:"Brick'N'Cheese", color:"#FF6B00", icon:"🧀"},
  tk:   {name:"Tito's Kitchen", color:"#00C896", icon:"🍳"},
  de:   {name:"Delivery Edge",  color:"#0A84FF", icon:"🚀"},
  tito: {name:"Perso",          color:"#BF5AF2", icon:"💜"},
};

function DailyBrief({ws,user,allTasks,allMeetings,gcalEvents,T,t,setModule,setWsId,addTask}){
  const today=new Date();today.setHours(0,0,0,0);
  const todayStr=today.toISOString().slice(0,10);
  const tomorrowStr=new Date(today.getTime()+86400000).toISOString().slice(0,10);
  const dateDisplay=today.toLocaleDateString("fr-CA",{weekday:"long",day:"numeric",month:"long"});

  // Personal todos (stored locally)
  const [todos,setTodos]=React.useState(()=>{try{return JSON.parse(localStorage.getItem("tito_todos")||"[]");}catch{return[];}});
  const [newTodo,setNewTodo]=React.useState("");
  const [newTodoTime,setNewTodoTime]=React.useState("");
  const [newTodoCat,setNewTodoCat]=React.useState("perso");
  const [mood,setMood]=React.useState(()=>localStorage.getItem("tito_mood")||"");
  const [focus,setFocus]=React.useState(()=>localStorage.getItem("tito_focus")||"");
  const [showAddTodo,setShowAddTodo]=React.useState(false);

  function saveTodos(updated){setTodos(updated);localStorage.setItem("tito_todos",JSON.stringify(updated));}
  function addTodo(){
    if(!newTodo.trim())return;
    const item={id:Date.now(),title:newTodo.trim(),time:newTodoTime,cat:newTodoCat,done:false,date:todayStr};
    saveTodos([...todos,item]);
    setNewTodo("");setNewTodoTime("");setShowAddTodo(false);
  }
  function toggleTodo(id){saveTodos(todos.map(td=>td.id===id?{...td,done:!td.done}:td));}
  function deleteTodo(id){saveTodos(todos.filter(td=>td.id!==id));}

  const todayTodos=todos.filter(td=>td.date===todayStr||!td.date);
  const doneTodos=todayTodos.filter(td=>td.done).length;
  const progress=todayTodos.length>0?Math.round((doneTodos/todayTodos.length)*100):0;

  // Pro tasks urgent
  const urgentTasks=allTasks.filter(tk=>tk.status!=="Done"&&tk.due_date&&tk.due_date<=tomorrowStr);
  // Today meetings
  const PERSONAL_KW2=["fitfoot","push day","pull day","leg day"];
  const allTodayMtgs=[...allMeetings,...(gcalEvents||[]).filter(function(g){
    var t2=(g.title||"").toLowerCase();
    return !PERSONAL_KW2.some(function(k){return t2.includes(k);});
  })];
  const todayMtgs=allTodayMtgs.filter(m=>{
    const d=parseMeetingDate(m);
    if(d) return d.toISOString().slice(0,10)===todayStr;
    const raw=m.date||m.meeting_date||"";
    return raw===todayStr||raw===today.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  });

  const catColors={perso:"#BF5AF2",sante:"#00C896",famille:"#FF9F0A",perso2:"#1a73e8"};
  const catLabels={perso:"Perso",sante:"Santé",famille:"Famille",perso2:"Autre"};
  const moods=["😴","😐","🙂","😊","🔥"];
  const hour=new Date().getHours();
  const greeting=hour<12?"Bonjour":hour<18?"Bon après-midi":"Bonsoir";

  return(
    <div style={{maxWidth:720,margin:"0 auto",display:"flex",flexDirection:"column",gap:20}}>

      {/* Header */}
      <div style={{background:`linear-gradient(135deg,#BF5AF2,#9B59B6)`,borderRadius:16,padding:"24px 28px",color:"#fff"}}>
        <div style={{fontSize:12,opacity:0.8,marginBottom:4,letterSpacing:1}}>{dateDisplay.toUpperCase()}</div>
        <div style={{fontSize:26,fontWeight:900,marginBottom:12}}>{greeting}, {user?.name||"Tito"} 👋</div>
        {/* Mood */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <span style={{fontSize:11,opacity:0.8}}>Humeur :</span>
          {moods.map(m=>(
            <button key={m} onClick={()=>{setMood(m);localStorage.setItem("tito_mood",m);}}
              style={{background:mood===m?"rgba(255,255,255,0.3)":"rgba(255,255,255,0.1)",border:`1.5px solid ${mood===m?"#fff":"transparent"}`,borderRadius:8,padding:"4px 8px",fontSize:16,cursor:"pointer"}}>
              {m}
            </button>
          ))}
        </div>
        {/* Focus du jour */}
        <div>
          <div style={{fontSize:10,opacity:0.7,marginBottom:4,letterSpacing:1}}>MON FOCUS DU JOUR</div>
          <input value={focus} onChange={e=>{setFocus(e.target.value);localStorage.setItem("tito_focus",e.target.value);}}
            placeholder="Sur quoi tu te concentres aujourd'hui ?"
            style={{width:"100%",background:"rgba(255,255,255,0.15)",border:"1.5px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"8px 12px",fontSize:13,color:"#fff",outline:"none",fontFamily:"DM Sans,sans-serif"}}/>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>

        {/* Left — Programme perso */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:1}}>📋 MON PROGRAMME</div>
            <div style={{fontSize:10,color:"#BF5AF2",fontWeight:700}}>{doneTodos}/{todayTodos.length} · {progress}%</div>
          </div>

          {/* Progress bar */}
          {todayTodos.length>0&&(
            <div style={{height:4,background:T.s3,borderRadius:2,marginTop:-6}}>
              <div style={{height:4,width:progress+"%",background:"linear-gradient(90deg,#BF5AF2,#9B59B6)",borderRadius:2,transition:"width 0.4s"}}/>
            </div>
          )}

          {/* Todos */}
          {todayTodos.length===0&&(
            <div style={{textAlign:"center",padding:"24px 16px",color:T.dim,background:T.s2,borderRadius:12}}>
              <div style={{fontSize:28,marginBottom:6}}>✨</div>
              <div style={{fontSize:13}}>Journée vierge — ajoute ton programme !</div>
            </div>
          )}

          {todayTodos.map(td=>(
            <div key={td.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:td.done?T.s2:T.surface,border:`1px solid ${td.done?"#00C89633":T.border}`,borderRadius:10,transition:"all 0.2s"}}>
              <button onClick={()=>toggleTodo(td.id)} style={{
                width:20,height:20,borderRadius:6,border:`2px solid ${td.done?"#00C896":catColors[td.cat]||"#BF5AF2"}`,
                background:td.done?"#00C896":"transparent",flexShrink:0,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",
              }}>{td.done&&<span style={{color:"#fff",fontSize:10,fontWeight:900}}>✓</span>}</button>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500,color:td.done?T.muted:T.text,textDecoration:td.done?"line-through":"none"}}>{td.title}</div>
                {td.time&&<div style={{fontSize:10,color:T.muted,marginTop:1}}>🕐 {td.time}</div>}
              </div>
              <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:(catColors[td.cat]||"#BF5AF2")+"22",color:catColors[td.cat]||"#BF5AF2",fontWeight:600}}>{catLabels[td.cat]||td.cat}</span>
              <button onClick={()=>deleteTodo(td.id)} style={{background:"transparent",border:"none",color:T.dim,fontSize:12,cursor:"pointer"}}>✕</button>
            </div>
          ))}

          {/* Add todo */}
          {!showAddTodo?(
            <button onClick={()=>setShowAddTodo(true)} style={{background:"transparent",border:`1.5px dashed ${T.border}`,borderRadius:10,padding:"10px",fontSize:12,color:T.dim,cursor:"pointer",textAlign:"center",transition:"all 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#BF5AF2";e.currentTarget.style.color="#BF5AF2";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.dim;}}>
              + Ajouter un élément
            </button>
          ):(
            <div style={{background:T.s2,border:`1px solid ${"#BF5AF2"}44`,borderRadius:10,padding:"12px"}}>
              <input value={newTodo} onChange={e=>setNewTodo(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTodo()}
                placeholder="Quoi faire ?" autoFocus
                style={{width:"100%",background:T.surface,border:`1px solid ${T.border}`,borderRadius:7,padding:"7px 10px",fontSize:13,color:T.text,marginBottom:8,fontFamily:"DM Sans,sans-serif"}}/>
              <div style={{display:"flex",gap:6,marginBottom:8}}>
                <input type="time" value={newTodoTime} onChange={e=>setNewTodoTime(e.target.value)}
                  style={{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:7,padding:"5px 8px",fontSize:12,color:T.text}}/>
                <select value={newTodoCat} onChange={e=>setNewTodoCat(e.target.value)}
                  style={{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:7,padding:"5px 8px",fontSize:12,color:T.text}}>
                  {Object.entries(catLabels).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={addTodo} style={{flex:1,background:"#BF5AF2",color:"#fff",border:"none",borderRadius:7,padding:"7px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Ajouter</button>
                <button onClick={()=>setShowAddTodo(false)} style={{background:T.s3,border:`1px solid ${T.border}`,borderRadius:7,padding:"7px 12px",fontSize:12,color:T.muted,cursor:"pointer"}}>✕</button>
              </div>
            </div>
          )}
        </div>

        {/* Right — Meetings + Pro urgences */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>

          {/* Meetings du jour */}
          <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:1}}>📅 MEETINGS AUJOURD'HUI</div>
          {todayMtgs.length===0?(
            <div style={{padding:"12px 16px",background:T.s2,borderRadius:10,fontSize:12,color:T.dim,textAlign:"center"}}>Aucun meeting</div>
          ):todayMtgs.map(m=>(
            <div key={m.id} style={{padding:"12px 14px",background:"#1a73e812",border:"1px solid #1a73e844",borderRadius:10}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{m.title}</div>
              <div style={{fontSize:11,color:"#1a73e8"}}>{m.time||""} · {(m.attendees||[]).join(", ")}</div>
              {m.meet_link&&<a href={m.meet_link} target="_blank" rel="noreferrer" style={{display:"inline-block",marginTop:6,background:"#1a73e8",color:"#fff",borderRadius:6,padding:"4px 12px",fontSize:10,fontWeight:700,textDecoration:"none"}}>Rejoindre</a>}
            </div>
          ))}

          {/* Urgences pro */}
          {urgentTasks.length>0&&(
            <>
              <div style={{fontSize:11,fontWeight:700,color:"#FF3B30",letterSpacing:1}}>🔴 URGENCES PRO</div>
              {urgentTasks.slice(0,5).map(tk=>{
                const wsColor=tk.workspace==="bnc"?"#FF6B00":tk.workspace==="tk"?"#00C896":tk.workspace==="de"?"#0A84FF":"#777";
                return(
                  <div key={tk.id} onClick={()=>{setWsId(tk.workspace);setModule("tasks");}}
                    style={{padding:"10px 14px",background:T.surface,border:`1px solid ${"#FF3B30"}33`,borderRadius:10,cursor:"pointer"}}>
                    <div style={{fontSize:12,fontWeight:600,marginBottom:2}}>{tk.title}</div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontSize:9,padding:"1px 6px",borderRadius:8,background:wsColor+"22",color:wsColor,fontWeight:700}}>{tk.workspace.toUpperCase()}</span>
                      {tk.due_date&&<span style={{fontSize:10,color:"#FF3B30"}}>📅 {tk.due_date}</span>}
                    </div>
                  </div>
                );
              })}
            </>
          )}
        </div>
      </div>

      {/* Evening Review / Plan demain */}
      <EveningPlanner T={T} ws={ws} todayStr={todayStr} tomorrowStr={tomorrowStr}/>

    </div>
  );
}

function EveningPlanner({T,ws,todayStr,tomorrowStr}){
  const [open,setOpen]=React.useState(false);
  const storageKey="tito_evening_"+todayStr;
  const tomorrowKey="tito_todos";

  const [saved,setSaved]=React.useState(()=>{
    try{return JSON.parse(localStorage.getItem(storageKey)||"null");}catch{return null;}
  });
  const [q1,setQ1]=React.useState(saved?.q1||"");
  const [q2,setQ2]=React.useState(saved?.q2||"");
  const [p1,setP1]=React.useState(saved?.p1||"");
  const [p2,setP2]=React.useState(saved?.p2||"");
  const [p3,setP3]=React.useState(saved?.p3||"");

  const hour=new Date().getHours();
  const isEvening=hour>=17;

  function save(){
    const data={q1,q2,p1,p2,p3,date:todayStr};
    localStorage.setItem(storageKey,JSON.stringify(data));
    // Add tomorrow's priorities to todos
    const existing=JSON.parse(localStorage.getItem(tomorrowKey)||"[]");
    const newItems=[p1,p2,p3].filter(Boolean).map(title=>({
      id:Date.now()+Math.random(),title,time:"",cat:"perso",done:false,date:tomorrowStr
    }));
    const cleaned=existing.filter(t=>t.date!==tomorrowStr||!["p1","p2","p3"].includes(t._src));
    localStorage.setItem(tomorrowKey,JSON.stringify([...cleaned,...newItems]));
    setSaved(data);
    setOpen(false);
  }

  const tomorrowLabel=new Date(tomorrowStr+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});

  if(saved&&!open){
    return(
      <div style={{background:`linear-gradient(135deg,${ws.color}15,#BF5AF215)`,border:`1px solid ${ws.color}33`,borderRadius:16,padding:"20px 24px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:ws.color,letterSpacing:1,marginBottom:2}}>✅ EVENING REVIEW COMPLÉTÉ</div>
            <div style={{fontSize:13,color:T.muted}}>Prêt pour {tomorrowLabel}</div>
          </div>
          <button onClick={()=>setOpen(true)} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"5px 12px",fontSize:11,color:T.muted,cursor:"pointer"}}>Modifier</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {[saved.p1,saved.p2,saved.p3].filter(Boolean).map((p,i)=>(
            <div key={i} style={{background:T.surface,borderRadius:10,padding:"12px 14px",border:`1px solid ${T.border}`}}>
              <div style={{fontSize:9,fontWeight:700,color:ws.color,letterSpacing:1,marginBottom:4}}>PRIORITÉ {i+1}</div>
              <div style={{fontSize:13,fontWeight:600,color:T.text}}>{p}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return(
    <div style={{background:isEvening?`linear-gradient(135deg,${ws.color}12,#BF5AF212)`:T.s2,border:`1.5px solid ${isEvening?ws.color+"44":T.border}`,borderRadius:16,overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"18px 24px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setOpen(v=>!v)}>
        <div>
          <div style={{fontSize:14,fontWeight:800,color:T.text}}>{isEvening?"🌙 Evening Review":"📋 Planifier demain"}</div>
          <div style={{fontSize:12,color:T.muted,marginTop:2}}>Prépare ta journée du {tomorrowLabel}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {isEvening&&<span style={{fontSize:10,fontWeight:700,color:ws.color,background:ws.color+"18",padding:"3px 10px",borderRadius:20}}>Ce soir !</span>}
          <span style={{color:T.muted,fontSize:16}}>{open?"▲":"▼"}</span>
        </div>
      </div>

      {open&&(
        <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:16}}>

          {/* Q1 */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#00C896",letterSpacing:1,marginBottom:6}}>✅ CE QUE J'AI ACCOMPLI AUJOURD'HUI</div>
            <textarea value={q1} onChange={e=>setQ1(e.target.value)}
              placeholder="Qu'est-ce que tu as avancé, réglé, ou créé aujourd'hui ?"

function TitoHome({ws,focus,setFocus,T}){
  const [newTask,setNewTask]=useState("");
  const today=new Date().toLocaleDateString("fr-CA",{weekday:"long",day:"numeric",month:"long"});
  const done=focus.filter(f=>f.done).length;
  return(
    <div style={{maxWidth:600,margin:"0 auto",paddingTop:20}}>
      <div style={{marginBottom:28}}>
        <div style={{fontSize:11,color:T.muted,letterSpacing:2,marginBottom:4}}>AUJOURD'HUI</div>
        <div style={{fontSize:22,fontWeight:800,color:T.text,marginBottom:2}}>{today}</div>
        <div style={{fontSize:13,color:T.muted}}>{done}/{focus.length} priorités complétées</div>
      </div>
      {/* Progress */}
      {focus.length>0&&(
        <div style={{height:6,background:T.s3,borderRadius:3,overflow:"hidden",marginBottom:28}}>
          <div style={{width:(done/focus.length*100)+"%",height:"100%",background:ws.color,borderRadius:3,transition:"width 0.4s"}}/>
        </div>
      )}
      {/* Focus items */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:12}}>⚡ PRIORITÉS DU JOUR (max 5)</div>
        {focus.length===0&&<div style={{fontSize:13,color:T.dim,fontStyle:"italic",marginBottom:12,padding:"16px",background:T.s2,borderRadius:8}}>Qu'est-ce que tu dois absolument faire aujourd'hui ?</div>}
        {focus.map((f,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:f.done?T.s2:T.surface,border:`1px solid ${f.done?T.border:ws.color+"44"}`,borderRadius:10,marginBottom:8,transition:"all 0.15s"}}>
            <div onClick={()=>{const upd=focus.map((x,xi)=>xi===i?{...x,done:!x.done}:x);setFocus(upd);}} style={{width:22,height:22,borderRadius:6,border:`2px solid ${f.done?"#00C896":ws.color}`,background:f.done?"#00C896":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>
              {f.done&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}
            </div>
            <span style={{flex:1,fontSize:14,fontWeight:500,color:f.done?T.muted:T.text,textDecoration:f.done?"line-through":"none"}}>{f.text}</span>
            <button onClick={()=>setFocus(focus.filter((_,xi)=>xi!==i))} style={{background:"transparent",border:"none",color:T.dim,cursor:"pointer",fontSize:14,padding:"0 4px"}}>✕</button>
          </div>
        ))}
        {focus.length<5&&(
          <div style={{display:"flex",gap:8}}>
            <input value={newTask} onChange={e=>setNewTask(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&newTask.trim()){setFocus([...focus,{text:newTask,done:false}]);setNewTask("");}}}
              placeholder="Ajouter une priorité..."
              style={{flex:1,background:T.s2,border:`1px solid ${T.border}`,color:T.text,borderRadius:8,padding:"10px 12px",fontSize:13}}/>
            <button onClick={()=>{if(newTask.trim()){setFocus([...focus,{text:newTask,done:false}]);setNewTask("");}}} style={{background:ws.color,color:"#fff",border:"none",borderRadius:8,padding:"10px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>+</button>
          </div>
        )}
      </div>
      {/* Clear done */}
      {done>0&&<button onClick={()=>setFocus(focus.filter(f=>!f.done))} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:6,padding:"6px 14px",fontSize:11,color:T.muted,cursor:"pointer"}}>Effacer les complétées ({done})</button>}
    </div>
  );
}

function TitoNotes({ws,notes,setNotes,T}){
  const [stickyNotes,setStickyNotes]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("sticky_notes")||"[]");}catch{return[];}
  });
  const [newText,setNewText]=useState("");
  const COLORS=["#FFF9C4","#C8E6C9","#BBDEFB","#F8BBD0","#E1BEE7","#FFE0B2"];
  const [selColor,setSelColor]=useState(COLORS[0]);

  function saveStickies(arr){
    setStickyNotes(arr);
    localStorage.setItem("sticky_notes",JSON.stringify(arr));
  }
  function addSticky(){
    if(!newText.trim())return;
    const ts=new Date().toLocaleString("fr-CA",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
    saveStickies([{id:Date.now(),text:newText,color:selColor,ts},...stickyNotes]);
    setNewText("");
  }
  function delSticky(id){ saveStickies(stickyNotes.filter(n=>n.id!==id)); }
  function editSticky(id,text){ saveStickies(stickyNotes.map(n=>n.id===id?{...n,text}:n)); }

  return(
    <div style={{paddingTop:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:1}}>📝 BLOC-NOTES</div>
        <div style={{fontSize:10,color:T.dim}}>{stickyNotes.length} note{stickyNotes.length!==1?"s":""}</div>
      </div>

      {/* Quick add */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px",marginBottom:20,boxShadow:`0 2px 12px rgba(0,0,0,0.08)`}}>
        <textarea value={newText} onChange={e=>setNewText(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&e.metaKey)addSticky();}}
          placeholder="Nouvelle note... (Cmd+Enter pour sauver)"
          style={{width:"100%",minHeight:70,background:"transparent",border:"none",fontSize:13,color:T.text,resize:"none",lineHeight:1.6,fontFamily:"DM Sans,sans-serif",outline:"none",padding:0,marginBottom:10}}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",gap:6}}>
            {COLORS.map(c=>(
              <div key={c} onClick={()=>setSelColor(c)} style={{width:18,height:18,borderRadius:"50%",background:c,cursor:"pointer",border:`2px solid ${selColor===c?"#333":"transparent"}`,transition:"border 0.1s"}}/>
            ))}
          </div>
          <button onClick={addSticky} style={{background:ws.color,color:"#fff",border:"none",borderRadius:7,padding:"6px 16px",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Ajouter</button>
        </div>
      </div>

      {/* Sticky grid */}
      {stickyNotes.length===0&&(
        <div style={{textAlign:"center",padding:"40px",color:T.dim}}>
          <div style={{fontSize:32,marginBottom:8}}>📝</div>
          <div style={{fontSize:13}}>Aucune note. Commence par en créer une.</div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:14}}>
        {stickyNotes.map(note=>(
          <div key={note.id} style={{background:note.color,borderRadius:10,padding:"14px",position:"relative",minHeight:100,boxShadow:"0 3px 12px rgba(0,0,0,0.12)",transition:"transform 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px) rotate(0.5deg)"}
            onMouseLeave={e=>e.currentTarget.style.transform="translateY(0) rotate(0)"}>
            <textarea
              defaultValue={note.text}
              onBlur={e=>editSticky(note.id,e.target.value)}
              style={{width:"100%",background:"transparent",border:"none",fontSize:13,color:"#333",resize:"none",lineHeight:1.6,fontFamily:"DM Sans,sans-serif",outline:"none",padding:0,minHeight:60}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,paddingTop:8,borderTop:"1px solid rgba(0,0,0,0.1)"}}>
              <span style={{fontSize:9,color:"rgba(0,0,0,0.4)"}}>{note.ts}</span>
              <button onClick={()=>delSticky(note.id)} style={{background:"rgba(0,0,0,0.08)",border:"none",borderRadius:4,width:20,height:20,fontSize:11,color:"rgba(0,0,0,0.4)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TitoGoals({ws,goals,setGoals,T}){
  const [adding, setAdding] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({title:"",category:"Vie",icon:"🎯",target:"",unit:"",deadline:"",progress:0,note:""});
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const CATS = {
    "Vie":      { color:"#BF5AF2", bg:"#BF5AF215", icon:"✨" },
    "Business": { color:"#FF6B00", bg:"#FF6B0015", icon:"🚀" },
    "Finance":  { color:"#00C896", bg:"#00C89615", icon:"💰" },
    "Santé":    { color:"#FF3B30", bg:"#FF3B3015", icon:"💪" },
  };

  const ICON_PICKS = ["🏠","💰","🚗","✈️","💪","📚","🎯","🏆","👨‍👩‍👧","🌍","💼","🎵","🏋️","🍕","📱","💻","🎓","🏖️","⚡","🔥"];

  const activeGoals = goals.filter(g=>!g.done);
  const doneGoals   = goals.filter(g=>g.done);
  const globalScore = goals.length ? Math.round(goals.reduce((s,g)=>s+(g.progress||0),0)/goals.length) : 0;

  function saveGoal(){
    if(!form.title.trim()) return;
    if(editId){
      setGoals(goals.map(g=>g.id===editId?{...g,...form}:g));
      setEditId(null);
    } else {
      setGoals([...goals,{...form,id:Date.now(),done:false}]);
    }
    setForm({title:"",category:"Vie",icon:"🎯",target:"",unit:"",deadline:"",progress:0,note:""});
    setAdding(false);
  }

  function startEdit(g){
    setForm({title:g.title,category:g.category||"Vie",icon:g.icon||"🎯",target:g.target||"",unit:g.unit||"",deadline:g.deadline||"",progress:g.progress||0,note:g.note||""});
    setEditId(g.id);
    setAdding(true);
  }

  function updateProgress(id, val){
    setGoals(goals.map(g=>g.id===id?{...g,progress:val,done:val>=100}:g));
  }

  function toggleDone(id){
    setGoals(goals.map(g=>g.id===id?{...g,done:!g.done,progress:g.done?g.progress:100}:g));
  }

  return(
    <div style={{maxWidth:820,margin:"0 auto",paddingTop:16}}>

      {/* ── GLOBAL SCORE ── */}
      <div style={{display:"flex",alignItems:"center",gap:20,marginBottom:24,padding:"20px 24px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:16}}>
        <div style={{position:"relative",width:80,height:80,flexShrink:0}}>
          <svg width={80} height={80} viewBox="0 0 80 80">
            <circle cx={40} cy={40} r={32} fill="none" stroke={T.s3} strokeWidth={8}/>
            <circle cx={40} cy={40} r={32} fill="none" stroke={ws.color} strokeWidth={8}
              strokeDasharray={`${globalScore/100*201} 201`}
              strokeLinecap="round"
              style={{transform:"rotate(-90deg)",transformOrigin:"40px 40px",transition:"stroke-dasharray 0.6s cubic-bezier(0.4,0,0.2,1)"}}/>
            <text x={40} y={40} textAnchor="middle" dominantBaseline="middle" fontSize={18} fontWeight={800} fill={ws.color}>{globalScore}%</text>
          </svg>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:800,letterSpacing:-0.3,marginBottom:4}}>Mes Ambitions</div>
          <div style={{fontSize:13,color:T.muted,marginBottom:10}}>
            {activeGoals.length} objectif{activeGoals.length>1?"s":""} en cours · {doneGoals.length} accompli{doneGoals.length>1?"s":""}
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {Object.entries(CATS).map(([cat,c])=>{
              const count = goals.filter(g=>g.category===cat&&!g.done).length;
              if(count===0) return null;
              return(
                <div key={cat} style={{background:c.bg,border:`1px solid ${c.color}33`,borderRadius:20,padding:"3px 12px",display:"flex",alignItems:"center",gap:5}}>
                  <span style={{fontSize:10}}>{c.icon}</span>
                  <span style={{fontSize:11,fontWeight:600,color:c.color}}>{cat}</span>
                  <span style={{fontSize:11,color:c.color,opacity:0.7}}>{count}</span>
                </div>
              );
            })}
          </div>
        </div>
        <button onClick={()=>{setAdding(true);setEditId(null);setForm({title:"",category:"Vie",icon:"🎯",target:"",unit:"",deadline:"",progress:0,note:""}); }} style={{
          background:ws.color,color:"#fff",border:"none",
          borderRadius:12,padding:"10px 18px",
          fontSize:13,fontWeight:700,cursor:"pointer",
          boxShadow:`0 4px 16px ${ws.color}44`,
          display:"flex",alignItems:"center",gap:6,
          transition:"all 0.15s",flexShrink:0,
        }}>
          <span style={{fontSize:16}}>+</span> Nouvelle ambition
        </button>
      </div>

      {/* ── ADD / EDIT FORM ── */}
      {adding&&(
        <div style={{background:T.surface,border:`2px solid ${ws.color}44`,borderRadius:16,padding:"20px 22px",marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,color:ws.color,marginBottom:16,letterSpacing:0.2}}>
            {editId?"✏️ Modifier l'ambition":"✨ Nouvelle ambition"}
          </div>

          {/* Icon picker */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:8,fontWeight:600}}>ICÔNE</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {ICON_PICKS.map(ic=>(
                <button key={ic} onClick={()=>f("icon",ic)} style={{
                  width:36,height:36,borderRadius:8,border:`2px solid ${form.icon===ic?ws.color:T.border}`,
                  background:form.icon===ic?ws.color+"22":"transparent",
                  fontSize:18,cursor:"pointer",transition:"all 0.1s",
                }}>{ic}</button>
              ))}
            </div>
          </div>

          {/* Title */}

            <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:6,fontWeight:600}}>AMBITION</div>
            <input value={form.title} onChange={e=>f("title",e.target.value)}
              placeholder="ex: Avoir 50 000$ sur mon compte, Acheter un appart..."
              style={{width:"100%",background:T.s2,border:`1px solid ${T.border}`,color:T.text,borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:600}}/>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>

            <div>

                {Object.entries(CATS).map(([cat,c])=>(

                  }}>
                    <span>{c.icon}</span>{cat}

                ))}

            {/* Target */}

              <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:6,fontWeight:600}}>CIBLE (optionnel)</div>

                placeholder="ex: 50000"
                style={{width:"100%",background:T.s2,border:`1px solid ${T.border}`,color:T.text,borderRadius:10,padding:"10px 14px",fontSize:13,marginBottom:8}}/>
              <input value={form.unit} onChange={e=>f("unit",e.target.value)}
                placeholder="ex: $, km, livres..."
                style={{width:"100%",background:T.s2,border:`1px solid ${T.border}`,color:T.text,borderRadius:10,padding:"10px 14px",fontSize:13,marginBottom:8}}/>
              <input value={form.deadline} onChange={e=>f("deadline",e.target.value)}

                style={{width:"100%",background:T.s2,border:`1px solid ${T.border}`,color:T.text,borderRadius:10,padding:"10px 14px",fontSize:13}}/>
            </div>

            {/* Progress + Note */}
            <div>
              <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:6,fontWeight:600}}>PROGRESSION ACTUELLE</div>

                  onChange={e=>f("progress",+e.target.value)}
                  style={{flex:1,accentColor:ws.color}}/>

              </div>
              <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:6,fontWeight:600}}>NOTE</div>

            </div>
          </div>

          <div style={{display:"flex",gap:8}}>
            <button onClick={saveGoal} style={{background:ws.color,color:"#fff",border:"none",borderRadius:10,padding:"10px 20px",fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:`0 2px 12px ${ws.color}44`}}>
