const toInt=(m,d)=>m*100+d;
function eventCoversDay(ev,m,d){
  const t=toInt(m,d), s=toInt(ev.month,ev.day), e=ev.endMonth?toInt(ev.endMonth,ev.endDay):s;
  return t>=s&&t<=e;
}
function barPos(ev,m,d){
  if(!ev.endMonth)return"solo";
  const iS=ev.month===m&&ev.day===d, iE=ev.endMonth===m&&ev.endDay===d;
  if(iS&&iE)return"solo"; if(iS)return"start"; if(iE)return"end"; return"mid";
}

        ...style,
      }}>{children}</div>
  );
}

// ─── DONUT CHART ──────────────────────────────────────────────────────────
function Donut({data,size=120}){
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let offset=0;
  const r=40,cx=60,cy=60,stroke=14;
  const circ=2*Math.PI*r;
  return(
    <svg width={size} height={size} viewBox="0 0 120 120">
      {data.map((d,i)=>{
        const pct=d.value/total;
        const el=(
          <circle key={i} cx={cx} cy={cy} r={r}
            fill="none" stroke={d.color} strokeWidth={stroke}
            strokeDasharray={`${pct*circ} ${circ}`}
            strokeDashoffset={-offset*circ}
            style={{transform:"rotate(-90deg)",transformOrigin:"60px 60px"}}/>
        );
        offset+=pct;
        return el;
      })}
      <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle"
        fontSize="16" fontWeight="700" fill="#f2f2f2">{total}</text>
    </svg>
  );
}

// ─── MINI BAR CHART ───────────────────────────────────────────────────────
function MiniBar({data,color,T}){
  const max=Math.max(...data.map(d=>d.v),1);
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:50}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{width:"100%",height:Math.max(2,(d.v/max)*44),background:color,borderRadius:2,opacity:0.7+0.3*(d.v/max)}}/>
          <span style={{fontSize:8,color:T.muted}}>{d.l}</span>
        </div>
      ))}
    </div>
  );
}

        textarea{resize:vertical;min-height:72px;}
      `}</style>

      {/* ── SIDEBAR ── */}
      <aside style={{
        width:sideW,flexShrink:0,background:theme==="dark"?"#0d0d0d":"#fff",
        borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",
        transition:"width 0.2s ease",overflow:"hidden",
      }}>
        {/* Header */}
        <div style={{padding:"14px 10px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10}}>
          <WSLogo ws={ws} size={34}/>
          {!sideCollapsed&&(
            <div style={{overflow:"hidden",flex:1}}>
              <div style={{fontSize:12,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ws.name}</div>
              <div style={{fontSize:10,color:T.muted,fontFamily:"'DM Mono',monospace"}}>{t.workspace}</div>
            </div>
          )}
          <button onClick={()=>setSideCollapsed(c=>!c)} style={{
            background:"transparent",border:`1px solid ${T.border}`,color:T.muted,
            borderRadius:5,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:11,flexShrink:0,
          }}>{sideCollapsed?"›":"‹"}</button>
        </div>

        {/* Workspace switcher */}
        <div style={{padding:"8px 8px",borderBottom:`1px solid ${T.border}`}}>
          {WORKSPACES.map(w=>(
            <button key={w.id} onClick={()=>switchWs(w.id)} title={w.name} style={{
              width:"100%",display:"flex",alignItems:"center",gap:10,
              padding:"7px 8px",borderRadius:7,border:"none",
              background:wsId===w.id?w.color+"18":"transparent",
              marginBottom:2,transition:"background 0.1s",
            }}>
              <WSLogo ws={w} size={26}/>
              {!sideCollapsed&&<span style={{fontSize:12,fontWeight:600,color:wsId===w.id?w.color:T.muted,whiteSpace:"nowrap"}}>{w.abbr}</span>}
            </button>
          ))}
        </div>

        {/* Search trigger */}
        {!sideCollapsed&&(
          <button onClick={()=>setSearchOpen(true)} style={{
            margin:"8px 10px",background:T.s2,border:`1px solid ${T.border}`,
            borderRadius:7,padding:"7px 10px",display:"flex",alignItems:"center",
            gap:8,color:T.muted,fontSize:12,
          }}>
            <span>⌕</span>
            <span style={{flex:1,textAlign:"left"}}>{t.searchPlaceholder.split(" ")[0]}...</span>
            <span style={{fontSize:10,background:T.s3,padding:"1px 5px",borderRadius:3,color:T.dim}}>⌘K</span>
          </button>
        )}

        {/* Nav */}
        <nav style={{flex:1,padding:"6px 8px",overflowY:"auto"}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setModule(n.id)} title={n.label} style={{
              width:"100%",display:"flex",alignItems:"center",gap:10,
              padding:"9px 10px",borderRadius:7,border:"none",
              background:module===n.id?ws.color+"1e":"transparent",
              color:module===n.id?ws.color:T.muted,
              marginBottom:2,transition:"all 0.1s",textAlign:"left",
            }}>
              <span style={{fontSize:16,flexShrink:0,width:20,textAlign:"center",lineHeight:1}}>{n.icon}</span>
              {!sideCollapsed&&<span style={{fontSize:13,fontWeight:module===n.id?600:400,whiteSpace:"nowrap"}}>{n.label}</span>}
            </button>
          ))}
        </nav>

        {/* Bottom controls */}
        <div style={{padding:"10px 8px",borderTop:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:6}}>
          {!sideCollapsed&&(
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} style={{
                flex:1,background:T.s2,border:`1px solid ${T.border}`,borderRadius:6,
                padding:"6px",fontSize:11,color:T.muted,
              }}>{theme==="dark"?"☀ "+t.lightMode:"☾ "+t.darkMode}</button>
              <button onClick={()=>setLang(l=>l==="fr"?"en":"fr")} style={{
                background:T.s2,border:`1px solid ${T.border}`,borderRadius:6,
                padding:"6px 10px",fontSize:11,color:T.muted,fontWeight:600,
              }}>{lang==="fr"?"EN":"FR"}</button>
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 4px"}}>
            <Avatar name="Tito" size={28} color={ws.color}/>
            {!sideCollapsed&&<div>
              <div style={{fontSize:12,fontWeight:600}}>Tito</div>
              <div style={{fontSize:10,color:T.muted}}>{t.roles.admin}</div>
            </div>}
          </div>
        </div>
      </aside>

      {/* ── MAIN ── */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Topbar */}
        <div style={{
          height:52,borderBottom:`1px solid ${T.border}`,
          display:"flex",alignItems:"center",padding:"0 22px",gap:14,
          background:theme==="dark"?"#0d0d0d":T.surface,flexShrink:0,
        }}>
          <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:T.muted}}>{ws.abbr} /</span>
            <span style={{fontSize:14,fontWeight:600}}>{NAV.find(n=>n.id===module)?.label}</span>
          </div>
          {["tasks","projects","media"].includes(module)&&(
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {LOCATIONS.filter(l=>wsId==="bnc"?true:l==="Global").map(l=>(
                <button key={l} onClick={()=>setLocFilt(l)} style={{
                  background:locFilt===l?ws.color:T.s2,color:locFilt===l?"#fff":T.muted,
                  border:`1px solid ${locFilt===l?ws.color:T.border}`,
                  borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:locFilt===l?600:400,
                }}>{l}</button>
              ))}
            </div>
          )}
          {!["dashboard","calendar","access"].includes(module)&&(
            <button onClick={()=>setModal({type:`add_${module}`})} style={{
              background:ws.color,color:"#fff",border:"none",
              borderRadius:7,padding:"7px 16px",fontSize:12,fontWeight:600,
              display:"flex",alignItems:"center",gap:6,
            }}>
              <span style={{fontSize:16,lineHeight:1}}>+</span>
              {module==="tasks"?t.newTask:module==="projects"?t.newProject:module==="meetings"?t.newMeeting:t.newInfluencer}
            </button>
          )}
          {module==="calendar"&&(
            <button onClick={()=>setModal({type:"add_calendar"})} style={{
              background:ws.color,color:"#fff",border:"none",
              borderRadius:7,padding:"7px 16px",fontSize:12,fontWeight:600,
            }}>+ {t.addEvent}</button>
          )}
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:"auto",padding:"22px"}}>
          {module==="dashboard"&&<Dashboard ws={ws} wsd={wsd} setModule={setModule} T={T} t={t} theme={theme}/>}
          {module==="tasks"    &&<Tasks     ws={ws} wsd={wsd} locFilt={locFilt} upd={upd} setModal={setModal} T={T} t={t}/>}
          {module==="projects" &&<Projects  ws={ws} wsd={wsd} locFilt={locFilt} setModal={setModal} T={T} t={t}/>}
          {module==="meetings" &&<Meetings  ws={ws} wsd={wsd} setModal={setModal} T={T} t={t}/>}
          {module==="media"    &&<Media     ws={ws} wsd={wsd} locFilt={locFilt} setModal={setModal} T={T} t={t}/>}
          {module==="calendar" &&<CalModule ws={ws} wsd={wsd} upd={upd} setModal={setModal} T={T} t={t}/>}
          {module==="access"   &&<Access    ws={ws} wsd={wsd} upd={upd} setModal={setModal} T={T} t={t}/>}
        </div>
      </div>

      {/* ── SEARCH OVERLAY ── */}
      {searchOpen&&(
        <div onClick={()=>{setSearchOpen(false);setSearch("");}} style={{
          position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(6px)",
          zIndex:2000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"12vh",
        }}>
          <div onClick={e=>e.stopPropagation()} style={{
            width:560,maxWidth:"95vw",background:T.surface,
            border:`1px solid ${T.border}`,borderRadius:12,
            boxShadow:T.shadow,overflow:"hidden",
          }}>
            <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderBottom:`1px solid ${T.border}`}}>
              <span style={{fontSize:18,color:T.muted}}>⌕</span>
              <input ref={searchRef} value={search} onChange={e=>setSearch(e.target.value)}
                placeholder={t.searchPlaceholder}
                style={{flex:1,background:"transparent",border:"none",fontSize:15,color:T.text,outline:"none",padding:0}}/>
              <span style={{fontSize:11,color:T.dim,background:T.s2,padding:"2px 7px",borderRadius:4}}>ESC</span>
            </div>
            <div style={{maxHeight:360,overflowY:"auto"}}>
              {search.length<2&&(
                <div style={{padding:"32px",textAlign:"center",color:T.muted,fontSize:13}}>
                  {t.searchPlaceholder}
                </div>
              )}
              {search.length>=2&&searchResults.length===0&&(
                <div style={{padding:"32px",textAlign:"center",color:T.muted,fontSize:13}}>{t.noResults}</div>
              )}
              {searchResults.map(r=>(
                <div key={r.id+r._type} onClick={()=>{setModule(r._type==="task"?"tasks":r._type==="project"?"projects":"meetings");setSearchOpen(false);setSearch("");}}
                  style={{padding:"12px 18px",borderBottom:`1px solid ${T.border}`,cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"background 0.1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background=T.s2}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                >
                  <span style={{fontSize:18,opacity:0.5}}>{r._type==="task"?"☑":r._type==="project"?"◎":"⊕"}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:500}}>{r.title}</div>
                    <div style={{fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:0.5}}>{r._type}</div>
                  </div>
                  {r.status&&<Badge label={r.status} color={TASK_STATUS[r.status]?.dot||PROJECT_STATUS[r.status]||"#777"} small T={T}/>}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── MODAL ── */}
      {modal&&<Modal modal={modal} setModal={setModal} ws={ws} wsd={wsd} upd={upd} T={T} t={t}/>}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────
function Dashboard({ws,wsd,setModule,T,t,theme}){
  const done=wsd.tasks.filter(x=>x.status==="Done").length;
  const open=wsd.tasks.filter(x=>x.status!=="Done").length;
  const blck=wsd.tasks.filter(x=>x.status==="Blocked").length;
  const actP=wsd.projects.filter(p=>["Active","On Track"].includes(p.status)).length;
  const upMt=wsd.meetings.filter(m=>m.status==="Upcoming").length;
  const confI=wsd.influencers.filter(i=>i.status==="Confirmé").length;
  const compRate=wsd.tasks.length?Math.round(done/wsd.tasks.length*100):0;

  const kpis=[
    {label:t.tasks+" ("+t.upcoming+")",value:open,sub:`${blck} ${t.blocked.toLowerCase()}`,color:ws.color,icon:"☑",mod:"tasks"},
    {label:t.done,value:done,sub:`${compRate}% ${t.completionRate.toLowerCase()}`,color:"#00C896",icon:"✓",mod:"tasks"},
    {label:t.active,value:actP,sub:`${wsd.projects.length} total`,color:"#0A84FF",icon:"◎",mod:"projects"},
    {label:t.upcoming,value:upMt,sub:`${confI} influenceurs ✓`,color:"#BF5AF2",icon:"⊕",mod:"meetings"},
  ];

  // Simulated order data
  const orderData=[
    {l:"Van",v:52},{l:"Tor",v:38},{l:"Sea",v:61},{l:"Mia",v:18},
  ];
  const tasksByStatus=Object.entries(TASK_STATUS).map(([s,c])=>({
    label:s,value:wsd.tasks.filter(t=>t.status===s).length,color:c.dot,
  }));

  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* Welcome */}
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <WSLogo ws={ws} size={52}/>
        <div>
          <div style={{fontSize:24,fontWeight:700,letterSpacing:-0.5}}>{ws.name}</div>
          <div style={{fontSize:13,color:T.muted}}>{new Date().toLocaleDateString(t===I18N.fr?"fr-CA":"en-CA",{weekday:"long",day:"numeric",month:"long"})}</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:10}}>
          <div style={{background:ws.color+"18",border:`1px solid ${ws.color}33`,borderRadius:8,padding:"8px 16px",textAlign:"center"}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:26,fontWeight:700,color:ws.color,lineHeight:1}}>{compRate}%</div>
            <div style={{fontSize:10,color:T.muted,marginTop:2}}>{t.completionRate}</div>
          </div>
        </div>
      </div>

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        {kpis.map(k=>(
          <Card key={k.label} T={T} onClick={()=>setModule(k.mod)} style={{cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <span style={{fontSize:11,color:T.muted,fontWeight:500,letterSpacing:0.5}}>{k.label.toUpperCase()}</span>
              <span style={{fontSize:20,opacity:0.3}}>{k.icon}</span>
            </div>
            <div style={{fontSize:36,fontWeight:800,color:k.color,lineHeight:1,letterSpacing:-1}}>{k.value}</div>
            <div style={{fontSize:11,color:T.muted,marginTop:8}}>{k.sub}</div>
          </Card>
        ))}
      </div>

      {/* Main grid */}
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16}}>
        {/* Left col */}
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {/* Recent tasks */}
          <Card T={T}>
            <div style={{fontSize:11,fontWeight:600,color:T.muted,letterSpacing:1,marginBottom:14}}>{t.recentTasks.toUpperCase()}</div>
            {wsd.tasks.filter(x=>x.status!=="Done").slice(0,5).map(task=>(
              <div key={task.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 11px",background:T.s2,borderRadius:7,marginBottom:6}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:TASK_STATUS[task.status]?.dot,flexShrink:0}}/>
                <div style={{flex:1,fontSize:13,fontWeight:500}}>{task.title}</div>
                <Badge label={task.location} color={T.dim} small T={T}/>
                <Badge label={task.status} color={TASK_STATUS[task.status]?.dot||"#777"} small T={T}/>
                <Avatar name={task.owner} size={22} color={ws.color}/>
              </div>
            ))}
          </Card>

          {/* Analytics: orders + tasks donut */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Card T={T}>
              <div style={{fontSize:11,fontWeight:600,color:T.muted,letterSpacing:1,marginBottom:14}}>{t.performanceByLoc.toUpperCase()}</div>
              <MiniBar data={orderData} color={ws.color} T={T}/>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:10}}>
                {orderData.map(d=>(
                  <div key={d.l} style={{textAlign:"center"}}>
                    <div style={{fontSize:13,fontWeight:700,color:ws.color}}>{d.v}</div>
                    <div style={{fontSize:9,color:T.muted}}>{d.l}</div>
                  </div>
                ))}
              </div>
            </Card>
            <Card T={T}>
              <div style={{fontSize:11,fontWeight:600,color:T.muted,letterSpacing:1,marginBottom:12}}>{t.tasksByStatus.toUpperCase()}</div>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <Donut data={tasksByStatus.map(s=>({value:s.value,color:s.color}))} size={90}/>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {tasksByStatus.map(s=>(
                    <div key={s.label} style={{display:"flex",alignItems:"center",gap:6}}>
                      <div style={{width:7,height:7,borderRadius:"50%",background:s.color}}/>
                      <span style={{fontSize:10,color:T.muted}}>{s.label}</span>
                      <span style={{fontSize:10,fontWeight:700,color:T.text,marginLeft:"auto"}}>{s.value}</span>
                    </div>
                  ))}
                </div>
              </div>
            </Card>
          </div>
        </div>

        {/* Right col */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Projects */}
          <Card T={T}>
            <div style={{fontSize:11,fontWeight:600,color:T.muted,letterSpacing:1,marginBottom:14}}>{t.projects.toUpperCase()}</div>
            {wsd.projects.map(p=>(
              <div key={p.id} style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:12,fontWeight:600}}>{p.title}</span>
                  <Badge label={p.status} color={PROJECT_STATUS[p.status]||"#777"} small T={T}/>
                </div>
                <ProgressBar value={p.progress} color={PROJECT_STATUS[p.status]||ws.color} T={T}/>
                <div style={{fontSize:10,color:T.muted,marginTop:4}}>{p.progress}% · {p.due}</div>
              </div>
            ))}
          </Card>

          {/* Upcoming meetings */}
          <Card T={T}>
            <div style={{fontSize:11,fontWeight:600,color:T.muted,letterSpacing:1,marginBottom:12}}>{t.upcomingMeetings.toUpperCase()}</div>
            {wsd.meetings.filter(m=>m.status==="Upcoming").map(m=>(
              <div key={m.id} style={{display:"flex",gap:10,marginBottom:12,alignItems:"flex-start"}}>
                <div style={{width:36,height:36,borderRadius:8,background:ws.color+"1a",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16}}>⊕</div>
                <div>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:2}}>{m.title}</div>
                  <div style={{fontSize:10,color:T.muted}}>{m.date}</div>
                </div>
              </div>
            ))}
          </Card>

          {/* Location health */}
          {wsd.tasks.some(x=>x.location!=="Global")&&(
            <Card T={T}>
              <div style={{fontSize:11,fontWeight:600,color:T.muted,letterSpacing:1,marginBottom:12}}>{t.health.toUpperCase()}</div>
              {["Vancouver","Toronto","Seattle","Miami"].map(loc=>{
                const lt=wsd.tasks.filter(x=>x.location===loc||x.location==="Global");
                const dn=lt.filter(x=>x.status==="Done").length;
                const bl=lt.filter(x=>x.status==="Blocked").length;
                const pct=lt.length?Math.round(dn/lt.length*100):0;
                const hc=bl>0?"#FF3B30":pct>60?"#00C896":ws.color;
                return(
                  <div key={loc} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:11,fontWeight:500}}>{loc}</span>
                      <span style={{fontSize:10,color:hc,fontWeight:600}}>{pct}%</span>
                    </div>
                    <ProgressBar value={pct} color={hc} T={T}/>
                  </div>
                );
              })}
            </Card>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── TASKS ────────────────────────────────────────────────────────────────
function Tasks({ws,wsd,locFilt,upd,setModal,T,t}){
  const [view,setView]=useState("board");
  const tasks=wsd.tasks.filter(x=>locFilt==="Global"||x.location==="Global"||x.location===locFilt);
  if(view==="board") return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {["board","list"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{
            background:view===v?ws.color:T.s2,color:view===v?"#fff":T.muted,
            border:`1px solid ${view===v?ws.color:T.border}`,borderRadius:7,padding:"5px 14px",fontSize:12,fontWeight:500,
          }}>{v==="board"?t.kanban:t.list}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,alignItems:"start"}}>
        {Object.entries(TASK_STATUS).map(([status,sc])=>{
          const col=tasks.filter(x=>x.status===status);
          return(
            <div key={status}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10,padding:"0 2px"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:sc.dot}}/>
                <span style={{fontSize:11,fontWeight:600,color:T.muted,letterSpacing:0.5}}>{status.toUpperCase()}</span>
                <span style={{fontSize:11,color:T.dim,marginLeft:"auto",background:T.s2,padding:"1px 7px",borderRadius:10}}>{col.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {col.map(task=>(
                  <div key={task.id} onClick={()=>setModal({type:"edit_tasks",payload:task})}
                    style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:"13px",cursor:"pointer",transition:"all 0.15s",borderLeft:`3px solid ${sc.dot}`}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=sc.dot;e.currentTarget.style.background=T.s2;}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.borderLeftColor=sc.dot;e.currentTarget.style.background=T.surface;}}
                  >
                    <div style={{fontSize:13,fontWeight:500,marginBottom:9,lineHeight:1.4,color:T.text}}>{task.title}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
                      {task.tags.map(tag=><Badge key={tag} label={tag} color={ws.color} small T={T}/>)}
                      <Badge label={task.location} color={T.dim} small T={T}/>
                    </div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:4}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:TASK_PRIORITY[task.priority]}}/>
                        <span style={{fontSize:10,color:T.muted}}>{task.priority}</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:7}}>
                        <span style={{fontSize:10,color:T.muted}}>📅 {task.due}</span>
                        <Avatar name={task.owner} size={22} color={ws.color}/>
                      </div>
                    </div>
                  </div>
                ))}
                <button onClick={()=>setModal({type:"add_tasks",prefill:{status}})} style={{
                  background:"transparent",border:`1px dashed ${T.border}`,borderRadius:9,
                  padding:"10px",fontSize:12,color:T.dim,width:"100%",transition:"all 0.15s",
                }}
                onMouseEnter={e=>e.currentTarget.style.borderColor=ws.color}
                onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}
                >+ {t.newTask}</button>
              </div>

// ─── CALENDAR MODULE ──────────────────────────────────────────────────────
function CalModule({ws,wsd,upd,setModal,T,t}){
  const [calView,setCalView]=useState("timeline");
  const [month,setMonth]=useState(NOW_M);
  const [hov,setHov]=useState(null);
  const [selCats,setSelCats]=useState([...CAL_CATS]);

  const events=(wsd.calEvents||[]).filter(e=>selCats.includes(e.category));
  const tlMonths=Array.from({length:6},(_,i)=>((NOW_M-1+i)%12)+1);
  const daysInM=DAYS_IN_MONTH[month-1];
  const offset=monthOffset(month,NOW_Y);
  const cells=[...Array(offset).fill(null),...Array.from({length:daysInM},(_,i)=>i+1)];
  const monthEvs=events.filter(e=>{
    const s=toInt(e.month,e.day),en=e.endMonth?toInt(e.endMonth,e.endDay):s;
    return en>=toInt(month,1)&&s<=toInt(month,daysInM);
  }).sort((a,b)=>toInt(a.month,a.day)-toInt(b.month,b.day));

  function toggleCat(c){setSelCats(p=>p.includes(c)?p.length>1?p.filter(x=>x!==c):p:[...p,c]);}

  return(
    <div>
      {/* Controls */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        {["timeline","month"].map(v=>(
          <button key={v} onClick={()=>setCalView(v)} style={{
            background:calView===v?ws.color:T.s2,color:calView===v?"#fff":T.muted,
            border:`1px solid ${calView===v?ws.color:T.border}`,borderRadius:7,padding:"5px 14px",fontSize:12,
          }}>{v==="timeline"?"Timeline":t.calendar+" "+t.list}</button>
        ))}
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginLeft:8}}>
          {CAL_CATS.map(c=>(
            <button key={c} onClick={()=>toggleCat(c)} style={{
              background:selCats.includes(c)?calColor(c):T.s2,
              color:selCats.includes(c)?calText(c):T.muted,
              border:`1px solid ${selCats.includes(c)?calColor(c):T.border}`,
              borderRadius:20,padding:"3px 11px",fontSize:10,
            }}>{c}</button>
          ))}
        </div>
      </div>

      {/* Timeline */}
      {calView==="timeline"&&tlMonths.map(m=>{
        const mEvs=events.filter(e=>{const s=toInt(e.month,e.day),en=e.endMonth?toInt(e.endMonth,e.endDay):s;return en>=toInt(m,1)&&s<=toInt(m,DAYS_IN_MONTH[m-1]);}).sort((a,b)=>toInt(a.month,a.day)-toInt(b.month,b.day));
        const isNow=m===NOW_M,isPast=m<NOW_M;
        return(
          <div key={m} style={{marginBottom:28}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,letterSpacing:2,color:isNow?ws.color:isPast?T.dim:T.text}}>{t.months[m-1].toUpperCase()}</span>
              {isNow&&<span style={{background:ws.color,color:"#fff",fontSize:9,padding:"2px 8px",borderRadius:20,fontWeight:700}}>NOW</span>}
              <div style={{flex:1,height:1,background:T.border}}/>
              <span style={{fontSize:10,color:T.dim}}>{mEvs.length} event{mEvs.length!==1?"s":""}</span>
            </div>
            {mEvs.length===0
              ?<p style={{fontSize:11,color:T.dim,fontStyle:"italic",margin:0,paddingLeft:4}}>{t.noEvents}</p>
              :<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                {mEvs.map(ev=>{
                  const cc=calColor(ev.category);
                  const isPastEv=(ev.endMonth?toInt(ev.endMonth,ev.endDay):toInt(ev.month,ev.day))<toInt(NOW_M,NOW_D);
                  const isActive=eventCoversDay(ev,NOW_M,NOW_D);
                  return(
                    <div key={ev.id} onClick={()=>setModal({type:"edit_calendar",payload:ev})}
                      onMouseEnter={()=>setHov(ev.id)} onMouseLeave={()=>setHov(null)}
                      style={{background:hov===ev.id?T.s2:T.surface,border:`1px solid ${hov===ev.id?cc:T.border}`,borderLeft:`3px solid ${cc}`,borderRadius:7,padding:"10px 13px",cursor:"pointer",width:200,opacity:isPastEv?0.4:1,position:"relative",boxSizing:"border-box"}}>
                      {isActive&&<span style={{position:"absolute",top:-7,right:8,background:ws.color,color:"#fff",fontSize:7,padding:"2px 6px",borderRadius:10,fontWeight:700}}>EN COURS</span>}
                      <span style={{background:cc,color:calText(ev.category),fontSize:7,padding:"2px 7px",borderRadius:3,display:"inline-block",marginBottom:6,letterSpacing:1,fontWeight:700}}>{ev.category.toUpperCase()}</span>
                      <div style={{fontSize:12,fontWeight:700,marginBottom:4,lineHeight:1.3}}>{ev.title}</div>
                      <div style={{display:"flex",justifyContent:"space-between"}}>
                        <span style={{fontSize:9,color:T.muted}}>{t.months[ev.month-1]} {ev.day}{ev.endMonth?` → ${t.months[ev.endMonth-1]} ${ev.endDay}`:""}</span>
                        <span style={{fontSize:8,color:T.dim,background:T.s2,padding:"1px 5px",borderRadius:3}}>{ev.location}</span>
                      </div>
                      {ev.note&&<div style={{fontSize:8,color:T.muted,marginTop:5,borderTop:`1px solid ${T.border}`,paddingTop:4}}>{ev.note}</div>}
                    </div>
                  );
                })}
              </div>
            }
          </div>
        );
      })}

      {/* Month grid */}
      {calView!=="timeline"&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
            <button onClick={()=>setMonth(m=>m===1?12:m-1)} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"6px 13px",color:T.muted,fontSize:13}}>◀</button>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:ws.color,flex:1,textAlign:"center",letterSpacing:2}}>{t.months[month-1].toUpperCase()} {NOW_Y}</span>
            <button onClick={()=>setMonth(m=>m===12?1:m+1)} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"6px 13px",color:T.muted,fontSize:13}}>▶</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
            {t.days_short.map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:T.dim,padding:"4px 0",letterSpacing:1}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {cells.map((day,idx)=>{
              if(!day)return<div key={`b${idx}`} style={{background:T.bg,minHeight:76,borderRadius:4}}/>;
              const isToday=month===NOW_M&&day===NOW_D;
              const dayEvs=events.filter(ev=>eventCoversDay(ev,month,day));
              return(
                <div key={`d${day}`} style={{background:isToday?ws.color+"15":T.surface,border:`1px solid ${isToday?ws.color:T.border}`,borderRadius:4,minHeight:76,padding:"4px 0",boxSizing:"border-box",overflow:"hidden"}}>
                  <div style={{fontSize:10,color:isToday?ws.color:T.dim,fontWeight:isToday?700:400,padding:"0 6px",marginBottom:3}}>{day}</div>
                  {dayEvs.map(ev=>{
                    const pos=barPos(ev,month,day);
                    const cc=calColor(ev.category);
                    return(
                      <div key={ev.id} onClick={e=>{e.stopPropagation();setModal({type:"edit_calendar",payload:ev});}}
                        title={ev.title} style={{
                          background:cc,color:calText(ev.category),
                          fontSize:7,padding:"2px 4px",marginBottom:1,cursor:"pointer",fontWeight:700,
                          overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",letterSpacing:0.2,
                          marginLeft:(pos==="mid"||pos==="end")?0:5,
                          marginRight:(pos==="mid"||pos==="start")?0:5,
                          borderRadius:`${(pos==="start"||pos==="solo")?3:0}px ${(pos==="end"||pos==="solo")?3:0}px ${(pos==="end"||pos==="solo")?3:0}px ${(pos==="start"||pos==="solo")?3:0}px`,
                        }}>{(pos==="start"||pos==="solo")?ev.title:"\u00A0"}</div>
                    );
                  })}
                </div>
              );
            })}
          </div>
          {monthEvs.length>0&&(
            <div style={{marginTop:24}}>
              <div style={{fontSize:10,color:T.muted,letterSpacing:1,marginBottom:12}}>{t.eventsMonth.toUpperCase()}</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                {monthEvs.map(ev=>{
                  const cc=calColor(ev.category);
                  return(
                    <div key={ev.id} onClick={()=>setModal({type:"edit_calendar",payload:ev})}
                      style={{background:T.surface,border:`1px solid ${T.border}`,borderLeft:`3px solid ${cc}`,borderRadius:7,padding:"10px 13px",cursor:"pointer",width:190,boxSizing:"border-box"}}>
                      <span style={{background:cc,color:calText(ev.category),fontSize:7,padding:"2px 6px",borderRadius:3,display:"inline-block",marginBottom:5,fontWeight:700}}>{ev.category.toUpperCase()}</span>
                      <div style={{fontSize:12,fontWeight:700,marginBottom:4}}>{ev.title}</div>
                      <span style={{fontSize:9,color:T.muted}}>{t.months[ev.month-1]} {ev.day}{ev.endMonth?` → ${t.months[ev.endMonth-1]} ${ev.endDay}`:""}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── MODAL SYSTEM ─────────────────────────────────────────────────────────
function Modal({modal,setModal,ws,wsd,upd,T,t}){
  const [form,setForm]=useState(modal.payload||modal.prefill||{});
  const close=()=>setModal(null);
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const isTask=modal.type.includes("task")||modal.type.includes("tasks");
  const isProj=modal.type.includes("project");
  const isMtg =modal.type.includes("meeting");
  const isMed =modal.type.includes("media");
  const isCal =modal.type.includes("calendar");
  const isAcc =modal.type.includes("member")||modal.type==="invite";
  const isEdit=modal.type.startsWith("edit");

  function saveTask(){
    if(!form.title)return;
    const ev={status:"To Do",priority:"Medium",owner:"Tito",due:"—",tags:[],location:"Global",...form};
    if(isEdit)upd(d=>({...d,tasks:d.tasks.map(x=>x.id===form.id?ev:x)}));
    else upd(d=>({...d,tasks:[...d.tasks,{id:uid++,...ev}]}));
    close();
  }
  function saveProj(){
    if(!form.title)return;
    const ev={progress:0,status:"Planning",owner:"Tito",location:"Global",desc:"",...form};
    if(isEdit)upd(d=>({...d,projects:d.projects.map(x=>x.id===form.id?ev:x)}));
    else upd(d=>({...d,projects:[...d.projects,{id:uid++,...ev}]}));
    close();
  }
  function saveMtg(){
    if(!form.title)return;
    const ev={owner:"Tito",attendees:[],status:"Upcoming",notes:"",...form};
    if(isEdit)upd(d=>({...d,meetings:d.meetings.map(x=>x.id===form.id?ev:x)}));
    else upd(d=>({...d,meetings:[...d.meetings,{id:uid++,...ev}]}));
    close();
  }
  function saveMed(){
    if(!form.name)return;
    const ev={status:"À contacter",platform:"Instagram",followers:"—",visit:"—",content:"—",notes:"",...form};
    if(isEdit)upd(d=>({...d,influencers:d.influencers.map(x=>x.id===form.id?ev:x)}));
    else upd(d=>({...d,influencers:[...d.influencers,{id:uid++,...ev}]}));
    close();
  }
  function saveCal(){
    if(!form.title)return;
    const ev={category:"New Product",location:"Global",month:NOW_M,day:1,note:"",hasEnd:false,...form,color:calColor(form.category||"New Product")};
    if(isEdit)upd(d=>({...d,calEvents:(d.calEvents||[]).map(x=>x.id===form.id?ev:x)}));
    else upd(d=>({...d,calEvents:[...(d.calEvents||[]),{id:uid++,...ev}]}));
    close();
  }
  function saveMember(){
    if(modal.type==="invite"){
      if(!form.name||!form.email)return;
      upd(d=>({...d,members:[...d.members,{id:uid++,name:form.name,email:form.email,role:form.role||"staff",locations:[form.location||"Global"],avatar:form.name[0]}]}));
    } else {
      upd(d=>({...d,members:d.members.map(x=>x.id===form.id?{...x,...form}:x)}));
    }
    close();
  }

  const monthsArr=t.months;
  const MONTHS_DATA=monthsArr;

  return(
    <div onClick={close} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:T.surface,border:`1px solid ${T.border}`,borderTop:`2px solid ${ws.color}`,
        borderRadius:12,padding:28,width:500,maxWidth:"100%",maxHeight:"90vh",overflowY:"auto",
        boxShadow:T.shadow,
      }}>
        <div style={{fontSize:15,fontWeight:700,color:ws.color,marginBottom:20,letterSpacing:0.3}}>
          {isEdit?(isMed?t.editInfluencer:isCal?"Modifier event":isMtg?t.editMeeting:isProj?t.editProject:t.editTask):(isMed?t.newInfluencer:isCal?t.addEvent:isMtg?t.newMeeting:isProj?t.newProject:isAcc?t.inviteMember:t.newTask)}
        </div>

        {/* TASK */}
        {isTask&&<>
          <MF label={t.title} T={T}><input value={form.title||""} onChange={e=>f("title",e.target.value)} placeholder="Nom de la tâche"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.status} T={T}><select value={form.status||"To Do"} onChange={e=>f("status",e.target.value)}>{Object.keys(TASK_STATUS).map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.priority} T={T}><select value={form.priority||"Medium"} onChange={e=>f("priority",e.target.value)}>{Object.keys(TASK_PRIORITY).map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
            <MF label={t.owner} T={T}><select value={form.owner||"Tito"} onChange={e=>f("owner",e.target.value)}>{wsd.members.map(m=><option key={m.id}>{m.name}</option>)}</select></MF>
          </div>
          <MF label={t.dueDate} T={T}><input value={form.due||""} onChange={e=>f("due",e.target.value)} placeholder="ex: Apr 10"/></MF>
          <MF label={t.notes} T={T}><textarea value={form.notes||""} onChange={e=>f("notes",e.target.value)} placeholder="Détails..."/></MF>
          <Btns color={ws.color} onSave={saveTask} onDelete={isEdit?()=>{upd(d=>({...d,tasks:d.tasks.filter(x=>x.id!==form.id)}));close();}:null} onClose={close} t={t}/>
        </>}

        {/* PROJECT */}
        {isProj&&<>
          <MF label={t.title} T={T}><input value={form.title||""} onChange={e=>f("title",e.target.value)} placeholder="Nom du projet"/></MF>
          <MF label={t.description} T={T}><textarea value={form.desc||""} onChange={e=>f("desc",e.target.value)} placeholder="Contexte, objectifs..."/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.status} T={T}><select value={form.status||"Planning"} onChange={e=>f("status",e.target.value)}>{Object.keys(PROJECT_STATUS).map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
            <MF label={t.owner} T={T}><select value={form.owner||"Tito"} onChange={e=>f("owner",e.target.value)}>{wsd.members.map(m=><option key={m.id}>{m.name}</option>)}</select></MF>
            <MF label={t.dueDate} T={T}><input value={form.due||""} onChange={e=>f("due",e.target.value)} placeholder="ex: May 30"/></MF>
          </div>
          <MF label={`${t.progress}: ${form.progress||0}%`} T={T}>
            <input type="range" min={0} max={100} value={form.progress||0} onChange={e=>f("progress",+e.target.value)} style={{width:"100%",accentColor:ws.color,background:"transparent",border:"none",padding:0}}/>
          </MF>
          <Btns color={ws.color} onSave={saveProj} onDelete={isEdit?()=>{upd(d=>({...d,projects:d.projects.filter(x=>x.id!==form.id)}));close();}:null} onClose={close} t={t}/>
        </>}

        {/* MEETING */}
        {isMtg&&<>
          <MF label={t.title} T={T}><input value={form.title||""} onChange={e=>f("title",e.target.value)} placeholder="Nom du meeting"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.dueDate} T={T}><input value={form.date||""} onChange={e=>f("date",e.target.value)} placeholder="ex: Apr 10"/></MF>
            <MF label={t.status} T={T}><select value={form.status||"Upcoming"} onChange={e=>f("status",e.target.value)}>{["Upcoming","Récurrent","Done"].map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.owner} T={T}><select value={form.owner||"Tito"} onChange={e=>f("owner",e.target.value)}>{wsd.members.map(m=><option key={m.id}>{m.name}</option>)}</select></MF>
          </div>
          <MF label={t.notes} T={T}><textarea value={form.notes||""} onChange={e=>f("notes",e.target.value)} placeholder="Agenda, contexte..."/></MF>
          <Btns color={ws.color} onSave={saveMtg} onDelete={isEdit?()=>{upd(d=>({...d,meetings:d.meetings.filter(x=>x.id!==form.id)}));close();}:null} onClose={close} t={t}/>
        </>}

        {/* MEDIA */}
        {isMed&&<>
          <MF label={t.name} T={T}><input value={form.name||""} onChange={e=>f("name",e.target.value)} placeholder="@handle"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.platform} T={T}><select value={form.platform||"Instagram"} onChange={e=>f("platform",e.target.value)}>{["Instagram","TikTok","YouTube","Twitter"].map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
            <MF label={t.followers} T={T}><input value={form.followers||""} onChange={e=>f("followers",e.target.value)} placeholder="ex: 45K"/></MF>
            <MF label={t.status} T={T}><select value={form.status||"À contacter"} onChange={e=>f("status",e.target.value)}>{Object.keys(INFL_STATUS).map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.visit} T={T}><input value={form.visit||""} onChange={e=>f("visit",e.target.value)} placeholder="ex: Apr 20"/></MF>
            <MF label={t.content} T={T}><input value={form.content||""} onChange={e=>f("content",e.target.value)} placeholder="ex: Reel + Story"/></MF>
          </div>
          <MF label={t.notes} T={T}><textarea value={form.notes||""} onChange={e=>f("notes",e.target.value)} placeholder="Audience, contexte..."/></MF>
          <Btns color={ws.color} onSave={saveMed} onDelete={isEdit?()=>{upd(d=>({...d,influencers:d.influencers.filter(x=>x.id!==form.id)}));close();}:null} onClose={close} t={t}/>
        </>}

        {/* CALENDAR EVENT */}
        {isCal&&<>
          <MF label={t.title} T={T}><input value={form.title||""} onChange={e=>f("title",e.target.value)} placeholder="ex: Lancement Tacos Truffe"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label="Catégorie" T={T}><select value={form.category||"New Product"} onChange={e=>f("category",e.target.value)}>{CAL_CATS.map(c=><option key={c}>{c}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
          </div>
          <div style={{fontSize:10,color:T.muted,letterSpacing:1,marginBottom:6}}>{t.startDate.toUpperCase()}</div>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <div style={{flex:1}}><select value={form.month||NOW_M} onChange={e=>f("month",+e.target.value)} style={{background:T.inputBg,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,padding:"8px 11px",fontSize:13,width:"100%"}}>{MONTHS_DATA.map((m,i)=><option key={m} value={i+1}>{m}</option>)}</select></div>
            <div style={{width:90}}><input type="number" min={1} max={31} value={form.day||1} onChange={e=>f("day",Math.min(31,Math.max(1,+e.target.value)))} style={{background:T.inputBg,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,padding:"8px 11px",fontSize:13,width:"100%"}}/></div>
          </div>
          <div style={{marginBottom:14}}>
            <button onClick={()=>f("hasEnd",!form.hasEnd)} style={{background:form.hasEnd?ws.color:T.s2,color:form.hasEnd?"#fff":T.muted,border:`1px solid ${form.hasEnd?ws.color:T.border}`,borderRadius:7,padding:"6px 14px",fontSize:11,display:"flex",alignItems:"center",gap:7}}>
              <span>{form.hasEnd?"☑":"☐"}</span>{form.hasEnd?t.periodActive:t.addEndDate}
            </button>
          </div>
          {form.hasEnd&&<>
            <div style={{fontSize:10,color:T.muted,letterSpacing:1,marginBottom:6}}>{t.endDate.toUpperCase()}</div>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <div style={{flex:1}}><select value={form.endMonth||NOW_M} onChange={e=>f("endMonth",+e.target.value)} style={{background:T.inputBg,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,padding:"8px 11px",fontSize:13,width:"100%"}}>{MONTHS_DATA.map((m,i)=><option key={m} value={i+1}>{m}</option>)}</select></div>
              <div style={{width:90}}><input type="number" min={1} max={31} value={form.endDay||1} onChange={e=>f("endDay",Math.min(31,Math.max(1,+e.target.value)))} style={{background:T.inputBg,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,padding:"8px 11px",fontSize:13,width:"100%"}}/></div>
            </div>
            {(()=>{const s=new Date(NOW_Y,form.month-1,form.day),e=new Date(NOW_Y,(form.endMonth||form.month)-1,form.endDay||form.day),d=Math.max(1,Math.round((e-s)/86400000)+1);return<div style={{background:ws.color+"15",border:`1px solid ${ws.color}33`,borderLeft:`3px solid ${ws.color}`,borderRadius:6,padding:"8px 12px",marginBottom:12,fontSize:12,color:T.muted}}><span style={{color:ws.color,fontWeight:700}}>{d} {t.days}</span> · {MONTHS_DATA[form.month-1]} {form.day} → {MONTHS_DATA[(form.endMonth||form.month)-1]} {form.endDay||form.day}</div>;})()}
          </>}
          <MF label={t.notes} T={T}><input value={form.note||""} onChange={e=>f("note",e.target.value)} placeholder="Plateforme, détails..."/></MF>
          <Btns color={ws.color} onSave={saveCal} onDelete={isEdit?()=>{upd(d=>({...d,calEvents:(d.calEvents||[]).filter(x=>x.id!==form.id)}));close();}:null} onClose={close} t={t}/>
        </>}

        {/* ACCESS / INVITE */}
        {isAcc&&<>
          <MF label={t.name} T={T}><input value={form.name||""} onChange={e=>f("name",e.target.value)} placeholder="Prénom Nom"/></MF>
          <MF label={t.email} T={T}><input value={form.email||""} onChange={e=>f("email",e.target.value)} placeholder="email@example.com"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.role} T={T}><select value={form.role||"staff"} onChange={e=>f("role",e.target.value)}>{ROLES.map(r=><option key={r} value={r}>{t.roles[r]}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
          </div>
          <Btns color={ws.color} onSave={saveMember} onDelete={isEdit&&form.name!=="Tito"?()=>{upd(d=>({...d,members:d.members.filter(x=>x.id!==form.id)}));close();}:null} onClose={close} t={t}/>
        </>}
      </div>
    </div>
  );
}

function MF({label,children,T}){
  return(
    <div style={{marginBottom:14}}>
      <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:5,fontWeight:600}}>{label.toUpperCase()}</div>
      {children}
    </div>
  );
}
function Btns({color,onSave,onDelete,onClose,t}){
  return(
    <div style={{display:"flex",gap:8,marginTop:22}}>
      <button onClick={onSave} style={{flex:1,background:color,color:"#fff",border:"none",borderRadius:7,padding:"11px",fontSize:13,fontWeight:600}}>{t.save}</button>
      {onDelete&&<button onClick={onDelete} style={{background:"transparent",color:"#FF3B30",border:"1px solid #FF3B30",borderRadius:7,padding:"11px 14px",fontSize:13}}>{t.delete}</button>}
      <button onClick={onClose} style={{background:"transparent",color:"#777",border:"1px solid #333",borderRadius:7,padding:"11px 14px",fontSize:13}}>{t.cancel}</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));
}
  </script>
</body>
</html>
