            <button onClick={()=>{setAdding(false);setEditId(null);}} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 16px",fontSize:13,color:T.muted,cursor:"pointer"}}>Annuler</button>
          </div>
        </div>
      )}

      {/* ── GOALS GRID ── */}
      {goals.length===0&&!adding&&(
        <div style={{textAlign:"center",padding:"80px 20px",color:T.dim}}>
          <div style={{fontSize:48,marginBottom:12}}>🎯</div>
          <div style={{fontSize:16,fontWeight:600,marginBottom:6}}>Quelles sont tes ambitions ?</div>
          <div style={{fontSize:13,color:T.dim,marginBottom:20}}>Appartement, épargne, voyage, santé — note tout ici.</div>
          <button onClick={()=>setAdding(true)} style={{background:ws.color,color:"#fff",border:"none",borderRadius:12,padding:"12px 24px",fontSize:14,fontWeight:700,cursor:"pointer"}}>+ Première ambition</button>
        </div>
      )}

      {/* Active goals by category */}
      {Object.entries(CATS).map(([cat,c])=>{
        const catGoals = activeGoals.filter(g=>g.category===cat);
        if(catGoals.length===0) return null;
        return(
          <div key={cat} style={{marginBottom:24}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:16}}>{c.icon}</span>
              <span style={{fontSize:12,fontWeight:700,color:c.color,letterSpacing:0.5}}>{cat.toUpperCase()}</span>
              <span style={{fontSize:11,color:T.dim}}>· {catGoals.length}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
              {catGoals.map(g=>{
                const prog = g.progress||0;
                const isMilestone = prog>=25&&prog<50?"🥈":prog>=50&&prog<75?"🥇":prog>=75&&prog<100?"🏆":prog>=100?"✅":"";
                return(
                  <div key={g.id} style={{
                    background:T.surface,
                    border:`1px solid ${T.border}`,
                    borderRadius:14,padding:"18px 18px 14px",
                    borderLeft:`4px solid ${c.color}`,
                    transition:"all 0.15s",
                    position:"relative",
                  }}>
                    {/* Header */}
                    <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:12}}>
                      <div style={{
                        width:44,height:44,borderRadius:12,
                        background:c.bg,border:`1px solid ${c.color}33`,
                        display:"flex",alignItems:"center",justifyContent:"center",
                        fontSize:22,flexShrink:0,
                      }}>{g.icon||"🎯"}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:700,lineHeight:1.3,marginBottom:3}}>{g.title}</div>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                          {g.target&&<span style={{fontSize:11,color:c.color,fontWeight:700,background:c.bg,borderRadius:20,padding:"2px 8px"}}>{g.target}{g.unit?" "+g.unit:""}</span>}
                          {g.deadline&&<span style={{fontSize:10,color:T.muted}}>📅 {g.deadline}</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:4,flexShrink:0}}>
                        {isMilestone&&<span style={{fontSize:16}}>{isMilestone}</span>}
                        <button onClick={()=>startEdit(g)} style={{background:"transparent",border:"none",color:T.dim,cursor:"pointer",fontSize:13,padding:3}}>✏️</button>
                        <button onClick={()=>setGoals(goals.filter(x=>x.id!==g.id))} style={{background:"transparent",border:"none",color:T.dim,cursor:"pointer",fontSize:13,padding:3}}>✕</button>
                      </div>
                    </div>

                    {/* Note */}
                    {g.note&&<div style={{fontSize:11,color:T.muted,marginBottom:10,lineHeight:1.5,borderLeft:`2px solid ${c.color}44`,paddingLeft:8}}>{g.note}</div>}

                    {/* Progress */}
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <span style={{fontSize:10,color:T.dim,letterSpacing:0.5}}>PROGRESSION</span>
                        <span style={{fontSize:14,fontWeight:800,color:prog>=100?"#00C896":c.color}}>{prog}%</span>
                      </div>
                      <div style={{height:8,background:T.s3,borderRadius:8,overflow:"hidden",marginBottom:8}}>
                        <div style={{
                          height:"100%",
                          width:prog+"%",
                          background:prog>=100?"#00C896":`linear-gradient(90deg,${c.color}99,${c.color})`,
                          borderRadius:8,
                          transition:"width 0.5s cubic-bezier(0.4,0,0.2,1)",
                          boxShadow:prog>0?`0 0 8px ${c.color}55`:"none",
                        }}/>
                      </div>
                      <input type="range" min={0} max={100} value={prog}
                        onChange={e=>updateProgress(g.id,+e.target.value)}
                        style={{width:"100%",accentColor:c.color,cursor:"pointer"}}/>
                    </div>

                    {/* Done button */}
                    <button onClick={()=>toggleDone(g.id)} style={{
                      width:"100%",marginTop:8,
                      background:prog>=100?"#00C89622":"transparent",
                      border:`1px solid ${prog>=100?"#00C89644":T.border}`,
                      borderRadius:8,padding:"6px",
                      fontSize:11,fontWeight:prog>=100?700:400,
                      color:prog>=100?"#00C896":T.dim,
                      cursor:"pointer",transition:"all 0.15s",
                    }}>
                      {prog>=100?"✅ Marquer comme accompli !":"Marquer accompli"}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      {/* ── DONE ── */}
      {doneGoals.length>0&&(
        <div style={{marginTop:8}}>
          <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:12}}>✅ ACCOMPLIS ({doneGoals.length})</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:8}}>
            {doneGoals.map(g=>{
              const c = CATS[g.category||"Vie"];
              return(
                <div key={g.id} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:10,opacity:0.7}}>
                  <span style={{fontSize:22}}>{g.icon||"🎯"}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,textDecoration:"line-through",color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.title}</div>
                    {g.deadline&&<div style={{fontSize:10,color:T.dim}}>📅 {g.deadline}</div>}
                  </div>
                  <span style={{fontSize:16}}>🏆</span>
                  <button onClick={()=>setGoals(goals.filter(x=>x.id!==g.id))} style={{background:"transparent",border:"none",color:T.dim,cursor:"pointer",fontSize:12}}>✕</button>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}


// ─── TITO JOURNAL ─────────────────────────────────────────────────────────
function TitoJournal({ws,journal,setJournal,T}){
  const today = new Date().toISOString().slice(0,10); // "2026-04-09"
  const todayEntry = journal.find(e=>e.date===today);

  const [mood,    setMood]    = useState(todayEntry?.mood    || "");
  const [done,    setDone]    = useState(todayEntry?.done    || "");
  const [tmrw,    setTmrw]    = useState(todayEntry?.tmrw    || "");
  const [saved,   setSaved]   = useState(false);
  const [viewAll, setViewAll] = useState(false);

  const MOODS = [
    {icon:"🔥",label:"En feu"},
    {icon:"💪",label:"Motivé"},
    {icon:"😐",label:"Neutre"},
    {icon:"😴",label:"Fatigué"},
    {icon:"😤",label:"Frustré"},
  ];

  function saveEntry(){
    const entry = {
      date: today,
      mood, done, tmrw,
      savedAt: new Date().toLocaleTimeString("fr-CA",{hour:"2-digit",minute:"2-digit"}),
    };
    const updated = journal.filter(e=>e.date!==today);
    setJournal([entry,...updated]);
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  }

  function dateLabel(dateStr){
    const d = new Date(dateStr+"T12:00:00");
    const diff = Math.round((new Date().setHours(0,0,0,0) - d)/86400000);
    if(diff===0) return "Aujourd'hui";
    if(diff===1) return "Hier";
    if(diff<7) return `Il y a ${diff} jours`;
    return d.toLocaleDateString("fr-CA",{day:"numeric",month:"long",year:"numeric"});
  }

  const past = journal.filter(e=>e.date!==today).slice(0, viewAll?999:6);

  return(
    <div style={{maxWidth:720,margin:"0 auto",paddingTop:16}}>

      {/* ── HEADER ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,letterSpacing:-0.3}}>📓 Journal</div>
          <div style={{fontSize:12,color:T.muted,marginTop:2}}>
            {new Date().toLocaleDateString("fr-CA",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
          </div>
        </div>
        {todayEntry&&<div style={{fontSize:11,color:"#00C896",background:"#00C89618",border:"1px solid #00C89633",borderRadius:20,padding:"4px 12px",fontWeight:600}}>✓ Entrée du jour sauvegardée</div>}
      </div>

      {/* ── YESTERDAY'S INTENTIONS (if exists) ── */}
      {(()=>{
        const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
        const yKey = yesterday.toISOString().slice(0,10);
        const yEntry = journal.find(e=>e.date===yKey);
        if(!yEntry?.tmrw) return null;
        return(
          <div style={{
            background:"rgba(255,107,0,0.06)",
            border:`1px solid ${ws.color}33`,
            borderRadius:12,padding:"14px 16px",marginBottom:20,
            borderLeft:`4px solid ${ws.color}`,
          }}>
            <div style={{fontSize:10,fontWeight:700,color:ws.color,letterSpacing:0.8,marginBottom:6}}>
              ☀️ CE QUE TU VOULAIS FAIRE AUJOURD'HUI (hier)
            </div>
            <div style={{fontSize:13,color:T.text,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{yEntry.tmrw}</div>
          </div>
        );
      })()}

      {/* ── TODAY'S ENTRY ── */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,padding:"20px 22px",marginBottom:24}}>
        <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:0.8,marginBottom:14}}>AUJOURD'HUI</div>

        {/* Mood */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:8,fontWeight:600}}>COMMENT TU TE SENS ?</div>
          <div style={{display:"flex",gap:8}}>
            {MOODS.map(m=>(
              <button key={m.icon} onClick={()=>setMood(m.icon)} style={{
                flex:1,padding:"10px 6px",borderRadius:10,
                border:`2px solid ${mood===m.icon?ws.color:T.border}`,
                background:mood===m.icon?ws.color+"18":"transparent",
                cursor:"pointer",transition:"all 0.15s",
                display:"flex",flexDirection:"column",alignItems:"center",gap:4,
              }}>
                <span style={{fontSize:22}}>{m.icon}</span>
                <span style={{fontSize:9,color:mood===m.icon?ws.color:T.dim,fontWeight:mood===m.icon?700:400}}>{m.label}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Done */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:6,fontWeight:600}}>
            CE QUE J'AI FAIT / OÙ J'EN SUIS
          </div>
          <textarea
            value={done}
            onChange={e=>setDone(e.target.value)}
            placeholder={"J'ai avancé sur...\nJ'ai réglé...\nJe me suis rendu compte que..."}
            style={{
              width:"100%",background:T.s2,
              border:`1px solid ${T.border}`,
              color:T.text,borderRadius:10,
              padding:"12px 14px",fontSize:13,
              resize:"none",height:90,lineHeight:1.6,
              fontFamily:"inherit",
              outline:"none",
              transition:"border-color 0.15s",
            }}
            onFocus={e=>e.target.style.borderColor=ws.color}
            onBlur={e=>e.target.style.borderColor=T.border}
          />
        </div>

        {/* Tomorrow */}
        <div style={{marginBottom:18}}>
          <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:6,fontWeight:600}}>
            DEMAIN JE VEUX (max 3 choses)
          </div>
          <textarea
            value={tmrw}
            onChange={e=>setTmrw(e.target.value)}
            placeholder={"1. Appeler le fournisseur\n2. Avancer sur X\n3. ..."}
            style={{
              width:"100%",background:T.s2,
              border:`1px solid ${T.border}`,
              color:T.text,borderRadius:10,
              padding:"12px 14px",fontSize:13,
              resize:"none",height:80,lineHeight:1.6,
              fontFamily:"inherit",
              outline:"none",
              transition:"border-color 0.15s",
            }}
            onFocus={e=>e.target.style.borderColor=ws.color}
            onBlur={e=>e.target.style.borderColor=T.border}
          />
        </div>

        <button onClick={saveEntry} style={{
          background:saved?"#00C896":ws.color,
          color:"#fff",border:"none",
          borderRadius:10,padding:"11px 24px",
          fontSize:13,fontWeight:700,cursor:"pointer",
          boxShadow:saved?"0 2px 12px #00C89644":`0 2px 12px ${ws.color}44`,
          transition:"all 0.3s",
          display:"flex",alignItems:"center",gap:6,
        }}>
          {saved ? "✓ Sauvegardé !" : "💾 Sauvegarder la journée"}
        </button>
      </div>

      {/* ── HISTORY ── */}
      {journal.filter(e=>e.date!==today).length>0&&(
        <div>
          <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:0.8,marginBottom:12}}>
            📚 HISTORIQUE
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {past.map(entry=>(
              <div key={entry.date} style={{
                background:T.surface,border:`1px solid ${T.border}`,
                borderRadius:12,padding:"14px 16px",
                borderLeft:`3px solid ${ws.color}44`,
              }}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  {entry.mood&&<span style={{fontSize:20}}>{entry.mood}</span>}
                  <div>
                    <div style={{fontSize:12,fontWeight:700}}>{dateLabel(entry.date)}</div>
                    <div style={{fontSize:10,color:T.dim}}>{entry.date} · sauvegardé à {entry.savedAt}</div>
                  </div>
                  <button onClick={()=>setJournal(journal.filter(e=>e.date!==entry.date))}
                    style={{marginLeft:"auto",background:"transparent",border:"none",color:T.dim,cursor:"pointer",fontSize:13}}>✕</button>
                </div>
                {entry.done&&(
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:9,color:T.dim,letterSpacing:0.8,fontWeight:600,marginBottom:3}}>CE QUE J'AI FAIT</div>
                    <div style={{fontSize:12,color:T.muted,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{entry.done}</div>
                  </div>
                )}
                {entry.tmrw&&(
                  <div style={{background:ws.color+"0a",borderRadius:8,padding:"8px 10px"}}>
                    <div style={{fontSize:9,color:ws.color,letterSpacing:0.8,fontWeight:700,marginBottom:3}}>AVAIT PRÉVU</div>
                    <div style={{fontSize:12,color:T.text,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{entry.tmrw}</div>
                  </div>
                )}
              </div>
            ))}
          </div>
          {journal.filter(e=>e.date!==today).length>6&&(
            <button onClick={()=>setViewAll(v=>!v)} style={{
              width:"100%",marginTop:10,
              background:"transparent",border:`1px solid ${T.border}`,
              borderRadius:10,padding:"8px",
              fontSize:12,color:T.muted,cursor:"pointer",
            }}>
              {viewAll?"Voir moins ↑":`Voir tout l'historique (${journal.filter(e=>e.date!==today).length} entrées) ↓`}
            </button>
          )}
        </div>
      )}

      {journal.length===0&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:T.dim}}>
          <div style={{fontSize:13,marginTop:8}}>Commence par noter ta première journée 👆</div>
        </div>
      )}
    </div>
  );
}


function TitoInbox({ws,inbox,setInbox,T}){
  const [text,setText]=useState("");
  const [filter,setFilter]=useState("all");
  const filtered=filter==="all"?inbox:inbox.filter(x=>x.tag===filter);
  const tags=["idée","question","rappel","urgent"];
  const tagColor={"idée":"#0A84FF","question":"#BF5AF2","rappel":"#FF9F0A","urgent":"#FF3B30"};
  return(
    <div style={{maxWidth:700,margin:"0 auto",paddingTop:20}}>
      <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:16}}>💡 INBOX / IDÉES EN VRAC</div>
      {/* Quick capture */}
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        <input value={text} onChange={e=>setText(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&text.trim()){const ts=new Date().toLocaleString("fr-CA",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});setInbox([{id:Date.now(),text,tag:"idée",ts,done:false},...inbox]);setText("");}}}
          placeholder="Capture une idée rapidement..."
          style={{flex:1,background:T.s2,border:`1px solid ${T.border}`,color:T.text,borderRadius:8,padding:"10px 14px",fontSize:13}}/>
        <button onClick={()=>{if(text.trim()){const ts=new Date().toLocaleString("fr-CA",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});setInbox([{id:Date.now(),text,tag:"idée",ts,done:false},...inbox]);setText("");}}} style={{background:ws.color,color:"#fff",border:"none",borderRadius:8,padding:"10px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>+</button>
      </div>
      {/* Filters */}
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        <button onClick={()=>setFilter("all")} style={{background:filter==="all"?ws.color:T.s2,color:filter==="all"?"#fff":T.muted,border:`1px solid ${filter==="all"?ws.color:T.border}`,borderRadius:20,padding:"3px 12px",fontSize:11,cursor:"pointer"}}>Tout</button>
        {tags.map(tag=><button key={tag} onClick={()=>setFilter(tag)} style={{background:filter===tag?tagColor[tag]:T.s2,color:filter===tag?"#fff":T.muted,border:`1px solid ${filter===tag?tagColor[tag]:T.border}`,borderRadius:20,padding:"3px 12px",fontSize:11,cursor:"pointer"}}>{tag}</button>)}
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px",color:T.dim,fontSize:13}}>Capture tes idées ici — sans jugement, sans structure.</div>}
      {filtered.map(item=>(
        <div key={item.id} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"12px 14px",background:item.done?T.s2:T.surface,border:`1px solid ${T.border}`,borderRadius:9,marginBottom:8,opacity:item.done?0.5:1}}>
          <div onClick={()=>setInbox(inbox.map(x=>x.id===item.id?{...x,done:!x.done}:x))} style={{width:18,height:18,borderRadius:4,border:`2px solid ${item.done?"#00C896":T.border}`,background:item.done?"#00C896":"transparent",cursor:"pointer",flexShrink:0,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {item.done&&<span style={{color:"#fff",fontSize:10}}>✓</span>}
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:T.text,lineHeight:1.4,textDecoration:item.done?"line-through":"none"}}>{item.text}</div>
            <div style={{display:"flex",gap:8,marginTop:4,alignItems:"center"}}>
              <select value={item.tag} onChange={e=>setInbox(inbox.map(x=>x.id===item.id?{...x,tag:e.target.value}:x))} style={{background:"transparent",border:"none",fontSize:9,color:tagColor[item.tag]||T.muted,cursor:"pointer",padding:0,outline:"none"}}>
                {tags.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              <span style={{fontSize:9,color:T.dim}}>{item.ts}</span>
            </div>
          </div>
          <button onClick={()=>setInbox(inbox.filter(x=>x.id!==item.id))} style={{background:"transparent",border:"none",color:T.dim,cursor:"pointer",fontSize:13,padding:"0 2px"}}>✕</button>
        </div>
      ))}
    </div>
  );
}

// ─── ACCESS ───────────────────────────────────────────────────────────────

        <div><div style={{fontSize:16,fontWeight:700,marginBottom:4}}>{t.access} — {ws.name}</div><div style={{fontSize:13,color:T.muted}}>{members.length} membres</div></div>
        <button onClick={()=>setModal({type:"invite"})} style={{background:ws.color,color:"#fff",border:"none",borderRadius:7,padding:"8px 18px",fontSize:12,fontWeight:600}}>+ {t.inviteMember}</button>
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>

          <div style={{width:8,height:8,borderRadius:"50%",background:ROLE_COLOR[r]}}/>
          <span style={{fontSize:11,fontWeight:600,color:ROLE_COLOR[r]}}>{t.roles[r]}</span>
          <span style={{fontSize:10,color:T.muted}}>· {r==="admin"?"Accès total":r==="manager"?"Locations assignées":r==="staff"?"Read-only":"Projets partagés"}</span>
        </div>)}
      </div>
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr 1.5fr 80px",padding:"10px 18px",background:T.s2,borderBottom:`1px solid ${T.border}`}}>
          {[t.name,t.email,t.role,t.location,""].map((h,i)=><div key={i} style={{fontSize:10,fontWeight:600,color:T.muted,letterSpacing:0.4}}>{h.toUpperCase()}</div>)}
        </div>
        {members.map((m,i)=>(
          <div key={m.id} style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr 1.5fr 80px",padding:"14px 18px",alignItems:"center",borderBottom:i<members.length-1?`1px solid ${T.border}`:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}><Avatar name={m.name} size={32} color={ROLE_COLOR[m.role]}/><div><div style={{fontSize:13,fontWeight:600}}>{m.name}</div></div></div>
            <span style={{fontSize:12,color:T.muted,fontFamily:"'JetBrains Mono',monospace"}}>{m.email}</span>
            <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:7,height:7,borderRadius:"50%",background:ROLE_COLOR[m.role]}}/><span style={{fontSize:11,fontWeight:600,color:ROLE_COLOR[m.role]}}>{t.roles[m.role]}</span></div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{(m.locations||[]).map(l=><Badge key={l} label={l} color={T.dim} small/>)}</div>
            <button onClick={()=>setModal({type:"edit_member",payload:m})} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:6,padding:"5px 10px",fontSize:11,color:T.muted}}>Modifier</button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── MODAL ────────────────────────────────────────────────────────────────
function Modal({modal,setModal,ws,members,user,addTask,updateTask,deleteTask,addProject,updateProject,deleteProject,addMeeting,updateMeeting,deleteMeeting,addInfluencer,updateInfluencer,deleteInfluencer,addCalEvent,updateCalEvent,deleteCalEvent,addExpense,updateExpense,deleteExpense,addProduct,updateProduct,deleteProduct,addClient,updateClient,deleteClient,addTaskNote,taskNotes,mediaBudget,addMediaBudget,updateMediaBudget,addMember,T,t,wsId}){
  const [form,setForm]=useState(modal.payload||modal.prefill||{});
  const close=()=>setModal(null);
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const isTask=modal.type.includes("task")||modal.type.includes("tasks");
  const isProj=modal.type.includes("project");
  const isMtg=modal.type.includes("meeting");
  const isMed=modal.type.includes("media");
  const isCal=modal.type.includes("calendar");
  const isExp=modal.type.includes("expense")||modal.type.includes("expenses");
  const isProd=modal.type.includes("product")||modal.type.includes("products");
  const isAgenda=modal.type==="add_agenda";
  const isAction=modal.type==="add_action";
  const isBudget=modal.type==="set_budget";
  const isNote=modal.type==="add_note";
  const isClient=modal.type.includes("client")||modal.type.includes("clients");
  const isAcc=modal.type.includes("member")||modal.type==="invite";
  const isEdit=modal.type.startsWith("edit");

  async function save(){
    if(isTask){
      if(!form.title)return;
      // Format due date nicely from date input (2026-04-12 → Apr 12)
      let dueFormatted = "—";
      let dueMonth = null, dueDay = null;
      if(form.due_date){
        const d = new Date(form.due_date + "T12:00:00");
        dueFormatted = d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
        dueMonth = d.getMonth() + 1;
        dueDay = d.getDate();
      } else if(form.due && form.due !== "—") {
        dueFormatted = form.due;
      }
      const ev={status:"To Do",priority:"Medium",owner:user.name,due:"—",tags:[],location:"Global",reminders:["1","3"],...form,due:dueFormatted};
      if(isEdit) await updateTask(form.id,ev);
      else {
        await addTask(ev);
        // Auto-add to calendar if checked and date selected
        if(form.add_to_cal && dueMonth && dueDay){
          await addCalEvent({
            title: form.title,
            category: "New Product",
            location: form.location || "Global",
            month: dueMonth,
            day: dueDay,
            end_month: null,
            end_day: null,
            has_end: false,
            note: `Tâche: ${form.title}`,
          });
        }
      }
    } else if(isProj){
      if(!form.title)return;
      let dueFormatted = form.due || "—";
      if(form.due_date){ const d=new Date(form.due_date+"T12:00:00"); dueFormatted=d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
      const ev={progress:0,status:"Planning",owner:user.name,location:"Global",description:"",...form,due:dueFormatted};
      if(isEdit)await updateProject(form.id,ev); else await addProject(ev);
    } else if(isMtg){
      if(!form.title)return;
      let dateFormatted = form.date || "—";
      if(form.meeting_date){ const d=new Date(form.meeting_date+"T12:00:00"); dateFormatted=d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
      const ev={owner:user.name,attendees:[],status:"Upcoming",notes:"",...form,date:dateFormatted};
      if(isEdit)await updateMeeting(form.id,ev); else await addMeeting(ev);
      // Auto-sync to Google Calendar if connected
      if(gcalIsConnected()&&form.meeting_date){
        gcalCreateEvent({...form,date:dateFormatted}).then(link=>{
          if(link)console.log("Google Calendar synced:",link);
        });
      }
    } else if(isMed){
      if(!form.name)return;
      const ev={status:"À contacter",platform:"Instagram",followers:"—",visit:"—",content:"—",notes:"",...form};
      if(isEdit)await updateInfluencer(form.id,ev); else await addInfluencer(ev);
    } else if(isCal){
      if(!form.title)return;
      const ev={category:"New Product",location:"Global",month:NM,day:1,note:"",...form};
      if(isEdit)await updateCalEvent(form.id,ev); else await addCalEvent(ev);
    } else if(isExp){
      if(!form.title||!form.amount)return;
      const ev={urgency:"Moyenne",category:"Autre",location:"Global",notes:"",payment_status:"À payer",...form};
      if(isEdit)await updateExpense(form.id,ev); else await addExpense(ev);
    } else if(isProd){
      if(!form.title)return;
      const ev={phase:"Idée",location:"Global",updates:[],description:"",price:"",target:"",...form};
      if(isEdit)updateProduct(form.id,ev); else addProduct(ev);
    } else if(isAgenda){
      const meeting=modal.payload;
      const agenda=[...(meeting.agenda||[]),{title:form.title,note:form.note||"",duration:form.duration||""}];
      lsUpd("meetings",meeting.id,{agenda});
    } else if(isAction){
      const meeting=modal.payload;
      const actions=[...(meeting.actions||[]),{title:form.title,owner:form.owner||"",due:form.due||"",done:false}];
      lsUpd("meetings",meeting.id,{actions});
    } else if(isBudget){
      const currentMonth=new Date().toISOString().slice(0,7);
      const existing=(mediaBudget||[]).find(b=>b.month===currentMonth&&b.location==="Global");
      if(existing) updateMediaBudget(existing.id,{budget:+form.budget});
      else addMediaBudget({month:currentMonth,location:"Global",budget:+form.budget});
    } else if(isClient){
      if(!form.name)return;
      const ev={status:"Prospect",notes:"",interactions:[],...form};
      if(isEdit)updateClient(form.id,ev); else addClient(ev);
    } else if(isAcc){
      if(!form.name||!form.email)return;
      await addMember({...form,role:form.role||"staff",workspace_access:[wsId],locations:[form.location||"Global"],password_hash:form.password||"temp2026"});
    }
    close();
  }

  const [confirmDel,setConfirmDel]=useState(false);

  async function del(){
    if(!confirmDel){setConfirmDel(true);return;}
    if(isTask)await deleteTask(form.id);
    else if(isProj)await deleteProject(form.id);
    else if(isMtg)await deleteMeeting(form.id);
    else if(isMed)await deleteInfluencer(form.id);
    else if(isCal)await deleteCalEvent(form.id);
    else if(isExp)await deleteExpense(form.id);
    else if(isProd)deleteProduct(form.id);
    else if(isClient)deleteClient(form.id);
    close();
  }

  const MS=t.months;

  return(
    <div onClick={close} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.surface,border:`1px solid ${T.border}`,borderTop:`2px solid ${ws.color}`,borderRadius:12,padding:28,width:500,maxWidth:"100%",maxHeight:"90vh",overflowY:"auto",boxShadow:T.shadow}}>
        <div style={{fontSize:15,fontWeight:700,color:ws.color,marginBottom:20}}>
          {isEdit?(isMed?t.editInfluencer:isCal?"Modifier event":isMtg?t.editMeeting:isProj?t.editProject:t.editTask):(isMed?t.newInfluencer:isCal?t.addEvent:isMtg?t.newMeeting:isProj?t.newProject:isAcc?t.inviteMember:t.newTask)}
        </div>

        {isTask&&<><MF label={t.title} T={T}><input value={form.title||""} onChange={e=>f("title",e.target.value)} placeholder="Nom de la tâche"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.status} T={T}><select value={form.status||"To Do"} onChange={e=>f("status",e.target.value)}>{Object.keys(TASK_STATUS).map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.priority} T={T}><select value={form.priority||"Medium"} onChange={e=>f("priority",e.target.value)}>{Object.keys(TASK_PRI).map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
            <MF label={t.owner} T={T}><select value={form.owner||user.name} onChange={e=>f("owner",e.target.value)}>{members.map(m=><option key={m.id}>{m.name}</option>)}</select></MF>
          </div>
          {/* ── DATES & RAPPELS ── */}
          <div style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:0.8,marginBottom:12}}>📅 DATES & RAPPELS</div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
              {/* Start date */}
              <div>
                <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:6,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:"#0A84FF",display:"inline-block"}}/>
                  DATE DE DÉBUT
                </div>
                <DatePicker value={form.start_date||""} onChange={v=>f("start_date",v)} color="#0A84FF" T={T}/>
              </div>
              {/* Deadline */}
              <div>
                <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:6,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:ws.color,display:"inline-block"}}/>
                  DEADLINE
                </div>
                <DatePicker value={form.due_date||""} onChange={v=>f("due_date",v)} color={ws.color} T={T}/>
              </div>
            </div>

            {/* Duration indicator */}
            {form.start_date&&form.due_date&&(()=>{
              const s=new Date(form.start_date+"T00:00:00");
              const e=new Date(form.due_date+"T00:00:00");
              const diff=Math.round((e-s)/86400000);
              const today=new Date(); today.setHours(0,0,0,0);
              const elapsed=Math.round((today-s)/86400000);
              const pct=diff>0?Math.min(100,Math.max(0,Math.round(elapsed/diff*100))):0;
              if(diff<0) return <div style={{fontSize:11,color:"#FF3B30",background:"#FF3B3015",borderRadius:7,padding:"6px 10px",marginBottom:12}}>⚠️ La deadline est avant la date de début</div>;
              return(
                <div style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:T.muted,marginBottom:4}}>
                    <span>Durée : {diff} jour{diff>1?"s":""}</span>
                    <span style={{color:pct>80?"#FF3B30":pct>50?"#FF9F0A":"#00C896",fontWeight:700}}>{pct}% écoulé</span>
                  </div>
                  <div style={{height:4,background:T.s3,borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:pct+"%",background:pct>80?"#FF3B30":pct>50?"#FF9F0A":"#00C896",borderRadius:4,transition:"width 0.3s"}}/>
                  </div>
                </div>
              );
            })()}

            {/* Reminders */}
            <div>
              <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:8,fontWeight:600}}>🔔 RAPPELS AVANT DEADLINE</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[
                  {label:"Jour J",  val:"0"},
                  {label:"1 jour",  val:"1"},
                  {label:"2 jours", val:"2"},
                  {label:"3 jours", val:"3"},
                  {label:"1 sem",   val:"7"},
                  {label:"2 sem",   val:"14"},
                ].map(r=>{
                  const active=(form.reminders||["1","3"]).includes(r.val);
                  return(
                    <button key={r.val} type="button" onClick={()=>{
                      const cur=form.reminders||["1","3"];
                      f("reminders", active?cur.filter(x=>x!==r.val):[...cur,r.val]);
                    }} style={{
                      padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:active?700:400,
                      background:active?ws.color+"22":"transparent",
                      border:`1.5px solid ${active?ws.color:T.border}`,
                      color:active?ws.color:T.muted,
                      cursor:"pointer",transition:"all 0.15s",
                    }}>{r.label}</button>
                  );
                })}
              </div>
              <div style={{fontSize:10,color:T.dim,marginTop:6}}>
                {(form.reminders||["1","3"]).length>0
                  ? `Notifications : ${(form.reminders||["1","3"]).map(v=>v==="0"?"le jour J":`${v}j avant`).join(", ")}`
                  : "Aucun rappel configuré"}
              </div>
            </div>
          </div>

          {/* Calendar sync */}
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:ws.color+"12",border:`1px solid ${ws.color}33`,borderRadius:7,marginBottom:14}}>
            <input type="checkbox" id="addtocal" checked={form.add_to_cal||false} onChange={e=>f("add_to_cal",e.target.checked)}
              style={{width:16,height:16,accentColor:ws.color,cursor:"pointer"}}/>
            <label htmlFor="addtocal" style={{fontSize:12,color:T.text,cursor:"pointer",userSelect:"none"}}>
              ⊞ Ajouter au calendrier marketing
            </label>
          </div>
          <MF label={t.notes} T={T}><textarea value={form.notes||""} onChange={e=>f("notes",e.target.value)} placeholder="Note générale sur la tâche..."/></MF>
          {isEdit&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,color:T.muted,letterSpacing:0.8,marginBottom:8,fontWeight:600}}>JOURNAL D'AVANCEMENT</div>
              <div style={{maxHeight:160,overflowY:"auto",marginBottom:8}}>
                {(taskNotes||[]).filter(n=>n.taskId===form.id).slice().reverse().map((n,i)=>(
                  <div key={i} style={{padding:"8px 10px",background:T.s2,borderRadius:7,marginBottom:6}}>
                    <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3}}>
                      <Avatar name={n.author} size={16} color={ws.color}/>
                      <span style={{fontSize:10,fontWeight:600}}>{n.author}</span>
                      <span style={{fontSize:9,color:T.dim,marginLeft:"auto"}}>{n.timestamp}</span>
                    </div>
                    <div style={{fontSize:12,color:T.text,lineHeight:1.4}}>{n.text}</div>
                  </div>
                ))}
                {(taskNotes||[]).filter(n=>n.taskId===form.id).length===0&&<div style={{fontSize:11,color:T.dim,fontStyle:"italic",padding:"8px 0"}}>Aucune note d'avancement</div>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <input value={form._newNote||""} onChange={e=>f("_newNote",e.target.value)}
                  placeholder="Ajouter une note d'avancement..." onKeyDown={e=>{if(e.key==="Enter"&&form._newNote?.trim()){addTaskNote(form.id,form._newNote,user.name);f("_newNote","");}}}
                  style={{flex:1,background:T.inputBg,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,padding:"7px 10px",fontSize:12}}/>
                <button onClick={()=>{if(form._newNote?.trim()){addTaskNote(form.id,form._newNote,user.name);f("_newNote","");}}}
                  style={{background:ws.color,color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>→</button>
              </div>
            </div>
          )}
          <Btns color={ws.color} onSave={save} onDelete={isEdit?del:null} onClose={close} t={t} confirmDel={confirmDel}/></>}

        {isProj&&<><MF label={t.title} T={T}><input value={form.title||""} onChange={e=>f("title",e.target.value)} placeholder="Nom du projet"/></MF>
          <MF label={t.description} T={T}><textarea value={form.description||""} onChange={e=>f("description",e.target.value)}/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.status} T={T}><select value={form.status||"Planning"} onChange={e=>f("status",e.target.value)}>{Object.keys(PROJ_STATUS).map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
            <MF label={t.owner} T={T}><select value={form.owner||user.name} onChange={e=>f("owner",e.target.value)}>{members.map(m=><option key={m.id}>{m.name}</option>)}</select></MF>
            <MF label={t.dueDate} T={T}><DatePicker value={form.due_date||""} onChange={v=>f("due_date",v)} color={ws.color} T={T}/></MF>
          </div>
          <MF label={`${t.progress}: ${form.progress||0}%`} T={T}><input type="range" min={0} max={100} value={form.progress||0} onChange={e=>f("progress",+e.target.value)} style={{width:"100%",accentColor:ws.color,border:"none",padding:0}}/></MF>
          <Btns color={ws.color} onSave={save} onDelete={isEdit?del:null} onClose={close} t={t} confirmDel={confirmDel}/></>}

        {isMtg&&<><MF label={t.title} T={T}><input value={form.title||""} onChange={e=>f("title",e.target.value)} placeholder="Nom du meeting"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.dueDate} T={T}><DatePicker value={form.meeting_date||""} onChange={v=>f("meeting_date",v)} color={ws.color} T={T}/></MF>
            <MF label="Heure" T={T}><input type="time" value={form.time||""} onChange={e=>f("time",e.target.value)} style={{background:T.inputBg,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,padding:"8px 11px",fontSize:13,width:"100%"}}/></MF>
            <MF label={t.status} T={T}><select value={form.status||"Upcoming"} onChange={e=>f("status",e.target.value)}>{["Upcoming","Récurrent","Done"].map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.owner} T={T}><select value={form.owner||user.name} onChange={e=>f("owner",e.target.value)}>{members.map(m=><option key={m.id}>{m.name}</option>)}</select></MF>
          </div>
          <MF label={t.notes} T={T}><textarea value={form.notes||""} onChange={e=>f("notes",e.target.value)}/></MF>
          {/* Google Calendar sync status */}
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:gcalIsConnected()?"#00C89612":"#FF9F0A12",border:`1px solid ${gcalIsConnected()?"#00C89633":"#FF9F0A33"}`,borderRadius:7,marginBottom:10}}>
            <span style={{fontSize:14}}>{gcalIsConnected()?"✅":"⚠️"}</span>
            <span style={{fontSize:11,color:gcalIsConnected()?"#00C896":"#FF9F0A",fontWeight:600}}>{gcalIsConnected()?"Sera synchronisé dans Google Calendar":"Google Calendar non connecté"}</span>
          </div>
          <div style={{background:"#1a73e822",border:"1px solid #1a73e844",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{fontSize:16}}>📹</span>
              <span style={{fontSize:12,fontWeight:700,color:"#1a73e8"}}>Google Meet</span>
            </div>
            {form.meet_link?(
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <a href={form.meet_link} target="_blank" rel="noreferrer" style={{fontSize:12,color:"#1a73e8",textDecoration:"none",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{form.meet_link}</a>
                <button onClick={()=>navigator.clipboard?.writeText(form.meet_link)} style={{background:"#1a73e822",border:"1px solid #1a73e844",borderRadius:5,padding:"3px 8px",fontSize:10,color:"#1a73e8",cursor:"pointer"}}>Copier</button>
                <button onClick={()=>f("meet_link","")} style={{background:"transparent",border:"none",color:T.dim,cursor:"pointer",fontSize:11}}>✕</button>
              </div>
            ):(
              <button onClick={()=>{const r=()=>Math.random().toString(36).slice(2,5);f("meet_link","https://meet.google.com/"+r()+"-"+r()+"-"+r());}} style={{background:"#1a73e8",color:"#fff",border:"none",borderRadius:7,padding:"8px 16px",fontSize:12,fontWeight:600,cursor:"pointer",width:"100%"}}>
                + Générer un lien Google Meet
              </button>
            )}
          </div>
          <Btns color={ws.color} onSave={save} onDelete={isEdit?del:null} onClose={close} t={t} confirmDel={confirmDel}/></>}

        {isMed&&<><MF label={t.name} T={T}><input value={form.name||""} onChange={e=>f("name",e.target.value)} placeholder="@handle"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.platform} T={T}><select value={form.platform||"Instagram"} onChange={e=>f("platform",e.target.value)}>{["Instagram","TikTok","YouTube","Twitter"].map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
            <MF label={t.followers} T={T}><input value={form.followers||""} onChange={e=>f("followers",e.target.value)} placeholder="ex: 45K"/></MF>
            <MF label="Coût ($)" T={T}><input type="number" value={form.cost||""} onChange={e=>f("cost",e.target.value)} placeholder="ex: 500"/></MF>
            <MF label={t.status} T={T}><select value={form.status||"À contacter"} onChange={e=>f("status",e.target.value)}>{Object.keys(INFL_STATUS).map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.visit} T={T}><input value={form.visit||""} onChange={e=>f("visit",e.target.value)} placeholder="ex: Apr 20"/></MF>
            <MF label={t.content} T={T}><input value={form.content||""} onChange={e=>f("content",e.target.value)} placeholder="ex: Reel + Story"/></MF>
          </div>
          <MF label={t.notes} T={T}><textarea value={form.notes||""} onChange={e=>f("notes",e.target.value)}/></MF>
          <Btns color={ws.color} onSave={save} onDelete={isEdit?del:null} onClose={close} t={t}/></>}

      // Extract JSON actions
      try{
        const stripped=reply.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
        function extractJsonBlocks(text){
          var blocks=[];
          // Normalize: collapse whitespace to find {"action" anywhere
          var rem=text;
          while(true){
            var start=rem.search(/\{[\s\S]*?"action"/);
            if(start<0)break;
            var depth=0,end=-1;
            for(var i=start;i<rem.length;i++){
              if(rem[i]==='{')depth++;
              else if(rem[i]==='}'){depth--;if(depth===0){end=i;break;}}
            }
            if(end<0)break;

            var raw=rem.slice(start,end+1);

            <input ref={inputRef} value={input} onChange={function(e){setInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
              placeholder="Ajoute un meeting avec Samy..."
              style={{flex:1,background:T.s2,border:`1px solid ${T.border}`,borderRadius:10,padding:"9px 12px",fontSize:12,color:T.text,outline:"none"}}/>
            <button onClick={send} disabled={loading} style={{background:"linear-gradient(135deg,#FF6B00,#FF9F0A)",border:"none",borderRadius:10,padding:"9px 14px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",opacity:loading?0.6:1,boxShadow:"0 2px 8px #FF6B0044",transition:"all 0.15s"}}>→</button>
          </div>
        </div>
      )}
      {/* Bubble */}
      {!open&&<div onClick={()=>setOpen(true)} style={{position:"absolute",bottom:96,right:8,background:"linear-gradient(135deg,#FF6B00,#FF9F0A)",color:"#fff",borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 20px rgba(255,107,0,0.5)",animation:"fadeIn 0.3s ease",whiteSpace:"nowrap",letterSpacing:0.3}}>Ask AI 🧀</div>}
      {/* Mascot button */}
      <div onClick={()=>setOpen(v=>!v)} style={{width:80,height:80,cursor:"pointer",filter:"drop-shadow(0 6px 20px rgba(255,107,0,0.5))",animation:open?"":bounce?"mascotWave 0.5s ease-in-out":"mascotBob 3s ease-in-out infinite",transition:"filter 0.2s"}}
        onMouseEnter={function(e){e.currentTarget.style.filter="drop-shadow(0 10px 28px rgba(255,107,0,0.8))";}}
        onMouseLeave={function(e){e.currentTarget.style.filter="drop-shadow(0 6px 20px rgba(255,107,0,0.5))";}}
      >
        <img src={MASCOT_BNC} style={{width:80,height:80,objectFit:"contain",display:"block",background:"transparent"}}/>
      </div>
      <style>{`@keyframes mascotBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}@keyframes mascotWave{0%{transform:rotate(0deg)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}100%{transform:rotate(0deg)}}@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
