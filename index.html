async function gcalCreateEvent(meeting){
  const token=gcalGetToken();
  if(!token)return null;
  if(!meeting.meeting_date)return null;

  const dateStr=meeting.meeting_date;
  const timeStr=meeting.time||"09:00";
  const startDT=dateStr+"T"+timeStr+":00";
  const endHour=String(parseInt(timeStr.split(":")[0])+1).padStart(2,"0");
  const endDT=dateStr+"T"+endHour+":"+timeStr.split(":")[1]+":00";

  const event={
    summary:"[BNC] "+meeting.title,
    description:(meeting.notes||"")+(meeting.meet_link?"\n\nGoogle Meet: "+meeting.meet_link:""),
    start:{dateTime:startDT,timeZone:"America/Toronto"},
    end:{dateTime:endDT,timeZone:"America/Toronto"},
    attendees:(meeting.attendees||[]).map(a=>({email:a==="Tito"?"baptiste.petit@brickncheese.com":a==="Samy"?"samy.eljabri@brickncheese.com":a})),
    conferenceData:meeting.meet_link?{
      createRequest:{requestId:Math.random().toString(36),conferenceSolutionKey:{type:"hangoutsMeet"}}
    }:undefined,
  };

  try{
    const res=await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events",{
      method:"POST",
      headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify(event)
    });
    if(res.status===401){gcalClearToken();return null;}
    const data=await res.json();
    return data.htmlLink||null;
  }catch(e){return null;}
}

async function gcalFetchEvents(){
  const token=gcalGetToken();
  if(!token)return [];
  try{
    const now=new Date();
    const min=now.toISOString();
    const max=new Date(now.getFullYear(),now.getMonth()+3,1).toISOString();
    const url="https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin="+encodeURIComponent(min)+"&timeMax="+encodeURIComponent(max)+"&singleEvents=true&orderBy=startTime&maxResults=50";
    const res=await fetch(url,{headers:{Authorization:"Bearer "+token}});
    if(res.status===401){gcalClearToken();return [];}
    const data=await res.json();
    return (data.items||[]).map(function(e){
      var start=e.start&&(e.start.dateTime||e.start.date)||"";
      var dateStr="";
      if(start){
        var d=new Date(start);
        dateStr=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      }
      var time="";
      if(e.start&&e.start.dateTime){
        var d2=new Date(e.start.dateTime);
        time=d2.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false});
      }
      return {
        id:"gcal_"+e.id,
        title:e.summary||"(Sans titre)",
        date:dateStr,
        time:time,
        status:"Upcoming",
        owner:"Tito",
        notes:e.description||"",
        attendees:(e.attendees||[]).map(function(a){return a.displayName||a.email||"";}).filter(Boolean),
        meet_link:e.hangoutLink||"",
        gcal_id:e.id,
        from_gcal:true,
      };
    });
  }catch(e){console.error("gcalFetchEvents error:",e);return [];}
}


async function gcalConnect(){
  if(!window.google||GCAL_CLIENT_ID==="REPLACE_WITH_CLIENT_ID"){
    alert("Google Calendar non configuré. Déploie sur Vercel d'abord.");
    return;
  }
  const client=window.google.accounts.oauth2.initTokenClient({
    client_id:GCAL_CLIENT_ID,
    scope:GCAL_SCOPES,
    callback:(resp)=>{
      if(resp.access_token){
        gcalSetToken(resp.access_token);
        window.dispatchEvent(new Event("gcal_connected"));
      }
    },
  });
  client.requestAccessToken();
}

function DatePicker({value, onChange, color, T}){
  const today = new Date(); today.setHours(0,0,0,0);
  const selected = value ? new Date(value+"T00:00:00") : null;

  const initY = selected ? selected.getFullYear() : today.getFullYear();
  const initM = selected ? selected.getMonth() : today.getMonth();
  const [curYear,  setCurYear]  = useState(initY);
  const [curMonth, setCurMonth] = useState(initM);

  const MONTHS_FR = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const DAYS_SHORT = ["Lu","Ma","Me","Je","Ve","Sa","Di"];
  const DIM2 = [31,28,31,30,31,30,31,31,30,31,30,31];

  function daysInMonth(m,y){ return m===1&&y%4===0?29:DIM2[m]; }

  // First weekday (monday-first)
  const firstDow = new Date(curYear,curMonth,1).getDay();
  const offset   = firstDow===0?6:firstDow-1;
  const totalDays= daysInMonth(curMonth,curYear);

  function selectDay(d){
    const mm=String(curMonth+1).padStart(2,"0");
    const dd=String(d).padStart(2,"0");
    onChange(`${curYear}-${mm}-${dd}`);
  }
  function prevMonth(){ if(curMonth===0){setCurMonth(11);setCurYear(y=>y-1);}else setCurMonth(m=>m-1); }
  function nextMonth(){ if(curMonth===11){setCurMonth(0);setCurYear(y=>y+1);}else setCurMonth(m=>m+1); }

  function isSelected(d){ return selected&&selected.getFullYear()===curYear&&selected.getMonth()===curMonth&&selected.getDate()===d; }
  function isToday(d){ return today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d; }
  function isPast(d){ const t=new Date(curYear,curMonth,d); return t<today; }

  function deadlineDot(d){
    if(!selected) return null;
    const selDay=new Date(curYear,curMonth,d); selDay.setHours(0,0,0,0);
    if(isSelected(d)){
      const diff=Math.round((selDay-today)/86400000);
      if(diff<0)  return "#FF3B30";
      if(diff===0)return "#FF3B30";
      if(diff<=2) return "#FF9F0A";
      if(diff<=7) return "#FFD60A";
      return "#00C896";
    }
    return null;
  }

  const cells = [...Array(offset).fill(null), ...Array.from({length:totalDays},(_,i)=>i+1)];
  // pad to full weeks
  while(cells.length%7!==0) cells.push(null);

  return(
    <div style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:10,overflow:"hidden",userSelect:"none"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",padding:"12px 14px",borderBottom:`1px solid ${T.border}`,background:T.surface}}>
        <button onClick={prevMonth} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:6,width:28,height:28,cursor:"pointer",color:T.muted,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <div style={{flex:1,textAlign:"center"}}>
          <span style={{fontSize:13,fontWeight:700,color:T.text}}>{MONTHS_FR[curMonth]}</span>
          <span style={{fontSize:12,color:T.muted,marginLeft:6}}>{curYear}</span>
        </div>
        <button onClick={nextMonth} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:6,width:28,height:28,cursor:"pointer",color:T.muted,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      </div>

      {/* Day headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"8px 10px 4px"}}>
        {DAYS_SHORT.map(d=>(
          <div key={d} style={{textAlign:"center",fontSize:9,fontWeight:700,color:T.dim,letterSpacing:0.5,padding:"2px 0"}}>{d}</div>
        ))}
      </div>

      {/* Days grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"0 10px 10px",gap:2}}>
        {cells.map((day,idx)=>{
          if(!day) return <div key={`e${idx}`}/>;
          const sel  = isSelected(day);
          const tod  = isToday(day);
          const past = isPast(day);
          const dot  = deadlineDot(day);
          return(
            <button key={day} onClick={()=>selectDay(day)} style={{
              background: sel ? color : tod ? color+"22" : "transparent",
              color:      sel ? "#fff" : past ? T.dim : T.text,
              border:     `1px solid ${sel?color:tod?color+"66":"transparent"}`,
              borderRadius: 7,
              padding:"5px 0",
              fontSize:12,
              fontWeight: sel||tod ? 700 : 400,
              cursor:"pointer",
              position:"relative",
              transition:"all 0.1s",
              opacity: past&&!sel ? 0.4 : 1,
            }}
            onMouseEnter={e=>{if(!sel)e.currentTarget.style.background=color+"22";}}
            onMouseLeave={e=>{if(!sel)e.currentTarget.style.background="transparent";}}
            >
              {day}
              {sel&&dot&&<div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:"50%",background:"#fff"}}/>}
            </button>
          );
        })}
      </div>

      {/* Selected display */}
      {selected&&(
        <div style={{padding:"8px 14px 10px",borderTop:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <DeadlineBadge value={value}/>
          <span style={{fontSize:11,color:T.muted}}>
            {selected.toLocaleDateString("fr-CA",{weekday:"short",day:"numeric",month:"long"})}
          </span>
          <button onClick={()=>onChange("")} style={{background:"transparent",border:"none",fontSize:10,color:T.dim,cursor:"pointer"}}>✕ effacer</button>
        </div>
      )}
    </div>
  );
}

// Compact DatePicker — shows a button, opens calendar on click
function DatePickerInline({value, onChange, color, T, placeholder}){
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);

  // Close on outside click
  React.useEffect(()=>{
    function handler(e){ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); }
    if(open) document.addEventListener("mousedown", handler);
    return ()=>document.removeEventListener("mousedown", handler);
  },[open]);

  const label = value
    ? new Date(value+"T12:00:00").toLocaleDateString("fr-CA",{day:"numeric",month:"short"})
    : placeholder||"📅 Date";

  return(
    <div ref={ref} style={{position:"relative",display:"inline-block"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        background: value ? color+"18" : "transparent",
        border: `1px solid ${value ? color+"66" : T.border}`,
        borderRadius:20, padding:"3px 10px",
        fontSize:10, fontWeight: value ? 700 : 400,
        color: value ? color : T.muted,
        cursor:"pointer", transition:"all 0.15s",
        display:"flex", alignItems:"center", gap:4,
      }}>
        <span style={{fontSize:11}}>📅</span>
        {label}
        {value&&<span onClick={e=>{e.stopPropagation();onChange("");}} style={{marginLeft:2,opacity:0.6,fontSize:11}}>✕</span>}
      </button>
      {open&&(
        <div style={{
          position:"absolute", top:"calc(100% + 6px)", left:0,
          zIndex:500, boxShadow:"0 12px 32px rgba(0,0,0,0.3)",
          borderRadius:12, overflow:"hidden",
          border:`1px solid ${T.border}`,
          minWidth:240,
        }}>
          <DatePicker value={value} onChange={v=>{ onChange(v); if(v) setOpen(false); }} color={color} T={T}/>
        </div>
      )}
    </div>
  );
}

  let off=0; const r=40,circ=2*Math.PI*r;
  return <svg width={size} height={size} viewBox="0 0 120 120">
    {data.map((d,i)=>{const p=d.value/total;const el=<circle key={i} cx={60} cy={60} r={r} fill="none" stroke={d.color} strokeWidth={13} strokeDasharray={`${p*circ} ${circ}`} strokeDashoffset={-off*circ} style={{transform:"rotate(-90deg)",transformOrigin:"60px 60px"}}/>;off+=p;return el;})}
    <text x={60} y={60} textAnchor="middle" dominantBaseline="middle" fontSize="18" fontWeight="700" fill="#f2f2f2">{total}</text>
  </svg>;
}

function LoginPage({onLogin,T,t,theme,setTheme,lang,setLang}){
  const [email,setEmail]=useState(()=>localStorage.getItem('bnc_saved_email')||"");
  const [pass,setPass]=useState(()=>localStorage.getItem('bnc_saved_pass')||"");
  const [remember,setRemember]=useState(()=>!!localStorage.getItem('bnc_saved_email'));
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  // Auto-login if saved
  React.useEffect(()=>{
    const savedEmail=localStorage.getItem('bnc_saved_email');
    const savedPass=localStorage.getItem('bnc_saved_pass');
    if(savedEmail&&savedPass){
      (async()=>{
        try{
          const {data:rows}=await supa.from("profiles").select("*").eq("email",savedEmail).eq("password_hash",savedPass).single();
          if(rows){onLogin(rows);return;}
        }catch(e){}
        const profiles=lsGet("profiles");
        const d=profiles.find(p=>p.email===savedEmail&&p.password_hash===savedPass);
        if(d)onLogin(d);
      })();
    }
  },[]);

  async function handleLogin(){
    if(!email||!pass){setErr(t.loginError);return;}
    setLoading(true);setErr("");
    let data = null;
    try {
      const {data:rows}=await supa.from("profiles").select("*").eq("email",email.toLowerCase().trim()).eq("password_hash",pass).single();
      data=rows;
    } catch(e){
      const profiles=lsGet("profiles");
      data=profiles.find(p=>p.email===email.toLowerCase().trim()&&p.password_hash===pass);
    }
    setLoading(false);
    if(!data){setErr(t.loginError);return;}
    if(remember){localStorage.setItem("bnc_saved_email",email.toLowerCase().trim());localStorage.setItem("bnc_saved_pass",pass);}
    else{localStorage.removeItem("bnc_saved_email");localStorage.removeItem("bnc_saved_pass");}
    onLogin(data);
  }

  return(
    <div style={{height:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Inter',system-ui,sans-serif"}}>

          <div style={{fontSize:10,color:T.muted,letterSpacing:1,marginBottom:5,fontWeight:600}}>{t.loginEmail.toUpperCase()}</div>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="email@exemple.com"
            onKeyDown={e=>e.key==="Enter"&&handleLogin()}
            style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,color:T.text,borderRadius:7,padding:"10px 12px",fontSize:13,outline:"none"}}/>
        </div>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:10,color:T.muted,letterSpacing:1,marginBottom:5,fontWeight:600}}>{t.loginPass.toUpperCase()}</div>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"

            {lang==="fr"?"EN":"FR"}
          </button>
        </div>
      </div>
    </div>
  );
}

  // ── Notification system complet ──
  function addNotif(n){
    setNotifs(prev=>{
      // Éviter les doublons (même titre + même jour)
      const today=new Date().toDateString();
      const exists=prev.some(x=>x.title===n.title&&new Date(x.ts||0).toDateString()===today);
      if(exists)return prev;
      return [{...n,id:Date.now(),read:false,ts:Date.now(),time:new Date().toLocaleTimeString("fr-CA",{hour:"2-digit",minute:"2-digit"})},...prev];
    });
  }
  function sendUrgentAlert(expense){
    addNotif({type:"alert",urgency:"Critique",icon:"🚨",title:`ALERTE: ${expense.title}`,body:`${(+expense.amount).toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})} requis · ${expense.location}`});
  }
  function markAllRead(){setNotifs(prev=>prev.map(n=>({...n,read:true})));}
  function deleteNotif(id){setNotifs(prev=>prev.filter(n=>n.id!==id));}

  // Générer les notifs de tâches automatiquement au chargement
  useEffect(()=>{
    if(!tasks.length)return;
    const today=new Date(); today.setHours(0,0,0,0);
    const newNotifs=[];

    tasks.forEach(task=>{
      if(task.status==="Done")return;
      if(!task.due_date)return;
      const due=new Date(task.due_date+"T00:00:00");
      const diff=Math.round((due-today)/86400000);
      const reminders=task.reminders||["1","3"]; // default: 1j et 3j avant

      // Toujours notifier si en retard
      if(diff<0){
        newNotifs.push({type:"overdue",urgency:"Critique",icon:"🔴",
          title:`⏰ En retard: ${task.title}`,
          body:`${Math.abs(diff)} jour${Math.abs(diff)>1?"s":""} de retard · ${task.location} · ${task.owner}`,
          taskId:task.id});
        return;
      }

      // Jour J — toujours notifier
      if(diff===0){
        newNotifs.push({type:"today",urgency:"Critique",icon:"🔴",
          title:`🔴 Aujourd’hui: ${task.title}`,
          body:`Deadline aujourd’hui · ${task.location} · ${task.owner}`,
          taskId:task.id});
        return;
      }

      // Rappels configurés — vérifier si diff correspond à un rappel actif
      const diffStr=String(diff);
      if(reminders.includes(diffStr)){
        const urgency=diff<=2?"Haute":diff<=7?"Moyenne":"Basse";
        const icon=diff<=2?"🟠":diff<=7?"🟡":"🟢";
        newNotifs.push({type:"reminder",urgency,icon,
          title:`${icon} Dans ${diff}j: ${task.title}`,
          body:`Rappel · Deadline ${new Date(task.due_date+"T12:00:00").toLocaleDateString("fr-CA",{day:"numeric",month:"short"})} · ${task.location}`,
          taskId:task.id});
      }

      // Toujours alerter si ≤2j même sans rappel explicite
      if(diff<=2&&!reminders.includes(diffStr)){
        newNotifs.push({type:"soon",urgency:"Haute",icon:"🟠",
          title:`🟠 Dans ${diff}j: ${task.title}`,
          body:`Deadline très proche · ${task.owner}`,
          taskId:task.id});
      }
    });

    meetings.forEach(m=>{
      if(m.status!=="Upcoming")return;
      newNotifs.push({type:"meeting",urgency:"Moyenne",icon:"📅",
        title:`Meeting: ${m.title}`,
        body:`${m.date||""} · ${m.owner}`,
        meetingId:m.id});
    });

    newNotifs.forEach(n=>addNotif(n));
  },[tasks.length, meetings.length]);

    document.documentElement.style.setProperty('--ws-color', ws.color);
  },[theme, ws.color]);

    return(
    <div style={{display:"flex",height:"100vh",background:T.bg,fontFamily:"'Inter',system-ui,sans-serif",color:T.text,overflow:"hidden"}}>
      <style>{`*{box-sizing:border-box;}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:${T.dim};border-radius:8px}::-webkit-scrollbar-thumb:hover{background:${T.muted}}input,select,textarea{background:${T.inputBg};border:1.5px solid ${T.border};color:${T.text};border-radius:8px;padding:9px 12px;font-family:'Inter',system-ui,sans-serif;font-size:13px;width:100%;transition:border-color 0.15s;}input:focus,select:focus,textarea:focus{outline:none;border-color:${ws.color};box-shadow:0 0 0 3px ${ws.color}18;}button{cursor:pointer;font-family:'Inter',system-ui,sans-serif;}textarea{resize:vertical;min-height:72px;}@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,0.4)}50%{box-shadow:0 0 0 4px rgba(255,59,48,0)}}@keyframes checkPop{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}.fade-in{animation:fadeIn 0.2s ease}`}</style>

      {/* ── PREMIUM SIDEBAR ── */}
      <aside style={{
        width:sideCol?64:240,flexShrink:0,
        background:theme==="dark"?"rgba(8,8,10,0.98)":"rgba(255,255,255,0.97)",

        display:"flex",flexDirection:"column",

        position:"relative",zIndex:50,

        {/* Brand */}
        <div style={{padding:"16px 14px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:11,minHeight:64}}>
          <div style={{position:"relative",flexShrink:0}}>
            <WSLogo ws={ws} size={36}/>
            <div style={{position:"absolute",bottom:-2,right:-2,width:10,height:10,borderRadius:"50%",background:"#00C896",border:`2px solid ${T.bg}`}}/>
          </div>
          {!sideCol&&<div style={{overflow:"hidden",flex:1}}>
            <div style={{fontSize:13,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",letterSpacing:-0.2}}>{ws.name}</div>
            <div style={{fontSize:9,color:T.muted,fontFamily:"'JetBrains Mono',monospace",letterSpacing:1,marginTop:1,textTransform:"uppercase"}}>{t.workspace}</div>
          </div>}
          <button onClick={()=>setSideCol(c=>!c)} style={{
            background:"transparent",border:`1px solid ${T.border}`,
            color:T.muted,borderRadius:7,width:24,height:24,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:11,flexShrink:0,transition:"all 0.15s",
          }}>{sideCol?"›":"‹"}</button>
        </div>

        {/* WS switcher */}
        <div style={{padding:"10px 10px 6px",borderBottom:`1px solid ${T.border}`}}>
          {!sideCol&&<div style={{fontSize:9,color:T.dim,letterSpacing:1,fontWeight:600,marginBottom:6,paddingLeft:4,textTransform:"uppercase",opacity:0.6}}>Workspaces</div>}
          {accessibleWS.map(w=>{
            const urgent=wsUrgentCount(w.id);
            const isActive=wsId===w.id;
            return(
              <button key={w.id} onClick={()=>switchWs(w.id)} title={w.name}
                style={{
                  width:"100%",display:"flex",alignItems:"center",
                  gap:sideCol?0:10,
                  padding:sideCol?"9px 0":"7px 10px",
                  justifyContent:sideCol?"center":"flex-start",
                  borderRadius:10,border:"none",
                  background:isActive?w.color+"18":"transparent",marginBottom:2,
                  transition:"all 0.15s cubic-bezier(0.4,0,0.2,1)",
                  outline:isActive?`1.5px solid ${w.color}33`:"none",
                  position:"relative",
                }}
                onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background="rgba(255,255,255,0.05)";}}
                onMouseLeave={e=>{if(!isActive)e.currentTarget.style.background="transparent";}}>
                <div style={{position:"relative",flexShrink:0}}>
                  <WSLogo ws={w} size={28}/>
                  {urgent>0&&!isActive&&(
                    <div style={{
                      position:"absolute",top:-4,right:-4,
                      minWidth:16,height:16,borderRadius:8,
                      background:"#FF3B30",border:`2px solid ${T.bg}`,
                      color:"#fff",fontSize:8,fontWeight:800,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      padding:"0 3px",lineHeight:1,
                    }}>{urgent>9?"9+":urgent}</div>
                  )}
                </div>
                {!sideCol&&<>
                  <span style={{fontSize:12,fontWeight:700,color:isActive?w.color:T.muted,whiteSpace:"nowrap",letterSpacing:0.3,flex:1}}>{w.abbr}</span>
                  {urgent>0&&!isActive&&<span style={{background:"#FF3B30",color:"#fff",fontSize:8,fontWeight:800,padding:"1px 5px",borderRadius:6}}>{urgent}</span>}
                  {isActive&&<div style={{width:6,height:6,borderRadius:"50%",background:w.color,flexShrink:0,boxShadow:`0 0 8px ${w.color}`}}/>}
                </>}
              </button>
            );
          })}
        </div>

        {/* ── INLINE SEARCH ── */}
        {!sideCol&&(
          <div style={{margin:"10px 12px 4px",position:"relative"}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13,color:T.dim,pointerEvents:"none",zIndex:1}}>⌕</span>
            <input
              ref={searchRef}
              value={search}
              onChange={e=>{setSearch(e.target.value);setSO(e.target.value.length>=2);}}
              onKeyDown={e=>{
                if(e.key==="Escape"){setSearch("");setSO(false);}
                if(e.key==="Enter"&&searchResults.length>0){
                  const r=searchResults[0];
                  setModule(r._type==="task"?"tasks":r._type==="project"?"projects":"meetings");
                  setSearch("");setSO(false);
                }
              }}
              placeholder={t.searchPlaceholder}
              style={{
                width:"100%",
                background:T.s2,border:`1px solid ${T.border}`,
                borderRadius:10,padding:"8px 28px 8px 32px",
                fontSize:12,color:T.text,outline:"none",
                transition:"all 0.15s",
                fontFamily:"'Inter',system-ui,sans-serif",
              }}
              onFocus={e=>{e.target.style.borderColor=ws.color;e.target.style.background=T.s3;}}
              onBlur={e=>{e.target.style.borderColor=T.border;e.target.style.background=T.s2;}}
            />
            {search&&<button onClick={()=>{setSearch("");setSO(false);}} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",color:T.dim,fontSize:11,cursor:"pointer",lineHeight:1,padding:2}}>✕</button>}
          </div>
        )}

        {/* Inline search results */}
        {!sideCol&&searchOpen&&search.length>=2&&(
          <div style={{
            margin:"0 12px 4px",
            background:T.surface,border:`1px solid ${T.border}`,
            borderRadius:10,overflow:"hidden",
            boxShadow:"0 8px 24px rgba(0,0,0,0.25)",
            maxHeight:220,overflowY:"auto",
          }}>
            {searchResults.length===0&&(
              <div style={{padding:"14px",textAlign:"center",color:T.muted,fontSize:12}}>{t.noResults}</div>
            )}
            {searchResults.slice(0,6).map(r=>(
              <div key={r.id+r._type}
                onClick={()=>{setModule(r._type==="task"?"tasks":r._type==="project"?"projects":"meetings");setSearch("");setSO(false);}}
                style={{padding:"9px 14px",borderBottom:`1px solid ${T.border}`,cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"background 0.1s"}}
                onMouseEnter={e=>e.currentTarget.style.background=T.s2}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{fontSize:13,opacity:0.5,flexShrink:0}}>{r._type==="task"?"☑":r._type==="project"?"◎":"⊕"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.title}</div>
                  <div style={{fontSize:10,color:T.muted}}>{r._type.toUpperCase()}</div>
                </div>
                {r.status&&<span style={{fontSize:9,color:TASK_STATUS[r.status]?.dot||PROJ_STATUS[r.status]||"#777",fontWeight:600,flexShrink:0}}>{r.status}</span>}
              </div>
            ))}
          </div>
        )}


        {/* Nav */}
        <nav style={{flex:1,padding:"6px 8px",overflowY:"auto"}}>
          {!sideCol&&<div style={{fontSize:9,color:T.dim,letterSpacing:1,fontWeight:600,margin:"8px 0 4px 4px",textTransform:"uppercase",opacity:0.6}}>Navigation</div>}
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setModule(n.id)} title={n.label}
              className={`nav-item${module===n.id?" active":""}`}
              style={{justifyContent:sideCol?"center":"flex-start",marginBottom:1,padding:sideCol?"10px 0":"8px 12px",width:"100%"}}>
              <span style={{fontSize:16,flexShrink:0,width:sideCol?"auto":20,textAlign:"center",lineHeight:1}}>{n.icon}</span>
              {!sideCol&&<span style={{fontSize:12.5,fontWeight:module===n.id?600:400,whiteSpace:"nowrap"}}>{n.label}</span>}
            </button>
          ))}
        </nav>

        {/* Footer */}
        <div style={{padding:"10px 10px",borderTop:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:6}}>
          {!sideCol&&<button onClick={()=>gcalConnect().then(()=>setGcalConnected(gcalIsConnected()))} style={{
            background:gcalConnected?"#00C89610":"rgba(255,255,255,0.04)",
            border:`1px solid ${gcalConnected?"#00C89640":T.border}`,
            borderRadius:9,padding:"7px 10px",fontSize:11,fontWeight:600,
            color:gcalConnected?"#00C896":T.muted,cursor:"pointer",width:"100%",textAlign:"left",
            display:"flex",alignItems:"center",gap:6,transition:"all 0.15s",
          }}>
            <span>{gcalConnected?"✅":"📅"}</span>
            <span style={{fontSize:11}}>{gcalConnected?"Calendar connecté":"Connecter Calendar"}</span>
          </button>}
          {!sideCol&&<div style={{display:"flex",gap:6}}>
            <button onClick={()=>setTheme(v=>{const n=v==="dark"?"light":"dark";localStorage.setItem('bnc_theme',n);return n;})} style={{flex:1,background:T.s2,border:`1px solid ${T.border}`,borderRadius:8,padding:"6px",fontSize:10,color:T.muted,cursor:"pointer",transition:"all 0.15s"}}>{theme==="dark"?"☀️ Light":"🌙 Dark"}</button>
            <button onClick={()=>setLang(v=>v==="fr"?"en":"fr")} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 10px",fontSize:10,color:T.muted,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>{lang==="fr"?"EN":"FR"}</button>
          </div>}
          <div style={{display:"flex",alignItems:"center",gap:9,padding:"4px 2px"}}>
            <Avatar name={user.name} size={30} color={ws.color}/>
            {!sideCol&&<div style={{flex:1,overflow:"hidden"}}>
              <div style={{fontSize:12,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.name}</div>
              <div style={{fontSize:10,color:T.muted}}>{t.roles[user.role]}</div>
            </div>}
            {!sideCol&&<button title={t.logout} onClick={()=>{localStorage.removeItem("bnc_saved_email");localStorage.removeItem("bnc_saved_pass");localStorage.removeItem("bnc_session_user");setUser(null);}} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:7,padding:"4px 8px",fontSize:10,color:T.muted,cursor:"pointer",transition:"all 0.15s"}}>↩</button>}
          </div>
        </div>
      </aside>


      {/* ── PREMIUM TOPBAR ── */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{
          height:60,borderBottom:`1px solid ${T.border}`,
          display:"flex",alignItems:"center",padding:"0 24px",gap:12,
          background:theme==="dark"?"rgba(8,8,10,0.95)":T.surface,
          flexShrink:0,backdropFilter:"blur(20px)",
          position:"sticky",top:0,zIndex:10,
        }}>
          {/* Breadcrumb */}
          <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.dim,letterSpacing:1,textTransform:"uppercase"}}>{ws.abbr}</span>
            <span style={{color:T.dim,fontSize:12}}>/</span>
            <span style={{fontSize:14,fontWeight:600,letterSpacing:-0.1}}>{NAV.find(n=>n.id===module)?.label}</span>
          </div>

          {/* Location filter (projects + media only — tasks has built-in location view) */}
          {["projects","media"].includes(module)&&wsId==="bnc"&&(
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {LOCATIONS.map(l=>(
                <button key={l} onClick={()=>setLocFilt(l)} style={{
                  background:locFilt===l?ws.color:"transparent",
                  color:locFilt===l?"#fff":T.muted,
                  border:`1px solid ${locFilt===l?ws.color:T.border}`,
                  borderRadius:20,padding:"4px 12px",fontSize:11,
                  fontWeight:locFilt===l?600:400,
                  transition:"all 0.15s",
                }}>{l}</button>
              ))}
            </div>
          )}

          {/* CTA Button */}
          {!["dashboard","calendar","access","expenses","products","tito_home","tito_notes","tito_goals","tito_inbox","tito_journal","daily_brief","global_cal","clients"].includes(module)&&(
            <button onClick={()=>setModal({type:`add_${module}`})} style={{
              background:ws.color,color:"#fff",border:"none",
              borderRadius:10,padding:"8px 16px",fontSize:12,fontWeight:600,
              display:"flex",alignItems:"center",gap:6,
              transition:"all 0.15s",letterSpacing:0.02,
              boxShadow:`0 2px 12px ${ws.color}44`,
            }}
            onMouseEnter={e=>{e.currentTarget.style.filter="brightness(1.1)";e.currentTarget.style.transform="translateY(-1px)";}}
            onMouseLeave={e=>{e.currentTarget.style.filter="brightness(1)";e.currentTarget.style.transform="translateY(0)";}}>
              <span style={{fontSize:16,lineHeight:1}}>+</span>
              {module==="tasks"?t.newTask:module==="projects"?t.newProject:module==="meetings"?t.newMeeting:t.newInfluencer}
            </button>
          )}
          {module==="products"&&<button onClick={()=>setModal({type:"add_products"})} style={{background:ws.color,color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontSize:12,fontWeight:600,boxShadow:`0 2px 12px ${ws.color}44`}}>+ Nouveau produit</button>}
          {module==="clients"&&<button onClick={()=>setModal({type:"add_clients"})} style={{background:ws.color,color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontSize:12,fontWeight:600,boxShadow:`0 2px 12px ${ws.color}44`}}>+ Nouveau client</button>}
          {module==="calendar"&&<button onClick={()=>setModal({type:"add_calendar"})} style={{background:ws.color,color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontSize:12,fontWeight:600,boxShadow:`0 2px 12px ${ws.color}44`}}>+ {t.addEvent}</button>}
          {module==="expenses"&&<button onClick={()=>setModal({type:"add_expenses"})} style={{background:ws.color,color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontSize:12,fontWeight:600,boxShadow:`0 2px 12px ${ws.color}44`}}>+ Dépense</button>}

          {/* Notification bell */}
          <div style={{position:"relative"}}>
            <button onClick={()=>setNotifOpen(o=>!o)} title="Notifications" style={{
              background:unreadCount>0?"#FF3B3012":"transparent",
              border:`1px solid ${unreadCount>0?"#FF3B3044":T.border}`,
              borderRadius:10,width:40,height:40,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:17,position:"relative",cursor:"pointer",transition:"all 0.15s",
            }}
            onMouseEnter={e=>{e.currentTarget.style.background=T.s2;}}
            onMouseLeave={e=>{e.currentTarget.style.background=unreadCount>0?"#FF3B3012":"transparent";}}>
              🔔
              {unreadCount>0&&(
                <span style={{
                  position:"absolute",top:-4,right:-4,
                  minWidth:18,height:18,borderRadius:9,
                  background:"#FF3B30",border:`2px solid ${T.bg}`,
                  color:"#fff",fontSize:9,fontWeight:700,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  padding:"0 4px",animation:"pulse 2s infinite",
                }}>{unreadCount>9?"9+":unreadCount}</span>
              )}
            </button>

            {notifOpen&&(
              <div onClick={e=>e.stopPropagation()} style={{
                position:"absolute",right:0,top:48,
                width:380,maxWidth:"95vw",
                background:T.surface,border:`1px solid ${T.border}`,
                borderRadius:16,boxShadow:T.shadow,zIndex:500,overflow:"hidden",
              }}>
                {/* Header */}
                <div style={{padding:"14px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:T.s2}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:15}}>🔔</span>
                    <span style={{fontSize:13,fontWeight:700}}>Notifications</span>
                    {unreadCount>0&&<span style={{background:"#FF3B30",color:"#fff",fontSize:9,fontWeight:700,padding:"1px 7px",borderRadius:10}}>{unreadCount} new</span>}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={markAllRead} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:7,padding:"3px 10px",fontSize:10,color:T.muted,cursor:"pointer"}}>
                      ✓ Tout lire
                    </button>
                    <button onClick={()=>setNotifOpen(false)} style={{background:"transparent",border:"none",fontSize:14,color:T.muted,cursor:"pointer"}}>✕</button>
                  </div>
                </div>

                {/* Today summary banner */}
                <NotifSummaryBanner notifs={notifs} T={T}/>

                {/* Notif list */}
                <div style={{maxHeight:380,overflowY:"auto"}}>
                  {notifs.length===0&&(
                    <div style={{padding:"32px",textAlign:"center"}}>
                      <div style={{fontSize:28,marginBottom:8}}>✅</div>
                      <div style={{fontSize:13,color:T.muted,fontWeight:500}}>Tout est à jour !</div>
                      <div style={{fontSize:11,color:T.dim,marginTop:4}}>Aucune tâche en retard</div>
                    </div>
                  )}
                  {notifs.map(n=>{
                    const bgColor={
                      "Critique":"#FF3B30",
                      "Haute":"#FF9F0A",
                      "Moyenne":"#FF9F0A",
                    }[n.urgency]||ws.color;
                    return(
                      <div key={n.id} style={{
                        padding:"12px 16px",
                        borderBottom:`1px solid ${T.border}`,
                        background:n.read?"transparent":bgColor+"08",
                        display:"flex",gap:10,alignItems:"flex-start",
                        transition:"background 0.15s",cursor:"pointer",
                      }}
                      onMouseEnter={e=>e.currentTarget.style.background=T.s2}
                      onMouseLeave={e=>e.currentTarget.style.background=n.read?"transparent":bgColor+"08"}
                      onClick={()=>{
                        setNotifs(prev=>prev.map(x=>x.id===n.id?{...x,read:true}:x));
                        if(n.type==="overdue"||n.type==="today"||n.type==="soon"||n.type==="week"){setModule("tasks");setNotifOpen(false);}
                        if(n.type==="meeting"){setModule("meetings");setNotifOpen(false);}
                        if(n.type==="expense"||n.type==="alert"){setModule("expenses");setNotifOpen(false);}
                      }}>
                        {/* Icon */}
                        <div style={{
                          width:34,height:34,borderRadius:10,flexShrink:0,
                          background:bgColor+"18",border:`1px solid ${bgColor}33`,
                          display:"flex",alignItems:"center",justifyContent:"center",
                          fontSize:16,
                        }}>{n.icon||"📌"}</div>

                        {/* Content */}
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
                            <div style={{fontSize:12,fontWeight:n.read?500:700,color:n.read?T.muted:T.text,lineHeight:1.4}}>{n.title}</div>
                            {!n.read&&<div style={{width:7,height:7,borderRadius:"50%",background:bgColor,flexShrink:0,marginTop:3}}/>}
                          </div>
                          <div style={{fontSize:11,color:T.muted,marginTop:3,lineHeight:1.4}}>{n.body}</div>
                          <div style={{fontSize:9,color:T.dim,marginTop:4}}>{n.time}</div>
                        </div>

                        {/* Delete */}
                        <button
                          onClick={e=>{e.stopPropagation();deleteNotif(n.id);}}
                          style={{background:"transparent",border:"none",fontSize:12,color:T.dim,cursor:"pointer",flexShrink:0,padding:2,opacity:0,transition:"opacity 0.15s"}}
                          onMouseEnter={e=>e.currentTarget.style.opacity="1"}
                          onMouseLeave={e=>e.currentTarget.style.opacity="0"}
                          >✕</button>
                      </div>
                    );
                  })}
                </div>

                {/* Footer */}
                {notifs.length>0&&(
                  <div style={{padding:"10px 16px",borderTop:`1px solid ${T.border}`,background:T.s2,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:10,color:T.dim}}>{notifs.length} notification{notifs.length>1?"s":""}</span>
                    <button onClick={()=>setNotifs([])} style={{background:"transparent",border:"none",fontSize:10,color:T.dim,cursor:"pointer"}}>Tout effacer</button>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"24px 28px"}}>
          {module==="dashboard"&&<Dashboard ws={ws} tasks={tasks} projects={projects} meetings={meetings} influencers={influencers} setModule={setModule} T={T} t={t} expenses={expenses} updateExpense={updateExpense}/>}
          {module==="tasks"    &&<Tasks ws={ws} tasks={filtered_tasks} allMembers={members} setModal={setModal} T={T} t={t} updateTask={updateTask} addTask={addTask} taskNotes={taskNotes}/>}
          {module==="de_launch"&&wsId==="de"&&<DELaunchTracker ws={ws} tasks={tasks} updateTask={updateTask} T={T}/>}
          {module==="projects" &&<Projects ws={ws} projects={filtered_projects} setModal={setModal} T={T} t={t}/>}
          {module==="meetings" &&<Meetings ws={ws} meetings={meetings} gcalEvents={gcalEvents} setModal={setModal} T={T} t={t}/>}
          {module==="media"    &&<Media ws={ws} influencers={influencers} allInfluencers={influencers} setModal={setModal} T={T} t={t} mediaBudget={mediaBudget} addMediaBudget={addMediaBudget} updateInfluencer={updateInfluencer} deleteInfluencer={deleteInfluencer} addInfluencer={addInfluencer}/>}

// ─── DEADLINE HELPER ──────────────────────────────────────────────────────
function deadlineInfo(due_date){
  if(!due_date) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = new Date(due_date+"T00:00:00");
  const diff  = Math.round((due-today)/86400000);
  if(diff < 0)  return { label:"En retard",  color:"#FF3B30", bg:"#FF3B3015", icon:"🔴" };
  if(diff === 0) return { label:"Aujourd'hui",color:"#FF3B30", bg:"#FF3B3015", icon:"🔴" };
  if(diff <= 2)  return { label:`${diff}j`,   color:"#FF9F0A", bg:"#FF9F0A15", icon:"🟠" };
  if(diff <= 7)  return { label:`${diff}j`,   color:"#FFD60A", bg:"#FFD60A15", icon:"🟡" };
  return          { label:`${diff}j`,          color:"#00C896", bg:"#00C89615", icon:"🟢" };
}

function InlineTaskAdd({col,ws,updateTask,addTask,T,t}){
  const [open,setOpen]=useState(false);
  const [title,setTitle]=useState("");
  const [priority,setPriority]=useState("Medium");
  const [location,setLocation]=useState("Global");
  const [due,setDue]=useState("");
  const inputRef=React.useRef(null);

  React.useEffect(()=>{if(open)setTimeout(()=>inputRef.current?.focus(),50);},[open]);

  function submit(){
    if(!title.trim()){setOpen(false);return;}
    addTask({
      title:title.trim(),
      status:col.id,
      priority,
      location,
      due_date:due||undefined,
      due:due?new Date(due+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}):"—",
      reminders:["1","3"],
      tags:[],notes:"",
    });
    setTitle("");setDue("");setPriority("Medium");setLocation("Global");setOpen(false);
  }

  if(!open)return(
    <button onClick={()=>setOpen(true)} style={{background:"transparent",border:`1.5px dashed ${T.border}`,borderRadius:10,padding:"9px",fontSize:12,color:T.dim,width:"100%",transition:"all 0.15s",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}
      onMouseEnter={e=>{e.currentTarget.style.borderColor=col.color;e.currentTarget.style.color=col.color;e.currentTarget.style.background=col.color+"0a";}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.dim;e.currentTarget.style.background="transparent";}}>
      <span style={{fontSize:14,lineHeight:1}}>+</span> {t.newTask}
    </button>
  );

  return(
    <div style={{background:T.surface,border:`1.5px solid ${col.color}`,borderRadius:10,padding:"10px",boxShadow:`0 4px 16px rgba(0,0,0,0.15)`}}>
      {/* Priority stripe */}
      <div style={{height:3,borderRadius:2,background:TASK_PRI[priority]||"#555",marginBottom:8,opacity:0.8}}/>
      {/* Title input */}
      <input ref={inputRef} value={title} onChange={e=>setTitle(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter")submit();if(e.key==="Escape"){setOpen(false);setTitle("");}}}
        placeholder="Nom de la tâche..."
        style={{width:"100%",background:"transparent",border:"none",fontSize:13,fontWeight:600,color:T.text,outline:"none",padding:0,marginBottom:8,fontFamily:"DM Sans,sans-serif"}}/>
      {/* Quick options */}
      <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
        {Object.keys(TASK_PRI).map(p=>(
          <button key={p} onClick={()=>setPriority(p)} style={{background:priority===p?TASK_PRI[p]+"22":"transparent",color:priority===p?TASK_PRI[p]:T.dim,border:`1px solid ${priority===p?TASK_PRI[p]+"44":T.border}`,borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:priority===p?700:400,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:5,height:5,borderRadius:"50%",background:TASK_PRI[p]}}/>{p}
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
        <select value={location} onChange={e=>setLocation(e.target.value)} style={{background:T.s2,border:`1px solid ${T.border}`,color:T.text,borderRadius:20,padding:"2px 10px",fontSize:10,fontFamily:"DM Sans,sans-serif",cursor:"pointer",outline:"none"}}>
          {LOCATIONS.map(l=><option key={l}>{l}</option>)}
        </select>
        <DatePickerInline value={due} onChange={v=>setDue(v||"")} color={ws.color} T={T} placeholder="📅 Deadline"/>
      </div>
      {/* Action buttons */}
      <div style={{display:"flex",gap:6}}>
        <button onClick={submit} style={{background:col.color,color:"#fff",border:"none",borderRadius:7,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer",flex:1}}>
          Ajouter ↵
        </button>
        <button onClick={()=>{setOpen(false);setTitle("");}} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"6px 10px",fontSize:11,color:T.muted,cursor:"pointer"}}>✕</button>
      </div>
    </div>
  );
}

            background:filter===f?ws.color:T.s2,color:filter===f?"#fff":T.muted,
            border:`1px solid ${filter===f?ws.color:T.border}`,
            borderRadius:20,padding:"5px 14px",fontSize:11,fontWeight:filter===f?700:400,cursor:"pointer",
          }}>{f==="all"?"Tout voir":f==="todo"?"À faire":"Complétées"}</button>
        ))}
        <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>setShowBudget(v=>!v)} style={{
            background:showBudget?"#00C89622":T.s2,color:showBudget?"#00C896":T.muted,
            border:`1px solid ${showBudget?"#00C89666":T.border}`,
            borderRadius:20,padding:"5px 14px",fontSize:11,cursor:"pointer",fontWeight:500,
          }}>💰 Budget (~$200-320)</button>
        </div>
      </div>

      {/* BUDGET TABLE */}
      {showBudget&&(
        <div style={{background:T.surface,border:`1px solid #00C89633`,borderRadius:12,padding:16,marginBottom:20,borderLeft:`3px solid #00C896`}}>
          <div style={{fontSize:11,fontWeight:700,color:"#00C896",letterSpacing:1,marginBottom:12}}>💰 BUDGET TOTAL DE LANCEMENT</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {DE_BUDGET.map((b,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"7px 10px",background:i%2===0?T.s2:"transparent",borderRadius:6}}>
                <span style={{flex:1,fontSize:12,color:T.text}}>{b.item}</span>
                <span style={{fontSize:12,fontWeight:700,color:b.cost==="GRATUIT"?"#00C896":ws.color,minWidth:80,textAlign:"right"}}>{b.cost}</span>
                <span style={{fontSize:10,color:T.dim,minWidth:120,textAlign:"right"}}>{b.type}</span>
              </div>
            ))}
            <div style={{borderTop:`1px solid ${T.border}`,marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,fontWeight:700,color:T.text}}>TOTAL DE LANCEMENT</span>
              <span style={{fontSize:16,fontWeight:900,color:ws.color}}>~$200–320</span>
            </div>
            <div style={{fontSize:11,color:T.dim,fontStyle:"italic",marginTop:4}}>💡 Remboursé avec le premier client dès la première semaine.</div>
          </div>
        </div>
      )}

      {/* PHASES */}
      {DE_PHASES.map(phase=>{
        const phPct=phaseProgress(phase);
        const isOpen=expanded[phase.id];
        const phAllTasks=phase.sections.flatMap(s=>getTasksForSection(s));
        const phDone=phAllTasks.filter(t=>t.status==="Done").length;

        return(
          <div key={phase.id} style={{marginBottom:12,background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>

            {/* Phase Header */}
            <div onClick={()=>setExpanded(e=>({...e,[phase.id]:!e[phase.id]}))}
              style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",cursor:"pointer",
                background:isOpen?ws.color+"10":"transparent",
                borderBottom:isOpen?`1px solid ${T.border}`:"none",
                transition:"all 0.15s",
              }}
              onMouseEnter={e=>e.currentTarget.style.background=ws.color+"10"}
              onMouseLeave={e=>e.currentTarget.style.background=isOpen?ws.color+"10":"transparent"}>
              <span style={{fontSize:18}}>{phase.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:4}}>{phase.label}</div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1,height:4,background:T.s3,borderRadius:2,overflow:"hidden",maxWidth:200}}>
                    <div style={{height:"100%",width:phPct+"%",background:phPct===100?"#00C896":ws.color,borderRadius:2,transition:"width 0.4s"}}/>
                  </div>
                  <span style={{fontSize:10,color:phPct===100?"#00C896":T.muted,fontWeight:600}}>{phDone}/{phAllTasks.length} tâches</span>
                </div>
              </div>
              {phPct===100&&<span style={{fontSize:10,background:"#00C89622",color:"#00C896",padding:"3px 8px",borderRadius:10,fontWeight:700}}>✓ COMPLÉTÉ</span>}
              <span style={{fontSize:11,color:T.dim,transform:isOpen?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
            </div>

            {/* Phase Content */}
            {isOpen&&(
              <div style={{padding:"12px 16px"}}>
                {phase.sections.map((sec,si)=>{
                  let secTasks=getTasksForSection(sec);
                  if(filter==="todo") secTasks=secTasks.filter(t=>t.status!=="Done");
                  if(filter==="done") secTasks=secTasks.filter(t=>t.status==="Done");

                  if(secTasks.length===0&&filter!=="all") return null;

                  return(
                    <div key={si} style={{marginBottom:16}}>
                      <div style={{fontSize:10,fontWeight:700,color:sec.color,letterSpacing:1,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:sec.color,boxShadow:`0 0 4px ${sec.color}`}}/>
                        {sec.label.toUpperCase()}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:5}}>
                        {secTasks.length===0&&(
                          <div style={{fontSize:12,color:T.dim,fontStyle:"italic",padding:"8px 12px"}}>Aucune tâche dans cette catégorie.</div>
                        )}
                        {secTasks.map(task=>{
                          const isDone=task.status==="Done";
                          return(
                            <div key={task.id}
                              style={{
                                display:"flex",alignItems:"flex-start",gap:10,
                                padding:"10px 12px",borderRadius:8,
                                background:isDone?T.s2:T.bg||"#0f0f0f",
                                border:`1px solid ${isDone?"#00C89622":T.border}`,
                                opacity:isDone?0.7:1,
                                transition:"all 0.15s",
                              }}
                              onMouseEnter={e=>{if(!isDone)e.currentTarget.style.borderColor=sec.color+"66";}}
                              onMouseLeave={e=>{e.currentTarget.style.borderColor=isDone?"#00C89622":T.border;}}>

                              {/* Checkbox */}
                              <div onClick={()=>toggleTask(task)}
                                style={{
                                  width:20,height:20,borderRadius:5,flexShrink:0,marginTop:1,
                                  background:isDone?"#00C896":"transparent",
                                  border:`2px solid ${isDone?"#00C896":sec.color}`,
                                  display:"flex",alignItems:"center",justifyContent:"center",
                                  cursor:"pointer",transition:"all 0.2s cubic-bezier(0.34,1.56,0.64,1)",
                                  boxShadow:isDone?"0 0 6px #00C89666":"none",
                                }}>
                                {isDone&&<span style={{color:"#fff",fontSize:10,fontWeight:900,lineHeight:1}}>✓</span>}
                              </div>

                              {/* Content */}
                              <div style={{flex:1}}>
                                <div style={{fontSize:13,fontWeight:600,color:isDone?T.muted:T.text,textDecoration:isDone?"line-through":"none",marginBottom:task.notes?4:0,lineHeight:1.4}}>
                                  {task.title}
                                </div>
                                {task.notes&&<div style={{fontSize:11,color:T.dim,lineHeight:1.5}}>{task.notes}</div>}
                              </div>

                              {/* Priority + Tag */}
                              <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                                {task.priority==="High"&&!isDone&&(
                                  <span style={{fontSize:9,background:"#FF3B3018",color:"#FF3B30",border:"1px solid #FF3B3033",borderRadius:10,padding:"2px 7px",fontWeight:700}}>URGENT</span>
                                )}
                                {(task.tags||[]).slice(0,1).map(tag=>(
                                  <span key={tag} style={{fontSize:9,background:(tagColor[tag]||"#777")+"18",color:tagColor[tag]||"#777",border:`1px solid ${(tagColor[tag]||"#777")}33`,borderRadius:10,padding:"2px 7px",fontWeight:600}}>{tag}</span>
                                ))}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}

      {/* DONE SECTION — tasks not matching any phase tag */}
      {filter!=="todo"&&(()=>{
        const doneMisc=deTasks.filter(t=>t.status==="Done"&&!DE_PHASES.flatMap(p=>p.sections).flatMap(s=>s.tags).some(tag=>(t.tags||[]).includes(tag)));
        return doneMisc.length>0?(
          <div style={{marginTop:8,padding:"10px 14px",background:T.s2,borderRadius:10,border:`1px solid ${T.border}`}}>
            <div style={{fontSize:10,color:"#00C896",fontWeight:700,letterSpacing:1,marginBottom:8}}>✓ AUTRES COMPLÉTÉES</div>
            {doneMisc.map(task=>(
              <div key={task.id} style={{fontSize:12,color:T.muted,padding:"4px 0",textDecoration:"line-through"}}>{task.title}</div>
            ))}
          </div>
        ):null;
      })()}

    </div>
  );
}

// ─── TASKS ────────────────────────────────────────────────────────────────
function Tasks({ws,tasks,allMembers,setModal,T,t,updateTask,addTask,taskNotes}){
  const [view,   setVw]       = useState("board"); // board | list | location
  const [showDone,setShowDone]= useState(false);
  const [dragging,setDragging] = useState(null);
  const [dragOver,setDragOver] = useState(null);

  const activeTasks = showDone ? tasks : tasks.filter(tk=>tk.status!=="Done");
  const doneCount   = tasks.filter(tk=>tk.status==="Done").length;
  const [dragPos, setDragPos]  = useState({x:0,y:0});

  function onDragStart(e,task){
    setDragging(task);
    e.dataTransfer.effectAllowed="move";
    // Ghost image
    const ghost=document.createElement("div");
    ghost.style.cssText="position:fixed;top:-100px;left:-100px;width:180px;padding:10px;background:#1e1e1e;border:1px solid #444;border-radius:8px;color:#fff;font-size:12px;font-family:DM Sans,sans-serif;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.5);";
    ghost.innerText=task.title;
    document.body.appendChild(ghost);
    e.dataTransfer.setDragImage(ghost,90,20);
    setTimeout(()=>document.body.removeChild(ghost),0);
  }
  function onDragOver(e,status){
    e.preventDefault();
    e.dataTransfer.dropEffect="move";
    setDragOver(status);
  }
  function onDrop(e,status){
    e.preventDefault();
    if(dragging && dragging.status!==status){
      updateTask(dragging.id,{status});
    }
    setDragging(null);
    setDragOver(null);
  }
  function onDragEnd(){setDragging(null);setDragOver(null);}

  const COLS=[
    {id:"To Do",     label:"À faire",    color:"#6b6b6b", dot:"#6b6b6b"},
    {id:"In Progress",label:"En cours",  color:"#FF9F0A", dot:"#FF9F0A"},
    {id:"Done",      label:"Terminé",    color:"#00C896", dot:"#00C896"},
    {id:"Blocked",   label:"Bloqué",     color:"#FF3B30", dot:"#FF3B30"},
  ];

  if(view==="board") return(
    <div className="fade-up">
      {/* ── VIEW SELECTOR ── */}
      <div style={{display:"flex",gap:8,marginBottom:20,alignItems:"center",flexWrap:"wrap"}}>
        {/* View tabs */}
        <div style={{display:"flex",gap:4,background:T.s2,borderRadius:10,padding:3,border:`1px solid ${T.border}`}}>
          {[{id:"board",label:"🗂 Kanban"},{id:"list",label:"≡ Liste"},{id:"location",label:"📍 Locations"}].map(v=>(
            <button key={v.id} onClick={()=>setVw(v.id)} style={{
              background:view===v.id?ws.color:"transparent",
              color:view===v.id?"#fff":T.muted,
              border:"none",borderRadius:7,padding:"6px 14px",
              fontSize:12,fontWeight:view===v.id?600:400,
              cursor:"pointer",transition:"all 0.15s",whiteSpace:"nowrap",
            }}>{v.label}</button>
          ))}
        </div>
        {/* Archive toggle */}
        <button onClick={()=>setShowDone(v=>!v)} style={{
          background:showDone?"#00C89622":T.s2,
          color:showDone?"#00C896":T.muted,
          border:`1px solid ${showDone?"#00C89666":T.border}`,
          borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:showDone?600:400,
          display:"flex",alignItems:"center",gap:6,cursor:"pointer",
        }}>
          <span style={{fontSize:13}}>📦</span>
          Archives {doneCount>0&&<span style={{background:showDone?"#00C896":"#6b6b6b",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:9,fontWeight:700}}>{doneCount}</span>}
        </button>
        {view!=="location"&&<div style={{marginLeft:"auto",display:"flex",gap:12}}>
          {[{label:"🔴 En retard",c:"#FF3B30"},{label:"🟠 ≤2j",c:"#FF9F0A"},{label:"🟡 ≤7j",c:"#FFD60A"},{label:"🟢 OK",c:"#00C896"}].map(d=>(
            <div key={d.label} style={{fontSize:10,color:T.muted,display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:d.c}}/>{d.label}
            </div>
          ))}
        </div>}
      </div>

      {/* Board */}
      <div style={{display:"grid",gridTemplateColumns:showDone?"repeat(4,1fr)":"repeat(3,1fr)",gap:16,alignItems:"start"}}>
        {COLS.filter(col=>showDone?true:col.id!=="Done").map(col=>{
          const colTasks=activeTasks.filter(x=>x.status===col.id);
          const isOver=dragOver===col.id;
          return(
            <div key={col.id}
              onDragOver={e=>onDragOver(e,col.id)}
              onDrop={e=>onDrop(e,col.id)}
              onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragOver(null);}}
            >
              {/* Column header */}
              <div style={{
                display:"flex",alignItems:"center",gap:8,marginBottom:12,
                padding:"8px 12px",
                background:isOver?col.color+"18":T.s2,
                borderRadius:8,border:`1px solid ${isOver?col.color:T.border}`,
                transition:"all 0.15s",
              }}>
                <div style={{width:9,height:9,borderRadius:"50%",background:col.color,boxShadow:`0 0 6px ${col.color}66`}}/>
                <span style={{fontSize:12,fontWeight:700,color:isOver?col.color:T.text}}>{col.label}</span>
                <span style={{
                  marginLeft:"auto",fontSize:11,fontWeight:700,
                  background:col.color+"22",color:col.color,
                  padding:"1px 8px",borderRadius:20,
                }}>{colTasks.length}</span>
              </div>

              {/* Drop zone */}
              <div style={{
                display:"flex",flexDirection:"column",gap:8,
                minHeight:80,borderRadius:10,
                background:isOver?col.color+"08":"transparent",
                border:`2px dashed ${isOver?col.color:"transparent"}`,
                padding:isOver?"6px":"0",
                transition:"all 0.15s",
              }}>
                {colTasks.map(task=>{
                  const dl=deadlineInfo(task.due_date);
                  const isDragging=dragging?.id===task.id;
                  const isDone=task.status==="Done";
                  return(
                    <div key={task.id}
                      draggable={!isDone}
                      onDragStart={e=>onDragStart(e,task)}
                      onDragEnd={onDragEnd}
                      onClick={()=>!isDragging&&setModal({type:"edit_tasks",payload:task})}
                      style={{
                        background:isDragging?"transparent":isDone?T.s2:T.surface,
                        border:`1px solid ${isDragging?"transparent":isDone?T.border:T.border}`,
                        borderRadius:10,padding:"14px",
                        cursor:isDone?"default":"grab",
                        opacity:isDragging?0.3:isDone?0.6:1,
                        transform:isDragging?"scale(0.98)":"scale(1)",
                        transition:"all 0.15s",
                        boxShadow:isDragging||isDone?"none":`0 2px 8px rgba(0,0,0,0.12)`,
                        userSelect:"none",
                      }}
                      onMouseEnter={e=>{if(!isDragging&&!isDone){e.currentTarget.style.borderColor=col.color;e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow=`0 4px 16px rgba(0,0,0,0.2)`;} }}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.transform="scale(1)";e.currentTarget.style.boxShadow=isDone?"none":`0 2px 8px rgba(0,0,0,0.12)`;}}
                    >
                      {/* Priority stripe */}
                      <div style={{height:3,borderRadius:2,background:isDone?"#00C896":TASK_PRI[task.priority]||"#555",marginBottom:10,opacity:0.8}}/>

                      {/* Title row with checkbox */}
                      <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:8}}>
                        {/* Checkbox */}
                        <div
                          onClick={e=>{
                            e.stopPropagation();
                            const el=e.currentTarget;
                            el.style.transform="scale(1.4)";
                            el.style.background="#00C896";
                            el.style.borderColor="#00C896";
                            setTimeout(()=>{
                              el.style.transform="scale(1)";
                              updateTask(task.id,{status:isDone?"To Do":"Done"});
                            },300);
                          }}
                          style={{
                            width:20,height:20,borderRadius:6,flexShrink:0,marginTop:1,
                            background:isDone?"#00C896":"transparent",
                            border:`2px solid ${isDone?"#00C896":col.color}`,
                            display:"flex",alignItems:"center",justifyContent:"center",
                            cursor:"pointer",
                            transition:"all 0.2s cubic-bezier(0.34,1.56,0.64,1)",
                            boxShadow:isDone?"0 0 8px #00C89666":"none",
                          }}
                          title={isDone?"Marquer non terminé":"Marquer comme terminé"}
                        >
                          {isDone&&<span style={{color:"#fff",fontSize:11,fontWeight:900,lineHeight:1,animation:"checkPop 0.3s cubic-bezier(0.34,1.56,0.64,1)"}}>✓</span>}
                        </div>
                        <div style={{fontSize:13,fontWeight:600,lineHeight:1.4,color:isDone?T.muted:T.text,textDecoration:isDone?"line-through":"none",flex:1}}>{task.title}</div>
                      </div>

                      {!isDone&&<>
                      {/* Tags */}
                      {(task.tags||[]).length>0&&(
                        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                          {task.tags.map(tag=><Badge key={tag} label={tag} color={ws.color} small/>)}
                        </div>
                      )}

                      {/* Location */}
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                        <span style={{fontSize:10,color:T.dim}}>📍</span>
                        <span style={{fontSize:10,color:T.muted}}>{task.location}</span>
                      </div>

                      {/* Deadline badge */}
                      {dl&&(
                        <div style={{
                          display:"inline-flex",alignItems:"center",gap:5,
                          background:dl.bg,border:`1px solid ${dl.color}44`,
                          borderRadius:6,padding:"3px 8px",marginBottom:8,
                        }}>
                          <span style={{fontSize:10}}>{dl.icon}</span>
                          <span style={{fontSize:10,fontWeight:700,color:dl.color}}>{dl.label}</span>
                          <span style={{fontSize:9,color:dl.color,opacity:0.7}}>
                            {task.due_date?new Date(task.due_date+"T12:00:00").toLocaleDateString("fr-CA",{day:"numeric",month:"short"}):""}
                          </span>
                        </div>
                      )}
                      {!dl&&task.due&&task.due!=="—"&&(
                        <div style={{fontSize:10,color:T.dim,marginBottom:8}}>📅 {task.due}</div>
                      )}
                      </>}

                      {/* Footer */}
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:8,borderTop:`1px solid ${T.border}`}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          {!isDone&&<div style={{display:"flex",alignItems:"center",gap:5}}>
                            <div style={{width:6,height:6,borderRadius:"50%",background:TASK_PRI[task.priority]||"#555"}}/>
                            <span style={{fontSize:9,color:T.muted,fontWeight:500}}>{task.priority}</span>
                          </div>}
                          {isDone&&<span style={{fontSize:10,color:"#00C896",fontWeight:600}}>✓ Terminé</span>}
                          {(taskNotes||[]).filter(n=>n.taskId===task.id).length>0&&(
                            <div style={{display:"flex",alignItems:"center",gap:3,background:T.s3,borderRadius:10,padding:"1px 6px"}}>
                              <span style={{fontSize:9}}>💬</span>
                              <span style={{fontSize:9,color:T.muted,fontWeight:600}}>{(taskNotes||[]).filter(n=>n.taskId===task.id).length}</span>
                            </div>
                          )}
                          {task.notes&&!isDone&&<span style={{fontSize:9,color:T.dim}}>📝</span>}
                        </div>
                        <Avatar name={task.owner} size={22} color={isDone?"#00C896":ws.color}/>
                      </div>
                    </div>
                  );
                })}

                {/* Add button */}
                <InlineTaskAdd col={col} ws={ws} updateTask={updateTask} addTask={addTask} T={T} t={t}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  // ── LOCATION VIEW ──
  if(view==="location"){
    const LOCS_BNC = ["Vancouver","Toronto","Seattle","Miami","Global"];
    const locGroups = LOCS_BNC.map(loc=>({
      loc,
      tasks: activeTasks.filter(tk=>tk.location===loc||(!LOCS_BNC.filter(l=>l!=="Global").includes(tk.location)&&loc==="Global")),
    })).filter(g=>g.tasks.length>0);
    return(
      <div className="fade-up">
        {/* ── VIEW SELECTOR ── */}
        <div style={{display:"flex",gap:8,marginBottom:20,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{display:"flex",gap:4,background:T.s2,borderRadius:10,padding:3,border:`1px solid ${T.border}`}}>
            {[{id:"board",label:"🗂 Kanban"},{id:"list",label:"≡ Liste"},{id:"location",label:"📍 Locations"}].map(v=>(
              <button key={v.id} onClick={()=>setVw(v.id)} style={{
                background:view===v.id?ws.color:"transparent",
                color:view===v.id?"#fff":T.muted,
                border:"none",borderRadius:7,padding:"6px 14px",
                fontSize:12,fontWeight:view===v.id?600:400,
                cursor:"pointer",transition:"all 0.15s",whiteSpace:"nowrap",
              }}>{v.label}</button>
            ))}
          </div>
          <button onClick={()=>setShowDone(v=>!v)} style={{
            background:showDone?"#00C89622":T.s2,
            color:showDone?"#00C896":T.muted,
            border:`1px solid ${showDone?"#00C89666":T.border}`,
            borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:showDone?600:400,
            display:"flex",alignItems:"center",gap:6,cursor:"pointer",
          }}>
            <span>📦</span>
            Archives {doneCount>0&&<span style={{background:showDone?"#00C896":"#6b6b6b",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:9,fontWeight:700}}>{doneCount}</span>}
          </button>
          <div style={{marginLeft:"auto",fontSize:12,color:T.muted,fontWeight:500}}>
            {activeTasks.length} tâche{activeTasks.length>1?"s":""} · {locGroups.length} location{locGroups.length>1?"s":""}
          </div>
        </div>

        {/* Location columns grid */}
        <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(locGroups.length,3)},1fr)`,gap:16,alignItems:"start"}}>

function AgendaBoard({meeting,ws,T}){
  const [items,setItems]=React.useState(()=>meeting.agenda||[]);
  const [newTitle,setNewTitle]=React.useState("");
  const [expandedNote,setExpandedNote]=React.useState(null);
  const [noteText,setNoteText]=React.useState({});
  const [attachments,setAttachments]=React.useState({});

  function saveItems(updated){
    setItems(updated);
    lsUpd("meetings",meeting.id,{agenda:updated});
  }

  function addItem(){
    if(!newTitle.trim())return;
    const item={id:Date.now(),title:newTitle.trim(),status:"todo",note:"",attachments:[],createdAt:new Date().toISOString()};
    saveItems([...items,item]);
    setNewTitle("");
  }

  function toggleStatus(id){
    saveItems(items.map(it=>it.id===id?{...it,status:it.status==="done"?"todo":it.status==="todo"?"discussing":"done"}:it));
  }

  function deleteItem(id){saveItems(items.filter(it=>it.id!==id));}

  function saveNote(id){
    const note=noteText[id]||"";
    saveItems(items.map(it=>it.id===id?{...it,note}:it));
    setExpandedNote(null);
  }

  function handleFile(id,e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      const att={name:file.name,type:file.type,url:ev.target.result,size:file.size};
      const updated=items.map(it=>it.id===id?{...it,attachments:[...(it.attachments||[]),att]}:it);
      saveItems(updated);
      setAttachments(a=>({...a,[id]:[...(a[id]||[]),att]}));
    };
    reader.readAsDataURL(file);
  }

  const statusInfo={
    todo:{icon:"○",color:T.muted,label:"À discuter"},
    discussing:{icon:"◉",color:"#FF9F0A",label:"En cours"},
    done:{icon:"✓",color:"#00C896",label:"Réglé"},
  };

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:1}}>📋 AGENDA — POINTS À DISCUTER</div>
        <div style={{display:"flex",gap:6}}>
          {["todo","discussing","done"].map(s=>(
            <span key={s} style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:statusInfo[s].color+"18",color:statusInfo[s].color,fontWeight:700}}>
              {statusInfo[s].icon} {items.filter(i=>i.status===s).length}
            </span>
          ))}
        </div>
      </div>

      {items.length===0&&<div style={{fontSize:12,color:T.dim,fontStyle:"italic",marginBottom:12,textAlign:"center",padding:"16px 0"}}>Aucun point — ajoute le premier ↓</div>}

      {items.map((item,idx)=>{
        const si=statusInfo[item.status]||statusInfo.todo;
        const isExpanded=expandedNote===item.id;
        return(
          <div key={item.id} style={{
            background:item.status==="done"?T.s2:T.surface,
            border:`1.5px solid ${item.status==="discussing"?"#FF9F0A44":item.status==="done"?"#00C89633":T.border}`,
            borderRadius:10,marginBottom:8,overflow:"hidden",
            opacity:item.status==="done"?0.7:1,
            transition:"all 0.2s",
          }}>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px"}}>
              {/* Status toggle */}
              <button onClick={()=>toggleStatus(item.id)} title={si.label} style={{
                width:24,height:24,borderRadius:"50%",border:`2px solid ${si.color}`,
                background:item.status==="done"?"#00C896":item.status==="discussing"?"#FF9F0A18":"transparent",
                color:si.color,fontSize:12,fontWeight:900,cursor:"pointer",flexShrink:0,
                display:"flex",alignItems:"center",justifyContent:"center",
              }}>{item.status==="done"?"✓":item.status==="discussing"?"◉":"○"}</button>

              {/* Title */}
              <span style={{flex:1,fontSize:13,fontWeight:600,color:item.status==="done"?T.muted:T.text,textDecoration:item.status==="done"?"line-through":"none"}}>{item.title}</span>

              {/* Actions */}
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                {item.note&&<span title="Note" style={{fontSize:10,color:T.muted}}>📝</span>}
                {(item.attachments||[]).length>0&&<span title="Fichiers" style={{fontSize:10,color:"#1a73e8"}}>📎 {item.attachments.length}</span>}
                <button onClick={()=>{setExpandedNote(isExpanded?null:item.id);setNoteText(n=>({...n,[item.id]:item.note||""}))} } title="Note" style={{background:"transparent",border:"none",color:T.muted,fontSize:13,cursor:"pointer",padding:"2px 4px"}}>📝</button>
                <label title="Joindre fichier" style={{cursor:"pointer",color:"#1a73e8",fontSize:13,padding:"2px 4px"}}>
                  📎<input type="file" style={{display:"none"}} onChange={e=>handleFile(item.id,e)} accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"/>
                </label>

                <button onClick={()=>deleteItem(item.id)} style={{background:"transparent",border:"none",color:T.dim,fontSize:13,cursor:"pointer",padding:"2px 4px"}}>✕</button>
              </div>
            </div>

            {/* Note zone */}
            {isExpanded&&(
              <div style={{padding:"0 14px 12px 48px",borderTop:`1px solid ${T.border}`}}>
                <textarea
                  value={noteText[item.id]||""}
                  onChange={e=>setNoteText(n=>({...n,[item.id]:e.target.value}))}
                  placeholder="Notes, décisions, liens..."
                  autoFocus
                  style={{width:"100%",minHeight:80,background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"8px 10px",fontSize:12,color:T.text,resize:"vertical",lineHeight:1.6,fontFamily:"DM Sans,sans-serif"}}
                />
                <div style={{display:"flex",gap:6,marginTop:6}}>
                  <button onClick={()=>saveNote(item.id)} style={{background:ws.color,color:"#fff",border:"none",borderRadius:6,padding:"5px 14px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Sauvegarder</button>
                  <button onClick={()=>setExpandedNote(null)} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:6,padding:"5px 14px",fontSize:11,color:T.muted,cursor:"pointer"}}>Annuler</button>
                </div>
                {/* Attachments preview */}
                {(item.attachments||[]).length>0&&(
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                    {item.attachments.map((att,ai)=>(
                      <div key={ai} style={{background:T.s3,borderRadius:6,padding:"4px 10px",fontSize:10,color:T.muted,display:"flex",alignItems:"center",gap:4}}>
                        {att.type&&att.type.startsWith("image/")?<img src={att.url} style={{width:20,height:20,objectFit:"cover",borderRadius:3}}/>:"📄"}
                        <span style={{maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{att.name}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}

      {/* Add new point */}
      <div style={{display:"flex",gap:8,marginTop:12}}>
        <input
          value={newTitle}
          onChange={e=>setNewTitle(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&addItem()}
          placeholder="+ Ajouter un point à discuter..."
          style={{flex:1,background:T.s2,border:`1.5px dashed ${T.border}`,borderRadius:8,padding:"8px 12px",fontSize:12,color:T.text,outline:"none",fontFamily:"DM Sans,sans-serif"}}
          onFocus={e=>e.target.style.borderColor=ws.color}
          onBlur={e=>e.target.style.borderColor=T.border}
        />
        <button onClick={addItem} style={{background:ws.color,color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+</button>
      </div>
    </div>
  );
}
