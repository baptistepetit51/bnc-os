function DatePicker({value, onChange, color, T}){
  const today = new Date(); today.setHours(0,0,0,0);
  const selected = value ? new Date(value+"T00:00:00") : null;

  const initY = selected ? selected.getFullYear() : today.getFullYear();
  const initM = selected ? selected.getMonth() : today.getMonth();
  const [curYear,  setCurYear]  = useState(initY);
  const [curMonth, setCurMonth] = useState(initM);

  const MONTHS_FR = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const DAYS_SHORT = ["Lu","Ma","Me","Je","Ve","Sa","Di"];
  const DIM2 = [31,28,31,30,31,30,31,31,30,31,30,31];

  function daysInMonth(m,y){ return m===1&&y%4===0?29:DIM2[m]; }

  // First weekday (monday-first)
  const firstDow = new Date(curYear,curMonth,1).getDay();
  const offset   = firstDow===0?6:firstDow-1;
  const totalDays= daysInMonth(curMonth,curYear);

  function selectDay(d){
    const mm=String(curMonth+1).padStart(2,"0");
    const dd=String(d).padStart(2,"0");
    onChange(`${curYear}-${mm}-${dd}`);
  }
  function prevMonth(){ if(curMonth===0){setCurMonth(11);setCurYear(y=>y-1);}else setCurMonth(m=>m-1); }
  function nextMonth(){ if(curMonth===11){setCurMonth(0);setCurYear(y=>y+1);}else setCurMonth(m=>m+1); }

  function isSelected(d){ return selected&&selected.getFullYear()===curYear&&selected.getMonth()===curMonth&&selected.getDate()===d; }
  function isToday(d){ return today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d; }
  function isPast(d){ const t=new Date(curYear,curMonth,d); return t<today; }

  function deadlineDot(d){
    if(!selected) return null;
    const selDay=new Date(curYear,curMonth,d); selDay.setHours(0,0,0,0);
    if(isSelected(d)){
      const diff=Math.round((selDay-today)/86400000);
      if(diff<0)  return "#FF3B30";
      if(diff===0)return "#FF3B30";
      if(diff<=2) return "#FF9F0A";
      if(diff<=7) return "#FFD60A";
      return "#00C896";
    }
    return null;
  }

  const cells = [...Array(offset).fill(null), ...Array.from({length:totalDays},(_,i)=>i+1)];
  // pad to full weeks
  while(cells.length%7!==0) cells.push(null);

  return(
    <div style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:10,overflow:"hidden",userSelect:"none"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",padding:"12px 14px",borderBottom:`1px solid ${T.border}`,background:T.surface}}>
        <button onClick={prevMonth} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:6,width:28,height:28,cursor:"pointer",color:T.muted,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <div style={{flex:1,textAlign:"center"}}>
          <span style={{fontSize:13,fontWeight:700,color:T.text}}>{MONTHS_FR[curMonth]}</span>
          <span style={{fontSize:12,color:T.muted,marginLeft:6}}>{curYear}</span>
        </div>
        <button onClick={nextMonth} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:6,width:28,height:28,cursor:"pointer",color:T.muted,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      </div>

      {/* Day headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"8px 10px 4px"}}>
        {DAYS_SHORT.map(d=>(
          <div key={d} style={{textAlign:"center",fontSize:9,fontWeight:700,color:T.dim,letterSpacing:0.5,padding:"2px 0"}}>{d}</div>
        ))}
      </div>

      {/* Days grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"0 10px 10px",gap:2}}>
        {cells.map((day,idx)=>{
          if(!day) return <div key={`e${idx}`}/>;
          const sel  = isSelected(day);
          const tod  = isToday(day);
          const past = isPast(day);
          const dot  = deadlineDot(day);
          return(
            <button key={day} onClick={()=>selectDay(day)} style={{
              background: sel ? color : tod ? color+"22" : "transparent",
              color:      sel ? "#fff" : past ? T.dim : T.text,
              border:     `1px solid ${sel?color:tod?color+"66":"transparent"}`,
              borderRadius: 7,
              padding:"5px 0",
              fontSize:12,
              fontWeight: sel||tod ? 700 : 400,
              cursor:"pointer",
              position:"relative",
              transition:"all 0.1s",
              opacity: past&&!sel ? 0.4 : 1,
            }}
            onMouseEnter={e=>{if(!sel)e.currentTarget.style.background=color+"22";}}
            onMouseLeave={e=>{if(!sel)e.currentTarget.style.background="transparent";}}
            >
              {day}
              {sel&&dot&&<div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:"50%",background:"#fff"}}/>}
            </button>
          );
        })}
      </div>

      {/* Selected display */}
      {selected&&(
        <div style={{padding:"8px 14px 10px",borderTop:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <DeadlineBadge value={value}/>
          <span style={{fontSize:11,color:T.muted}}>
            {selected.toLocaleDateString("fr-CA",{weekday:"short",day:"numeric",month:"long"})}
          </span>
          <button onClick={()=>onChange("")} style={{background:"transparent",border:"none",fontSize:10,color:T.dim,cursor:"pointer"}}>✕ effacer</button>
        </div>
      )}
    </div>
  );
}

function Donut({data,size=110}){
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let off=0; const r=40,circ=2*Math.PI*r;
  return <svg width={size} height={size} viewBox="0 0 120 120">
    {data.map((d,i)=>{const p=d.value/total;const el=<circle key={i} cx={60} cy={60} r={r} fill="none" stroke={d.color} strokeWidth={13} strokeDasharray={`${p*circ} ${circ}`} strokeDashoffset={-off*circ} style={{transform:"rotate(-90deg)",transformOrigin:"60px 60px"}}/>;off+=p;return el;})}
    <text x={60} y={60} textAnchor="middle" dominantBaseline="middle" fontSize="18" fontWeight="700" fill="#f2f2f2">{total}</text>
  </svg>;
}
function MiniBar({data,color,T}){const mx=Math.max(...data.map(d=>d.v),1);return <div style={{display:"flex",alignItems:"flex-end",gap:4,height:50}}>{data.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:"100%",height:Math.max(2,(d.v/mx)*44),background:color,borderRadius:2,opacity:0.6+0.4*(d.v/mx)}}/><span style={{fontSize:8,color:T.muted}}>{d.l}</span></div>)}</div>;}

      .on("postgres_changes",{event:"*",schema:"public",table:"influencers",filter:`workspace=eq.${wsId}`},()=>loadData())
      .on("postgres_changes",{event:"*",schema:"public",table:"cal_events",filter:`workspace=eq.${wsId}`},()=>loadData())
      .subscribe();
    return()=>supa.removeChannel(sub);
  },[user,wsId,seeded]);

  // Cmd+K
  useEffect(()=>{
    const h=e=>{
      if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setSO(o=>!o);}
      if(e.key==="Escape"){setSO(false);setSearch("");}
    };
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[]);
  useEffect(()=>{if(searchOpen)setTimeout(()=>searchRef.current?.focus(),50);},[searchOpen]);

  function switchWs(id){
    if(!accessibleWS.find(w=>w.id===id))return;
    setWsId(id);setModule("dashboard");setLocFilt("Global");setDbReady(false);
  }

  const filtered_tasks    = tasks.filter(x=>locFilt==="Global"||x.location==="Global"||x.location===locFilt);
  const filtered_projects = projects.filter(x=>locFilt==="Global"||x.location==="Global"||x.location===locFilt);
  const filtered_infl     = influencers.filter(x=>locFilt==="Global"||x.location===locFilt);

  const searchResults = search.length>1?[
    ...tasks.filter(x=>x.title.toLowerCase().includes(search.toLowerCase())).map(x=>({...x,_type:"task"})),
    ...projects.filter(x=>x.title.toLowerCase().includes(search.toLowerCase())).map(x=>({...x,_type:"project"})),
    ...meetings.filter(x=>x.title.toLowerCase().includes(search.toLowerCase())).map(x=>({...x,_type:"meeting"})),
  ]:[];

  const [expenses,  setExpenses]  = useState([]);
  const [notifs,    setNotifs]    = useState([]);
  const [notifOpen, setNotifOpen] = useState(false);

  const NAV=[
    {id:"dashboard",label:t.dashboard,icon:"◈"},
    {id:"tasks",    label:t.tasks,    icon:"☑"},
    {id:"projects", label:t.projects, icon:"◎"},
    {id:"meetings", label:t.meetings, icon:"⊕"},
    {id:"media",    label:t.media,    icon:"★"},
    {id:"calendar", label:t.calendar, icon:"⊞"},
    {id:"expenses", label:"Dépenses",  icon:"$"},
    ...(user?.role==="admin"?[{id:"access",label:t.access,icon:"⊙"}]:[]),
  ];

  // CRUD helpers
  async function addTask(form){
    await supa.from("tasks").insert({...form,workspace:wsId,created_by:user.name});
  }
  async function updateTask(id,form){await supa.from("tasks").update({...form,updated_at:new Date().toISOString()}).eq("id",id);}
  async function deleteTask(id){await supa.from("tasks").delete().eq("id",id);}
  async function addProject(form){await supa.from("projects").insert({...form,workspace:wsId,created_by:user.name});}
  async function updateProject(id,form){await supa.from("projects").update({...form,updated_at:new Date().toISOString()}).eq("id",id);}
  async function deleteProject(id){await supa.from("projects").delete().eq("id",id);}
  async function addMeeting(form){await supa.from("meetings").insert({...form,workspace:wsId,created_by:user.name});}
  async function updateMeeting(id,form){await supa.from("meetings").update(form).eq("id",id);}
  async function deleteMeeting(id){await supa.from("meetings").delete().eq("id",id);}
  async function addInfluencer(form){await supa.from("influencers").insert({...form,workspace:wsId,created_by:user.name});}
  async function updateInfluencer(id,form){await supa.from("influencers").update(form).eq("id",id);}
  async function deleteInfluencer(id){await supa.from("influencers").delete().eq("id",id);}
  async function addCalEvent(form){await supa.from("cal_events").insert({...form,workspace:wsId,created_by:user.name,color:calColor(form.category)});}
  async function updateCalEvent(id,form){await supa.from("cal_events").update({...form,color:calColor(form.category)}).eq("id",id);}
  async function deleteCalEvent(id){await supa.from("cal_events").delete().eq("id",id);}
  async function addMember(form){await supa.from("profiles").insert({...form,avatar:form.name[0]});setMembers(await supa.from("profiles").select("*").then(r=>r.data||[]));}

  // ── Expenses CRUD ──
  async function loadExpenses(){
    const {data}=await supa.from("expenses").select("*").eq("workspace",wsId).order("created_at",{ascending:false});
    setExpenses(data||[]);
  }
  async function addExpense(form){
    const {data}=await supa.from("expenses").insert({...form,workspace:wsId,created_by:user.name}).select().single();
    if(data){
      // Auto-notify if urgent
      if(form.urgency==="Critique"||form.urgency==="Haute"){
        addNotif({type:"expense",urgency:form.urgency,title:`💸 ${form.urgency}: ${form.title}`,body:`${form.amount}$ · ${form.location}`,id:Date.now()});
      }
    }
    loadExpenses();
  }
  async function updateExpense(id,form){await supa.from("expenses").update(form).eq("id",id);loadExpenses();}
  async function deleteExpense(id){await supa.from("expenses").delete().eq("id",id);loadExpenses();}

  // ── Notification system complet ──
  function addNotif(n){
    setNotifs(prev=>{
      // Éviter les doublons (même titre + même jour)
      const today=new Date().toDateString();
      const exists=prev.some(x=>x.title===n.title&&new Date(x.ts||0).toDateString()===today);
      if(exists)return prev;
      return [{...n,id:Date.now(),read:false,ts:Date.now(),time:new Date().toLocaleTimeString("fr-CA",{hour:"2-digit",minute:"2-digit"})},...prev];
    });
  }
  function sendUrgentAlert(expense){
    addNotif({type:"alert",urgency:"Critique",icon:"🚨",title:`ALERTE: ${expense.title}`,body:`${(+expense.amount).toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})} requis · ${expense.location}`});
  }
  function markAllRead(){setNotifs(prev=>prev.map(n=>({...n,read:true})));}
  function deleteNotif(id){setNotifs(prev=>prev.filter(n=>n.id!==id));}

  // Générer les notifs de tâches automatiquement au chargement
  useEffect(()=>{
    if(!tasks.length)return;
    const today=new Date(); today.setHours(0,0,0,0);
    const newNotifs=[];

    tasks.forEach(task=>{
      if(task.status==="Done")return;
      if(!task.due_date)return;
      const due=new Date(task.due_date+"T00:00:00");
      const diff=Math.round((due-today)/86400000);

      if(diff<0){
        newNotifs.push({type:"overdue",urgency:"Critique",icon:"🔴",
          title:`En retard: ${task.title}`,
          body:`${Math.abs(diff)} jour${Math.abs(diff)>1?"s":""} de retard · ${task.location} · ${task.owner}`,
          taskId:task.id});
      } else if(diff===0){
        newNotifs.push({type:"today",urgency:"Haute",icon:"🟠",
          title:"Aujourd\u2019hui: "+task.title,
          body:"À compléter aujourd\u2019hui · "+task.location+" · "+task.owner,
          taskId:task.id});
      } else if(diff<=2){
        newNotifs.push({type:"soon",urgency:"Haute",icon:"🟠",
          title:`Dans ${diff}j: ${task.title}`,
          body:`Échéance proche · ${task.owner}`,
          taskId:task.id});
      } else if(diff<=7){
        newNotifs.push({type:"week",urgency:"Moyenne",icon:"🟡",
          title:`Cette semaine: ${task.title}`,
          body:`Dans ${diff} jours · ${task.owner}`,
          taskId:task.id});
      }
    });

    meetings.forEach(m=>{
      if(m.status!=="Upcoming")return;
      newNotifs.push({type:"meeting",urgency:"Moyenne",icon:"📅",
        title:`Meeting: ${m.title}`,
        body:`${m.date||""} · ${m.owner}`,
        meetingId:m.id});
    });

    newNotifs.forEach(n=>addNotif(n));
  },[tasks.length, meetings.length]);

  const unreadCount=notifs.filter(n=>!n.read).length;

  useEffect(()=>{if(user&&seeded)loadExpenses();},[user,wsId,seeded]);

  if(!user){
    return <LoginPage onLogin={u=>{setUser(u);if(!u.workspace_access.includes("bnc")&&u.workspace_access[0])setWsId(u.workspace_access[0]);}} T={T} t={t} theme={theme} setTheme={setTheme} lang={lang} setLang={setLang}/>;
  }

  if(!dbReady){
    return <div style={{height:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",color:T.muted,fontFamily:"'DM Sans',sans-serif",fontSize:14}}>{t.loading}</div>;
  }

  return(
    <div style={{display:"flex",height:"100vh",background:T.bg,fontFamily:"'DM Sans',sans-serif",color:T.text,overflow:"hidden"}}>
      <style>{`*{box-sizing:border-box;}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:${T.dim};border-radius:4px}input,select,textarea{background:${T.inputBg};border:1px solid ${T.border};color:${T.text};border-radius:6px;padding:8px 11px;font-family:"DM Sans",sans-serif;font-size:13px;width:100%;}input:focus,select:focus,textarea:focus{outline:none;border-color:${ws.color};}button{cursor:pointer;font-family:"DM Sans",sans-serif;}textarea{resize:vertical;min-height:72px;}`}</style>

      {/* SIDEBAR */}
      <aside style={{width:sideCol?58:218,flexShrink:0,background:theme==="dark"?"#0d0d0d":"#fff",borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",transition:"width 0.2s",overflow:"hidden"}}>
        <div style={{padding:"12px 10px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10}}>
          <WSLogo ws={ws} size={34}/>
          {!sideCol&&<div style={{overflow:"hidden",flex:1}}><div style={{fontSize:12,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ws.name}</div><div style={{fontSize:9,color:T.muted,fontFamily:"'DM Mono',monospace"}}>{t.workspace}</div></div>}
          <button onClick={()=>setSideCol(c=>!c)} style={{background:"transparent",border:`1px solid ${T.border}`,color:T.muted,borderRadius:5,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0}}>{sideCol?"›":"‹"}</button>
        </div>

        {/* WS switcher */}
        <div style={{padding:"8px",borderBottom:`1px solid ${T.border}`}}>
          {accessibleWS.map(w=>(
            <button key={w.id} onClick={()=>switchWs(w.id)} title={w.name} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"6px 8px",borderRadius:7,border:"none",background:wsId===w.id?w.color+"18":"transparent",marginBottom:2,transition:"background 0.1s"}}>
              <WSLogo ws={w} size={26}/>
              {!sideCol&&<span style={{fontSize:12,fontWeight:600,color:wsId===w.id?w.color:T.muted,whiteSpace:"nowrap"}}>{w.abbr}</span>}
            </button>
          ))}
        </div>

        {!sideCol&&<button onClick={()=>setSO(true)} style={{margin:"8px 10px",background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"7px 10px",display:"flex",alignItems:"center",gap:8,color:T.muted,fontSize:12,cursor:"pointer"}}>
          <span>⌕</span><span style={{flex:1,textAlign:"left"}}>{t.searchPlaceholder}</span><span style={{fontSize:9,background:T.s3,padding:"1px 5px",borderRadius:3}}>⌘K</span>
        </button>}

        <nav style={{flex:1,padding:"6px 8px",overflowY:"auto"}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setModule(n.id)} title={n.label} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:7,border:"none",background:module===n.id?ws.color+"1e":"transparent",color:module===n.id?ws.color:T.muted,marginBottom:2,transition:"all 0.1s",textAlign:"left"}}>
              <span style={{fontSize:16,flexShrink:0,width:20,textAlign:"center",lineHeight:1}}>{n.icon}</span>
              {!sideCol&&<span style={{fontSize:13,fontWeight:module===n.id?600:400,whiteSpace:"nowrap"}}>{n.label}</span>}
            </button>
          ))}
        </nav>

        <div style={{padding:"10px 8px",borderTop:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:6}}>
          {!sideCol&&<div style={{display:"flex",gap:6}}>
            <button onClick={()=>setTheme(v=>v==="dark"?"light":"dark")} style={{flex:1,background:T.s2,border:`1px solid ${T.border}`,borderRadius:6,padding:"6px",fontSize:10,color:T.muted,cursor:"pointer"}}>{theme==="dark"?"☀ "+t.lightMode:"☾ "+t.darkMode}</button>
            <button onClick={()=>setLang(v=>v==="fr"?"en":"fr")} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:6,padding:"6px 10px",fontSize:10,color:T.muted,fontWeight:700,cursor:"pointer"}}>{lang==="fr"?"EN":"FR"}</button>
          </div>}
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px"}}>
            <Avatar name={user.name} size={28} color={ws.color}/>
            {!sideCol&&<div style={{flex:1,overflow:"hidden"}}>
              <div style={{fontSize:12,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.name}</div>
              <div style={{fontSize:10,color:T.muted}}>{t.roles[user.role]}</div>
            </div>}
            {!sideCol&&<button onClick={()=>setUser(null)} title={t.logout} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:5,padding:"3px 6px",fontSize:10,color:T.muted,cursor:"pointer"}}>↩</button>}
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{height:52,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",padding:"0 22px",gap:14,background:theme==="dark"?"#0d0d0d":T.surface,flexShrink:0}}>
          <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:T.muted}}>{ws.abbr} /</span>
            <span style={{fontSize:14,fontWeight:600}}>{NAV.find(n=>n.id===module)?.label}</span>
          </div>
          {["tasks","projects","media"].includes(module)&&(
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {LOCATIONS.filter(l=>wsId==="bnc"?true:l==="Global").map(l=>(
                <button key={l} onClick={()=>setLocFilt(l)} style={{background:locFilt===l?ws.color:T.s2,color:locFilt===l?"#fff":T.muted,border:`1px solid ${locFilt===l?ws.color:T.border}`,borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:locFilt===l?600:400}}>{l}</button>
              ))}
            </div>
          )}
          {!["dashboard","calendar","access","expenses"].includes(module)&&(
            <button onClick={()=>setModal({type:`add_${module}`})} style={{background:ws.color,color:"#fff",border:"none",borderRadius:7,padding:"7px 16px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:16,lineHeight:1}}>+</span>
              {module==="tasks"?t.newTask:module==="projects"?t.newProject:module==="meetings"?t.newMeeting:t.newInfluencer}
            </button>
          )}
          {module==="calendar"&&<button onClick={()=>setModal({type:"add_calendar"})} style={{background:ws.color,color:"#fff",border:"none",borderRadius:7,padding:"7px 16px",fontSize:12,fontWeight:600}}>+ {t.addEvent}</button>}
          {module==="expenses"&&<button onClick={()=>setModal({type:"add_expenses"})} style={{background:ws.color,color:"#fff",border:"none",borderRadius:7,padding:"7px 16px",fontSize:12,fontWeight:600}}>+ Dépense</button>}

          {/* Notification bell */}
          <div style={{position:"relative"}}>
            <button onClick={()=>setNotifOpen(o=>!o)} style={{
              background:unreadCount>0?ws.color+"18":"transparent",
              border:`1px solid ${unreadCount>0?ws.color:T.border}`,
              borderRadius:8,width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:17,position:"relative",cursor:"pointer",transition:"all 0.15s",
            }}>
              🔔
              {unreadCount>0&&(
                <span style={{
                  position:"absolute",top:-5,right:-5,
                  minWidth:18,height:18,borderRadius:9,
                  background:"#FF3B30",border:`2px solid ${T.surface}`,
                  color:"#fff",fontSize:9,fontWeight:700,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  padding:"0 4px",
                }}>{unreadCount>9?"9+":unreadCount}</span>
              )}
            </button>

            {notifOpen&&(
              <div onClick={e=>e.stopPropagation()} style={{
                position:"absolute",right:0,top:46,
                width:380,maxWidth:"95vw",
                background:T.surface,border:`1px solid ${T.border}`,
                borderRadius:12,boxShadow:T.shadow,zIndex:500,overflow:"hidden",
              }}>
                {/* Header */}
                <div style={{padding:"14px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:T.s2}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:15}}>🔔</span>
                    <span style={{fontSize:13,fontWeight:700}}>Notifications</span>
                    {unreadCount>0&&<span style={{background:"#FF3B30",color:"#fff",fontSize:9,fontWeight:700,padding:"1px 7px",borderRadius:10}}>{unreadCount} new</span>}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={markAllRead} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:5,padding:"3px 10px",fontSize:10,color:T.muted,cursor:"pointer"}}>
                      ✓ Tout lire
                    </button>
                    <button onClick={()=>setNotifOpen(false)} style={{background:"transparent",border:"none",fontSize:14,color:T.muted,cursor:"pointer"}}>✕</button>
                  </div>
                </div>

                {/* Today summary banner */}
                <NotifSummaryBanner notifs={notifs} T={T}/>

                {/* Notif list */}
                <div style={{maxHeight:380,overflowY:"auto"}}>
                  {notifs.length===0&&(
                    <div style={{padding:"32px",textAlign:"center"}}>
                      <div style={{fontSize:28,marginBottom:8}}>✅</div>
                      <div style={{fontSize:13,color:T.muted,fontWeight:500}}>Tout est à jour !</div>
                      <div style={{fontSize:11,color:T.dim,marginTop:4}}>Aucune tâche en retard</div>
                    </div>
                  )}
                  {notifs.map(n=>{
                    const bgColor={
                      "Critique":"#FF3B30",
                      "Haute":"#FF9F0A",
                      "Moyenne":"#FF9F0A",
                    }[n.urgency]||ws.color;
                    return(
                      <div key={n.id} style={{
                        padding:"12px 16px",
                        borderBottom:`1px solid ${T.border}`,
                        background:n.read?"transparent":bgColor+"08",
                        display:"flex",gap:10,alignItems:"flex-start",
                        transition:"background 0.15s",
                        cursor:"pointer",
                      }}
                      onMouseEnter={e=>e.currentTarget.style.background=T.s2}
                      onMouseLeave={e=>e.currentTarget.style.background=n.read?"transparent":bgColor+"08"}
                      onClick={()=>{
                        setNotifs(prev=>prev.map(x=>x.id===n.id?{...x,read:true}:x));
                        if(n.type==="overdue"||n.type==="today"||n.type==="soon"||n.type==="week"){setModule("tasks");setNotifOpen(false);}
                        if(n.type==="meeting"){setModule("meetings");setNotifOpen(false);}
                        if(n.type==="expense"||n.type==="alert"){setModule("expenses");setNotifOpen(false);}
                      }}>
                        {/* Icon */}
                        <div style={{
                          width:34,height:34,borderRadius:8,flexShrink:0,
                          background:bgColor+"18",border:`1px solid ${bgColor}33`,
                          display:"flex",alignItems:"center",justifyContent:"center",
                          fontSize:16,
                        }}>{n.icon||"📌"}</div>

                        {/* Content */}
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
                            <div style={{fontSize:12,fontWeight:n.read?500:700,color:n.read?T.muted:T.text,lineHeight:1.4}}>{n.title}</div>
                            {!n.read&&<div style={{width:7,height:7,borderRadius:"50%",background:bgColor,flexShrink:0,marginTop:3}}/>}
                          </div>
                          <div style={{fontSize:11,color:T.muted,marginTop:3,lineHeight:1.4}}>{n.body}</div>
                          <div style={{fontSize:9,color:T.dim,marginTop:4}}>{n.time}</div>
                        </div>

                        {/* Delete */}
                        <button onClick={e=>{e.stopPropagation();deleteNotif(n.id);}} style={{
                          background:"transparent",border:"none",
                          color:T.dim,fontSize:12,cursor:"pointer",
                          padding:"2px 4px",borderRadius:4,flexShrink:0,
                          opacity:0,
                        }}
                        onMouseEnter={e=>e.currentTarget.style.opacity="1"}
                        onMouseLeave={e=>e.currentTarget.style.opacity="0"}
                        >✕</button>
                      </div>
                    );
                  })}
                </div>

                {/* Footer */}
                {notifs.length>0&&(
                  <div style={{padding:"10px 16px",borderTop:`1px solid ${T.border}`,background:T.s2,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:10,color:T.dim}}>{notifs.length} notification{notifs.length>1?"s":""}</span>
                    <button onClick={()=>setNotifs([])} style={{background:"transparent",border:"none",fontSize:10,color:T.dim,cursor:"pointer"}}>Tout effacer</button>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"22px"}}>
          {module==="dashboard"&&<Dashboard ws={ws} tasks={tasks} projects={projects} meetings={meetings} influencers={influencers} setModule={setModule} T={T} t={t} expenses={expenses}/>}
          {module==="tasks"    &&<Tasks ws={ws} tasks={filtered_tasks} allMembers={members} setModal={setModal} T={T} t={t} updateTask={updateTask}/>}
          {module==="projects" &&<Projects ws={ws} projects={filtered_projects} setModal={setModal} T={T} t={t}/>}
          {module==="meetings" &&<Meetings ws={ws} meetings={meetings} setModal={setModal} T={T} t={t}/>}
          {module==="media"    &&<Media ws={ws} influencers={filtered_infl} allInfluencers={influencers} setModal={setModal} T={T} t={t}/>}
          {module==="calendar" &&<CalModule ws={ws} calEvents={calEvents} T={T} t={t} setModal={setModal}/>}
          {module==="expenses" &&<Expenses ws={ws} expenses={expenses} setModal={setModal} sendUrgentAlert={sendUrgentAlert} T={T}/>}
          {module==="access"   &&<Access ws={ws} members={members} setModal={setModal} T={T} t={t}/>}
        </div>
      </div>

      {/* SEARCH */}
      {searchOpen&&(
        <div onClick={()=>{setSO(false);setSearch("");}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(6px)",zIndex:2000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"12vh"}}>

// ─── DEADLINE HELPER ──────────────────────────────────────────────────────
function deadlineInfo(due_date){
  if(!due_date) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = new Date(due_date+"T00:00:00");
  const diff  = Math.round((due-today)/86400000);
  if(diff < 0)  return { label:"En retard",  color:"#FF3B30", bg:"#FF3B3015", icon:"🔴" };
  if(diff === 0) return { label:"Aujourd'hui",color:"#FF3B30", bg:"#FF3B3015", icon:"🔴" };
  if(diff <= 2)  return { label:`${diff}j`,   color:"#FF9F0A", bg:"#FF9F0A15", icon:"🟠" };
  if(diff <= 7)  return { label:`${diff}j`,   color:"#FFD60A", bg:"#FFD60A15", icon:"🟡" };
  return          { label:`${diff}j`,          color:"#00C896", bg:"#00C89615", icon:"🟢" };
}

  const [dragging,setDragging] = useState(null);
  const [dragOver,setDragOver] = useState(null);
  const [dragPos, setDragPos]  = useState({x:0,y:0});

  function onDragStart(e,task){
    setDragging(task);
    e.dataTransfer.effectAllowed="move";
    // Ghost image
    const ghost=document.createElement("div");
    ghost.style.cssText="position:fixed;top:-100px;left:-100px;width:180px;padding:10px;background:#1e1e1e;border:1px solid #444;border-radius:8px;color:#fff;font-size:12px;font-family:DM Sans,sans-serif;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.5);";
    ghost.innerText=task.title;
    document.body.appendChild(ghost);
    e.dataTransfer.setDragImage(ghost,90,20);
    setTimeout(()=>document.body.removeChild(ghost),0);
  }
  function onDragOver(e,status){
    e.preventDefault();
    e.dataTransfer.dropEffect="move";
    setDragOver(status);
  }
  function onDrop(e,status){
    e.preventDefault();
    if(dragging && dragging.status!==status){
      updateTask(dragging.id,{...dragging,status});
    }
    setDragging(null);
    setDragOver(null);
  }
  function onDragEnd(){setDragging(null);setDragOver(null);}

    {id:"To Do",     label:"À faire",    color:"#6b6b6b", dot:"#6b6b6b"},

// ─── CALENDAR ─────────────────────────────────────────────────────────────
function CalModule({ws,calEvents,T,t,setModal}){
  const [calView,setCV]=useState("timeline");
  const [month,setMonth]=useState(NM);
  const [selCats,setSC]=useState([...CAL_CATS]);
  const events=calEvents.filter(e=>selCats.includes(e.category));
  const tlMonths=Array.from({length:6},(_,i)=>((NM-1+i)%12)+1);
  const dIM=DIM[month-1],off=mOff(month,NY);
  const cells=[...Array(off).fill(null),...Array.from({length:dIM},(_,i)=>i+1)];
  const mEvs=events.filter(e=>{const s=toInt(e.month,e.day),en=e.end_month?toInt(e.end_month,e.end_day):s;return en>=toInt(month,1)&&s<=toInt(month,dIM);}).sort((a,b)=>toInt(a.month,a.day)-toInt(b.month,b.day));

  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        {["timeline","month"].map(v=><button key={v} onClick={()=>setCV(v)} style={{background:calView===v?ws.color:T.s2,color:calView===v?"#fff":T.muted,border:`1px solid ${calView===v?ws.color:T.border}`,borderRadius:7,padding:"5px 14px",fontSize:12}}>
          {v==="timeline"?"Timeline":"Month"}
        </button>)}
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginLeft:8}}>
          {CAL_CATS.map(c=><button key={c} onClick={()=>setSC(p=>p.includes(c)?p.length>1?p.filter(x=>x!==c):p:[...p,c])} style={{background:selCats.includes(c)?calColor(c):T.s2,color:selCats.includes(c)?calText(c):T.muted,border:`1px solid ${selCats.includes(c)?calColor(c):T.border}`,borderRadius:20,padding:"3px 11px",fontSize:10}}>{c}</button>)}
        </div>
      </div>

      {calView==="timeline"&&tlMonths.map(m=>{
        const mE=events.filter(e=>{const s=toInt(e.month,e.day),en=e.end_month?toInt(e.end_month,e.end_day):s;return en>=toInt(m,1)&&s<=toInt(m,DIM[m-1]);}).sort((a,b)=>toInt(a.month,a.day)-toInt(b.month,b.day));
        const isN=m===NM,isP=m<NM;
        return(
          <div key={m} style={{marginBottom:28}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:isN?ws.color:isP?T.dim:T.text}}>{t.months[m-1].toUpperCase()}</span>
              {isN&&<span style={{background:ws.color,color:"#fff",fontSize:9,padding:"2px 8px",borderRadius:20,fontWeight:700}}>NOW</span>}
              <div style={{flex:1,height:1,background:T.border}}/>
              <span style={{fontSize:10,color:T.dim}}>{mE.length} event{mE.length!==1?"s":""}</span>
            </div>
            {mE.length===0?<p style={{fontSize:11,color:T.dim,fontStyle:"italic",margin:0}}>{t.noEvents}</p>:
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                {mE.map(ev=>{const cc=calColor(ev.category);return(
                  <div key={ev.id} onClick={()=>setModal({type:"edit_calendar",payload:ev})} style={{background:T.surface,border:`1px solid ${T.border}`,borderLeft:`3px solid ${cc}`,borderRadius:7,padding:"10px 13px",cursor:"pointer",width:200,boxSizing:"border-box"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=cc} onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
                    <span style={{background:cc,color:calText(ev.category),fontSize:7,padding:"2px 7px",borderRadius:3,display:"inline-block",marginBottom:6,fontWeight:700}}>{ev.category.toUpperCase()}</span>
                    <div style={{fontSize:12,fontWeight:700,marginBottom:4}}>{ev.title}</div>
                    <span style={{fontSize:9,color:T.muted}}>{t.months[ev.month-1]} {ev.day}{ev.end_month?` → ${t.months[ev.end_month-1]} ${ev.end_day}`:""}</span>
                    <span style={{fontSize:8,color:T.dim,display:"block",marginTop:3}}>{ev.location}</span>
                  </div>
                );})}
              </div>}
          </div>
        );
      })}

      {calView==="month"&&<div>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <button onClick={()=>setMonth(m=>m===1?12:m-1)} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"6px 13px",color:T.muted,fontSize:13}}>◀</button>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:ws.color,flex:1,textAlign:"center"}}>{t.months[month-1].toUpperCase()} {NY}</span>
          <button onClick={()=>setMonth(m=>m===12?1:m+1)} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"6px 13px",color:T.muted,fontSize:13}}>▶</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
          {t.days_short.map(d=><div key={d} style={{textAlign:"center",fontSize:8,color:T.dim,padding:"4px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {cells.map((day,idx)=>{
            if(!day)return<div key={`b${idx}`} style={{background:T.bg,minHeight:72,borderRadius:4}}/>;
            const isT=month===NM&&day===ND;
            const dE=events.filter(ev=>evCovers(ev,month,day));
            return(
              <div key={`d${day}`} style={{background:isT?ws.color+"15":T.surface,border:`1px solid ${isT?ws.color:T.border}`,borderRadius:4,minHeight:72,padding:"4px 0",overflow:"hidden"}}>
                <div style={{fontSize:9,color:isT?ws.color:T.dim,fontWeight:isT?700:400,padding:"0 5px",marginBottom:2}}>{day}</div>
                {dE.map(ev=>{const pos=bPos(ev,month,day);const cc=calColor(ev.category);return(
                  <div key={ev.id} onClick={e=>{e.stopPropagation();setModal({type:"edit_calendar",payload:ev});}}
                    style={{background:cc,color:calText(ev.category),fontSize:7,padding:"2px 4px",marginBottom:1,cursor:"pointer",fontWeight:700,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",
                      marginLeft:(pos==="mid"||pos==="end")?0:4,marginRight:(pos==="mid"||pos==="start")?0:4,
                      borderRadius:`${(pos==="start"||pos==="solo")?3:0}px ${(pos==="end"||pos==="solo")?3:0}px ${(pos==="end"||pos==="solo")?3:0}px ${(pos==="start"||pos==="solo")?3:0}px`}}
                  >{(pos==="start"||pos==="solo")?ev.title:"\u00A0"}</div>
                );})}
              </div>
            );
          })}
        </div>
        {mEvs.length>0&&<div style={{marginTop:22}}>
          <div style={{fontSize:9,color:T.muted,letterSpacing:1,marginBottom:10}}>{t.eventsMonth.toUpperCase()}</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {mEvs.map(ev=>{const cc=calColor(ev.category);return(
              <div key={ev.id} onClick={()=>setModal({type:"edit_calendar",payload:ev})} style={{background:T.surface,border:`1px solid ${T.border}`,borderLeft:`3px solid ${cc}`,borderRadius:7,padding:"10px 13px",cursor:"pointer",width:190}}>
                <span style={{background:cc,color:calText(ev.category),fontSize:7,padding:"2px 6px",borderRadius:3,display:"inline-block",marginBottom:5,fontWeight:700}}>{ev.category.toUpperCase()}</span>
                <div style={{fontSize:12,fontWeight:700,marginBottom:3}}>{ev.title}</div>
                <span style={{fontSize:9,color:T.muted}}>{t.months[ev.month-1]} {ev.day}{ev.end_month?` → ${t.months[ev.end_month-1]} ${ev.end_day}`:""}</span>
              </div>
            );})}
          </div>
        </div>}
      </div>}
    </div>
  );
}

// ─── EXPENSES ─────────────────────────────────────────────────────────────
const URGENCY = {
  "Critique": { color:"#FF3B30", bg:"#FF3B3022", icon:"🚨" },
  "Haute":    { color:"#FF9F0A", bg:"#FF9F0A22", icon:"⚠️" },
  "Moyenne":  { color:"#0A84FF", bg:"#0A84FF22", icon:"📋" },
  "Basse":    { color:"#6b6b6b", bg:"#6b6b6b22", icon:"💡" },
};
const EXP_CATS = ["Équipement","Ingrédients","Marketing","RH","Loyer/Opérations","Tech","Autre"];

function Expenses({ws,expenses,setModal,sendUrgentAlert,T}){
  const [locFilt,setLocFilt]=useState("Global");
  const filtered=expenses.filter(e=>locFilt==="Global"||e.location===locFilt);
  const totalByUrgency=(u)=>filtered.filter(e=>e.urgency===u).reduce((s,e)=>s+(+e.amount||0),0);
  const grandTotal=filtered.reduce((s,e)=>s+(+e.amount||0),0);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* Location filter */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        {LOCATIONS.map(l=>(
          <button key={l} onClick={()=>setLocFilt(l)} style={{background:locFilt===l?ws.color:T.s2,color:locFilt===l?"#fff":T.muted,border:`1px solid ${locFilt===l?ws.color:T.border}`,borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:locFilt===l?600:400}}>{l}</button>
        ))}
        <div style={{marginLeft:"auto",background:T.s2,border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 16px",textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:800,color:ws.color}}>{grandTotal.toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</div>
          <div style={{fontSize:9,color:T.muted,letterSpacing:1}}>TOTAL À PRÉVOIR</div>
        </div>
      </div>

      {/* Urgency KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {Object.entries(URGENCY).map(([u,uc])=>(
          <div key={u} style={{background:uc.bg,border:`1px solid ${uc.color}33`,borderRadius:8,padding:"12px 14px",borderLeft:`3px solid ${uc.color}`}}>
            <div style={{fontSize:18,marginBottom:4}}>{uc.icon}</div>
            <div style={{fontSize:11,fontWeight:600,color:uc.color,marginBottom:4}}>{u.toUpperCase()}</div>
            <div style={{fontSize:20,fontWeight:800,color:uc.color}}>{totalByUrgency(u).toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</div>
            <div style={{fontSize:9,color:T.muted,marginTop:2}}>{filtered.filter(e=>e.urgency===u).length} dépense{filtered.filter(e=>e.urgency===u).length!==1?"s":""}</div>
          </div>
        ))}
      </div>

      {/* Expenses list */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 100px 80px",padding:"10px 16px",background:T.s2,borderBottom:`1px solid ${T.border}`}}>
          {["Dépense","Catégorie","Location","Montant","Urgence","Échéance",""].map((h,i)=>(
            <div key={i} style={{fontSize:10,fontWeight:600,color:T.muted,letterSpacing:0.4}}>{h.toUpperCase()}</div>
          ))}
        </div>
        {filtered.length===0&&<div style={{padding:"40px",textAlign:"center",color:T.dim,fontSize:13}}>Aucune dépense planifiée.</div>}
        {filtered.sort((a,b)=>{const order=["Critique","Haute","Moyenne","Basse"];return order.indexOf(a.urgency)-order.indexOf(b.urgency);}).map((exp,i)=>{
          const uc=URGENCY[exp.urgency]||URGENCY["Moyenne"];
          return(
            <div key={exp.id}
              style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 100px 80px",padding:"13px 16px",alignItems:"center",borderBottom:i<filtered.length-1?`1px solid ${T.border}`:"none",borderLeft:`3px solid ${uc.color}`}}
              onMouseEnter={e=>e.currentTarget.style.background=T.s2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{exp.title}</div>
                {exp.notes&&<div style={{fontSize:10,color:T.muted,marginTop:2}}>{exp.notes}</div>}
              </div>
              <Badge label={exp.category||"Autre"} color={ws.color} small/>
              <span style={{fontSize:12,color:T.muted}}>{exp.location}</span>
              <span style={{fontSize:14,fontWeight:700,color:uc.color}}>{(+exp.amount||0).toLocaleString("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0})}</span>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:14}}>{uc.icon}</span>
                <span style={{fontSize:10,fontWeight:600,color:uc.color}}>{exp.urgency}</span>
              </div>
              <span style={{fontSize:11,color:T.muted}}>{exp.due_date?new Date(exp.due_date+"T12:00:00").toLocaleDateString("fr-CA",{month:"short",day:"numeric"}):"—"}</span>
              <div style={{display:"flex",gap:5}}>
                <button onClick={()=>setModal({type:"edit_expenses",payload:exp})} style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:5,padding:"4px 8px",fontSize:10,color:T.muted}}>✏</button>
                {(exp.urgency==="Critique"||exp.urgency==="Haute")&&(
                  <button onClick={()=>sendUrgentAlert(exp)} title="Envoyer alerte" style={{background:"#FF3B3022",border:"1px solid #FF3B3044",borderRadius:5,padding:"4px 8px",fontSize:11,color:"#FF3B30"}}>🚨</button>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── MODAL ────────────────────────────────────────────────────────────────
function Modal({modal,setModal,ws,members,user,addTask,updateTask,deleteTask,addProject,updateProject,deleteProject,addMeeting,updateMeeting,deleteMeeting,addInfluencer,updateInfluencer,deleteInfluencer,addCalEvent,updateCalEvent,deleteCalEvent,addExpense,updateExpense,deleteExpense,addMember,T,t,wsId}){
  const [form,setForm]=useState(modal.payload||modal.prefill||{});
  const close=()=>setModal(null);
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const isTask=modal.type.includes("task")||modal.type.includes("tasks");
  const isProj=modal.type.includes("project");
  const isMtg=modal.type.includes("meeting");
  const isMed=modal.type.includes("media");
  const isCal=modal.type.includes("calendar");
  const isExp=modal.type.includes("expense")||modal.type.includes("expenses");
  const isAcc=modal.type.includes("member")||modal.type==="invite";
  const isEdit=modal.type.startsWith("edit");

  async function save(){
    if(isTask){
      if(!form.title)return;
      // Format due date nicely from date input (2026-04-12 → Apr 12)
      let dueFormatted = "—";
      let dueMonth = null, dueDay = null;
      if(form.due_date){
        const d = new Date(form.due_date + "T12:00:00");
        dueFormatted = d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
        dueMonth = d.getMonth() + 1;
        dueDay = d.getDate();
      } else if(form.due && form.due !== "—") {
        dueFormatted = form.due;
      }
      const ev={status:"To Do",priority:"Medium",owner:user.name,due:"—",tags:[],location:"Global",...form,due:dueFormatted};
      if(isEdit) await updateTask(form.id,ev);
      else {
        await addTask(ev);
        // Auto-add to calendar if checked and date selected
        if(form.add_to_cal && dueMonth && dueDay){
          await addCalEvent({
            title: form.title,
            category: "New Product",
            location: form.location || "Global",
            month: dueMonth,
            day: dueDay,
            end_month: null,
            end_day: null,
            has_end: false,
            note: `Tâche: ${form.title}`,
          });
        }
      }
    } else if(isProj){
      if(!form.title)return;
      let dueFormatted = form.due || "—";
      if(form.due_date){ const d=new Date(form.due_date+"T12:00:00"); dueFormatted=d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
      const ev={progress:0,status:"Planning",owner:user.name,location:"Global",description:"",...form,due:dueFormatted};
      if(isEdit)await updateProject(form.id,ev); else await addProject(ev);
    } else if(isMtg){
      if(!form.title)return;
      let dateFormatted = form.date || "—";
      if(form.meeting_date){ const d=new Date(form.meeting_date+"T12:00:00"); dateFormatted=d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
      const ev={owner:user.name,attendees:[],status:"Upcoming",notes:"",...form,date:dateFormatted};
      if(isEdit)await updateMeeting(form.id,ev); else await addMeeting(ev);
    } else if(isMed){
      if(!form.name)return;
      const ev={status:"À contacter",platform:"Instagram",followers:"—",visit:"—",content:"—",notes:"",...form};
      if(isEdit)await updateInfluencer(form.id,ev); else await addInfluencer(ev);
    } else if(isCal){
      if(!form.title)return;
      const ev={category:"New Product",location:"Global",month:NM,day:1,note:"",...form};
      if(isEdit)await updateCalEvent(form.id,ev); else await addCalEvent(ev);
    } else if(isExp){
      if(!form.title||!form.amount)return;
      const ev={urgency:"Moyenne",category:"Autre",location:"Global",notes:"",...form};
      if(isEdit)await updateExpense(form.id,ev); else await addExpense(ev);
    } else if(isAcc){
      if(!form.name||!form.email)return;
      await addMember({...form,role:form.role||"staff",workspace_access:[wsId],locations:[form.location||"Global"],password_hash:form.password||"temp2026"});
    }
    close();
  }

  const [confirmDel,setConfirmDel]=useState(false);

  async function del(){
    if(!confirmDel){setConfirmDel(true);return;}
    if(isTask)await deleteTask(form.id);
    else if(isProj)await deleteProject(form.id);
    else if(isMtg)await deleteMeeting(form.id);
    else if(isMed)await deleteInfluencer(form.id);
    else if(isCal)await deleteCalEvent(form.id);
    else if(isExp)await deleteExpense(form.id);
    close();
  }

  const MS=t.months;

  return(
    <div onClick={close} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.surface,border:`1px solid ${T.border}`,borderTop:`2px solid ${ws.color}`,borderRadius:12,padding:28,width:500,maxWidth:"100%",maxHeight:"90vh",overflowY:"auto",boxShadow:T.shadow}}>
        <div style={{fontSize:15,fontWeight:700,color:ws.color,marginBottom:20}}>
          {isEdit?(isMed?t.editInfluencer:isCal?"Modifier event":isMtg?t.editMeeting:isProj?t.editProject:t.editTask):(isMed?t.newInfluencer:isCal?t.addEvent:isMtg?t.newMeeting:isProj?t.newProject:isAcc?t.inviteMember:t.newTask)}
        </div>

        {isTask&&<><MF label={t.title} T={T}><input value={form.title||""} onChange={e=>f("title",e.target.value)} placeholder="Nom de la tâche"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.status} T={T}><select value={form.status||"To Do"} onChange={e=>f("status",e.target.value)}>{Object.keys(TASK_STATUS).map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.priority} T={T}><select value={form.priority||"Medium"} onChange={e=>f("priority",e.target.value)}>{Object.keys(TASK_PRI).map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
            <MF label={t.owner} T={T}><select value={form.owner||user.name} onChange={e=>f("owner",e.target.value)}>{members.map(m=><option key={m.id}>{m.name}</option>)}</select></MF>
          </div>
          <MF label={t.dueDate} T={T}>
            <DatePicker value={form.due_date||""} onChange={v=>f("due_date",v)} color={ws.color} T={T}/>
          </MF>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:ws.color+"12",border:`1px solid ${ws.color}33`,borderRadius:7,marginBottom:14}}>
            <input type="checkbox" id="addtocal" checked={form.add_to_cal||false} onChange={e=>f("add_to_cal",e.target.checked)}
              style={{width:16,height:16,accentColor:ws.color,cursor:"pointer"}}/>
            <label htmlFor="addtocal" style={{fontSize:12,color:T.text,cursor:"pointer",userSelect:"none"}}>
              ⊞ Ajouter au calendrier marketing
            </label>
          </div>
          <MF label={t.notes} T={T}><textarea value={form.notes||""} onChange={e=>f("notes",e.target.value)}/></MF>
          <Btns color={ws.color} onSave={save} onDelete={isEdit?del:null} onClose={close} t={t} confirmDel={confirmDel}/></>}

        {isProj&&<><MF label={t.title} T={T}><input value={form.title||""} onChange={e=>f("title",e.target.value)} placeholder="Nom du projet"/></MF>
          <MF label={t.description} T={T}><textarea value={form.description||""} onChange={e=>f("description",e.target.value)}/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.status} T={T}><select value={form.status||"Planning"} onChange={e=>f("status",e.target.value)}>{Object.keys(PROJ_STATUS).map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
            <MF label={t.owner} T={T}><select value={form.owner||user.name} onChange={e=>f("owner",e.target.value)}>{members.map(m=><option key={m.id}>{m.name}</option>)}</select></MF>
            <MF label={t.dueDate} T={T}><DatePicker value={form.due_date||""} onChange={v=>f("due_date",v)} color={ws.color} T={T}/></MF>
          </div>
          <MF label={`${t.progress}: ${form.progress||0}%`} T={T}><input type="range" min={0} max={100} value={form.progress||0} onChange={e=>f("progress",+e.target.value)} style={{width:"100%",accentColor:ws.color,border:"none",padding:0}}/></MF>
          <Btns color={ws.color} onSave={save} onDelete={isEdit?del:null} onClose={close} t={t} confirmDel={confirmDel}/></>}

        {isMtg&&<><MF label={t.title} T={T}><input value={form.title||""} onChange={e=>f("title",e.target.value)} placeholder="Nom du meeting"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.dueDate} T={T}><DatePicker value={form.meeting_date||""} onChange={v=>f("meeting_date",v)} color={ws.color} T={T}/></MF>
            <MF label={t.status} T={T}><select value={form.status||"Upcoming"} onChange={e=>f("status",e.target.value)}>{["Upcoming","Récurrent","Done"].map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.owner} T={T}><select value={form.owner||user.name} onChange={e=>f("owner",e.target.value)}>{members.map(m=><option key={m.id}>{m.name}</option>)}</select></MF>
          </div>
          <MF label={t.notes} T={T}><textarea value={form.notes||""} onChange={e=>f("notes",e.target.value)}/></MF>
          <Btns color={ws.color} onSave={save} onDelete={isEdit?del:null} onClose={close} t={t}/></>}

        {isMed&&<><MF label={t.name} T={T}><input value={form.name||""} onChange={e=>f("name",e.target.value)} placeholder="@handle"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.platform} T={T}><select value={form.platform||"Instagram"} onChange={e=>f("platform",e.target.value)}>{["Instagram","TikTok","YouTube","Twitter"].map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
            <MF label={t.followers} T={T}><input value={form.followers||""} onChange={e=>f("followers",e.target.value)} placeholder="ex: 45K"/></MF>
            <MF label={t.status} T={T}><select value={form.status||"À contacter"} onChange={e=>f("status",e.target.value)}>{Object.keys(INFL_STATUS).map(s=><option key={s}>{s}</option>)}</select></MF>
            <MF label={t.visit} T={T}><input value={form.visit||""} onChange={e=>f("visit",e.target.value)} placeholder="ex: Apr 20"/></MF>
            <MF label={t.content} T={T}><input value={form.content||""} onChange={e=>f("content",e.target.value)} placeholder="ex: Reel + Story"/></MF>
          </div>
          <MF label={t.notes} T={T}><textarea value={form.notes||""} onChange={e=>f("notes",e.target.value)}/></MF>
          <Btns color={ws.color} onSave={save} onDelete={isEdit?del:null} onClose={close} t={t}/></>}

        {isCal&&<><MF label={t.title} T={T}><input value={form.title||""} onChange={e=>f("title",e.target.value)} placeholder="ex: Lancement Tacos Truffe"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label="Catégorie" T={T}><select value={form.category||"New Product"} onChange={e=>f("category",e.target.value)}>{CAL_CATS.map(c=><option key={c}>{c}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
          </div>
          <div style={{fontSize:10,color:T.muted,letterSpacing:1,marginBottom:6}}>{t.startDate.toUpperCase()}</div>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <div style={{flex:1}}><select value={form.month||NM} onChange={e=>f("month",+e.target.value)} style={{background:T.inputBg,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,padding:"8px 11px",fontSize:13,width:"100%"}}>{MS.map((m,i)=><option key={m} value={i+1}>{m}</option>)}</select></div>
            <div style={{width:90}}><input type="number" min={1} max={31} value={form.day||1} onChange={e=>f("day",Math.min(31,Math.max(1,+e.target.value)))} style={{background:T.inputBg,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,padding:"8px 11px",fontSize:13,width:"100%"}}/></div>
          </div>
          <div style={{marginBottom:14}}>
            <button onClick={()=>f("has_end",!form.has_end)} style={{background:form.has_end?ws.color:T.s2,color:form.has_end?"#fff":T.muted,border:`1px solid ${form.has_end?ws.color:T.border}`,borderRadius:7,padding:"6px 14px",fontSize:11,display:"flex",alignItems:"center",gap:7}}>
              <span>{form.has_end?"☑":"☐"}</span>{form.has_end?t.periodActive:t.addEndDate}
            </button>
          </div>
          {form.has_end&&<><div style={{fontSize:10,color:T.muted,letterSpacing:1,marginBottom:6}}>{t.endDate.toUpperCase()}</div>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <div style={{flex:1}}><select value={form.end_month||NM} onChange={e=>f("end_month",+e.target.value)} style={{background:T.inputBg,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,padding:"8px 11px",fontSize:13,width:"100%"}}>{MS.map((m,i)=><option key={m} value={i+1}>{m}</option>)}</select></div>
              <div style={{width:90}}><input type="number" min={1} max={31} value={form.end_day||1} onChange={e=>f("end_day",Math.min(31,Math.max(1,+e.target.value)))} style={{background:T.inputBg,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,padding:"8px 11px",fontSize:13,width:"100%"}}/></div>
            </div>
            <div style={{background:ws.color+"15",border:`1px solid ${ws.color}33`,borderLeft:`3px solid ${ws.color}`,borderRadius:6,padding:"8px 12px",marginBottom:12,fontSize:12,color:T.muted}}>
              <span style={{color:ws.color,fontWeight:700}}>{Math.max(1,Math.round((new Date(NY,form.end_month-1,form.end_day)-new Date(NY,form.month-1,form.day))/86400000)+1)} {t.days}</span>
              {" "}&nbsp;·&nbsp; {MS[form.month-1]} {form.day} → {MS[(form.end_month||form.month)-1]} {form.end_day||form.day}
            </div></>}
          <MF label={t.notes} T={T}><input value={form.note||""} onChange={e=>f("note",e.target.value)} placeholder="Plateforme, détails..."/></MF>
          <Btns color={ws.color} onSave={save} onDelete={isEdit?del:null} onClose={close} t={t}/></>}

        {isExp&&<>
          <MF label="Titre de la dépense" T={T}><input value={form.title||""} onChange={e=>f("title",e.target.value)} placeholder="ex: Réparation friteuse Vancouver"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label="Montant (CAD $)" T={T}><input type="number" min={0} value={form.amount||""} onChange={e=>f("amount",e.target.value)} placeholder="ex: 450"/></MF>
            <MF label="Niveau d'urgence" T={T}>
              <select value={form.urgency||"Moyenne"} onChange={e=>f("urgency",e.target.value)}>
                {Object.keys(URGENCY).map(u=><option key={u}>{u}</option>)}
              </select>
            </MF>
            <MF label="Catégorie" T={T}>
              <select value={form.category||"Autre"} onChange={e=>f("category",e.target.value)}>
                {EXP_CATS.map(c=><option key={c}>{c}</option>)}
              </select>
            </MF>
            <MF label="Location" T={T}>
              <select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>
                {LOCATIONS.map(l=><option key={l}>{l}</option>)}
              </select>
            </MF>
          </div>
          <MF label="Date prévue" T={T}>
            <DatePicker value={form.due_date||""} onChange={v=>f("due_date",v)} color={ws.color} T={T}/>
          </MF>
          <MF label="Notes" T={T}><textarea value={form.notes||""} onChange={e=>f("notes",e.target.value)} placeholder="Détails, fournisseur, justification..."/></MF>
          {/* Urgency preview */}
          <UrgencyPreview urgency={form.urgency} amount={form.amount} T={T}/>
          <Btns color={ws.color} onSave={save} onDelete={isEdit?del:null} onClose={close} t={t} confirmDel={confirmDel}/>
        </>}

        {isAcc&&<><MF label={t.name} T={T}><input value={form.name||""} onChange={e=>f("name",e.target.value)} placeholder="Prénom Nom"/></MF>
          <MF label={t.email} T={T}><input value={form.email||""} onChange={e=>f("email",e.target.value)} placeholder="email@exemple.com"/></MF>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <MF label={t.role} T={T}><select value={form.role||"staff"} onChange={e=>f("role",e.target.value)}>{ROLES.map(r=><option key={r} value={r}>{t.roles[r]}</option>)}</select></MF>
            <MF label={t.location} T={T}><select value={form.location||"Global"} onChange={e=>f("location",e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></MF>
          </div>
          <MF label="Mot de passe temporaire" T={T}><input value={form.password||""} onChange={e=>f("password",e.target.value)} placeholder="ex: motdepasse123"/></MF>
          <Btns color={ws.color} onSave={save} onDelete={null} onClose={close} t={t}/></>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));}
</script>
</body>
</html>
